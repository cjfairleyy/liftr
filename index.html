<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>liftr</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="liftr">
    
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: #141417;
            --input-bg: #1c1c21;
            --text-color: #ffffff;
            --muted-text: #787880;
            --border-radius: 14px;
            --border-color: rgba(255, 255, 255, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 110px;
            padding-top: env(safe-area-inset-top);
            min-height: 100vh;
        }

        header {
            padding: 30px 20px 10px 20px;
            text-align: left;
            max-width: 500px;
            margin: 0 auto;
        }

        header h1 {
            letter-spacing: -1px;
            font-size: 2.2rem;
            font-weight: 700;
        }

        .container {
            padding: 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        h2 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted-text);
            margin-bottom: 16px;
            margin-top: 10px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 18px;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            color: var(--text-color);
            font-size: 1rem;
            margin-bottom: 16px;
            transition: border-color 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--text-color);
            border: none;
            border-radius: var(--border-radius);
            color: var(--bg-color);
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            margin-bottom: 12px;
            transition: transform 0.1s ease, opacity 0.1s ease;
        }

        button:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        button.secondary {
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        button.danger {
            background-color: rgba(255, 69, 58, 0.1);
            color: #ff453a;
            border: none;
        }

        .timer-display {
            font-size: 3rem;
            font-weight: 400;
            letter-spacing: -1px;
            text-align: center;
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
        }

        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(10, 10, 12, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 14px 0 calc(14px + env(safe-area-inset-bottom)) 0;
            z-index: 1000;
        }

        nav .nav-item {
            color: var(--muted-text);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        nav .nav-item.active {
            color: var(--text-color);
        }

        /* Exercise block item styling */
        .exercise-block {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 18px;
            margin-top: 16px;
        }

        .exercise-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: -0.3px;
        }

        .set-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .set-number {
            font-size: 0.75rem;
            color: var(--muted-text);
            letter-spacing: 0.5px;
            width: 45px;
            font-weight: 600;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0 12px;
            flex: 1;
        }

        .input-wrapper:focus-within {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .input-label {
            font-size: 0.75rem;
            color: var(--muted-text);
            margin-right: 6px;
            text-transform: lowercase;
            font-weight: 500;
        }

        .set-row input {
            margin-bottom: 0;
            padding: 10px 0;
            background: transparent;
            border: none;
            font-size: 0.95rem;
        }

        .btn-mini-add {
            padding: 12px 0 4px 0;
            font-size: 0.8rem;
            margin-top: 6px;
            border: none;
            text-align: left;
            background: transparent;
            color: var(--muted-text);
            text-transform: uppercase;
            letter-spacing: 1px;
            width: auto;
            font-weight: 600;
        }
        
        .btn-mini-add:active {
            color: var(--text-color);
            transform: none;
        }

        .btn-row-delete {
            background: transparent;
            color: var(--muted-text);
            border: none;
            width: auto;
            font-size: 0.85rem;
            padding: 8px;
            transition: color 0.2s ease;
        }
        
        .btn-row-delete:active {
            color: #ff453a;
        }

        /* Modal Overlay Window Styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: flex-end;
        }

        .modal-window {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            border-radius: 20px 20px 0 0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            border-bottom: none;
        }

        .search-results {
            overflow-y: auto;
            flex: 1;
            margin-top: 8px;
        }

        .search-item {
            padding: 16px 4px;
            border-bottom: 1px solid var(--border-color);
            font-size: 1rem;
            cursor: pointer;
        }

        .search-item:active {
            color: var(--muted-text);
        }

        .history-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 16px;
            margin-bottom: 12px;
        }

        .weight-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 4px;
            border-bottom: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

    <header id="main-header">
        <h1>liftr</h1>
    </header>

    <div class="container">
        <div id="home-view" class="view active" style="padding-top: 15vh;">
            <button onclick="startNewWorkout()">Start Blank Workout</button>
        </div>

        <div id="active-workout-view" class="view">
            <div class="card">
                <div class="timer-display" id="timer">00:00:00</div>
                <button class="secondary" onclick="openExerciseModal()">+ Add Exercise</button>
            </div>

            <div id="current-exercises-list"></div>
            
            <button style="margin-top: 30px;" onclick="endWorkout()">Save Workout</button>
            <button class="danger" onclick="cancelWorkout()">Cancel</button>
        </div>

        <div id="history-view" class="view">
            <h2>History</h2>
            <div id="history-list"></div>
        </div>

        <div id="weight-view" class="view">
            <div class="card">
                <h2>Log Weight</h2>
                <input type="number" step="0.1" id="body-weight-input" pattern="[0-9]*" placeholder="0.0 lbs">
                <button onclick="logBodyweight()">Save Weight</button>
            </div>
            
            <div class="card">
                <h2>History</h2>
                <div id="weight-history-list"></div>
            </div>
        </div>
    </div>

    <div id="exercise-modal" class="modal-overlay" onclick="closeExerciseModal(event)">
        <div class="modal-window" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:20px;">
                <h1 style="font-size:1.5rem; font-weight:700; letter-spacing:-0.5px;">Add Exercise</h1>
                <span style="color:var(--muted-text); font-size:0.9rem; cursor:pointer; font-weight:500;" onclick="closeExerciseModal()">Close</span>
            </div>
            
            <input type="text" id="modal-search" placeholder="Search exercises..." oninput="filterExercises(this.value)">
            
            <div class="search-results" id="modal-list-container"></div>

            <button class="secondary" id="btn-add-custom" style="margin-top:16px;" onclick="addCustomFromModal()">Add Custom</button>
        </div>
    </div>

    <nav id="main-nav">
        <div class="nav-item active" onclick="switchView('home-view', this)">Workout</div>
        <div class="nav-item" onclick="switchView('history-view', this)">History</div>
        <div class="nav-item" onclick="switchView('weight-view', this)">Weight</div>
    </nav>

    <script>
        let workouts = JSON.parse(localStorage.getItem('workouts')) || [];
        let bodyweightLog = JSON.parse(localStorage.getItem('bodyweightLog')) || [];
        
        let activeWorkout = null;
        let timerInterval = null;
        let secondsElapsed = 0;

        const exerciseLibrary = [
            "Bench Press (Barbell)", "Incline Bench Press (Barbell)", "Decline Bench Press (Barbell)",
            "Dumbbell Bench Press", "Incline Dumbbell Press", "Chest Fly", "Push-Up",
            "Squat (Barbell)", "Front Squat", "Leg Press", "Leg Extension", "Leg Curl", "Lunges", "Calf Raise",
            "Deadlift (Barbell)", "Romanian Deadlift", "Barbell Row", "Dumbbell Row", "Lat Pulldown", "Pull-Up", "Seated Cable Row",
            "Overhead Press", "Lateral Raise", "Front Raise", "Rear Delt Fly", "Shrugs",
            "Bicep Curl (Barbell)", "Dumbbell Hammer Curl", "Preacher Curl",
            "Tricep Pushdown", "Overhead Tricep Extension", "Skull Crusher", "Dips",
            "Plank", "Crunch", "Hanging Leg Raise"
        ].sort();

        function switchView(viewId, element) {
            if (activeWorkout && viewId !== 'active-workout-view') {
                alert("Please finish or cancel your active workout first!");
                return;
            }
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(viewId).classList.add('active');
            if (element) element.classList.add('active');
            
            if(viewId === 'history-view') renderHistory();
            if(viewId === 'weight-view') renderBodyweight();
        }

        function startNewWorkout() {
            activeWorkout = { date: new Date().toLocaleDateString(), exercises: [] };
            secondsElapsed = 0;
            
            document.getElementById('main-header').style.display = 'none';
            document.getElementById('main-nav').style.display = 'none';
            document.getElementById('current-exercises-list').innerHTML = '';
            
            switchView('active-workout-view', null);
            
            timerInterval = setInterval(() => {
                secondsElapsed++;
                updateTimerDisplay();
            }, 1000);
        }

        function updateTimerDisplay() {
            const hrs = String(Math.floor(secondsElapsed / 3600)).padStart(2, '0');
            const mins = String(Math.floor((secondsElapsed % 3600) / 60)).padStart(2, '0');
            const secs = String(secondsElapsed % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${hrs}:${mins}:${secs}`;
        }

        function openExerciseModal() {
            document.getElementById('exercise-modal').style.display = 'flex';
            document.getElementById('modal-search').value = '';
            document.getElementById('modal-search').focus();
            filterExercises('');
        }

        function closeExerciseModal(event) {
            document.getElementById('exercise-modal').style.display = 'none';
        }

        function filterExercises(query) {
            const container = document.getElementById('modal-list-container');
            container.innerHTML = '';
            
            const filtered = exerciseLibrary.filter(ex => ex.toLowerCase().includes(query.toLowerCase().trim()));
            
            filtered.forEach(exName => {
                const item = document.createElement('div');
                item.className = 'search-item';
                item.innerText = exName;
                item.onclick = () => {
                    selectExercise(exName);
                    closeExerciseModal();
                };
                container.appendChild(item);
            });

            const customBtn = document.getElementById('btn-add-custom');
            if (query.trim().length > 0) {
                customBtn.innerText = `Add "${query}"`;
                customBtn.style.display = 'block';
            } else {
                customBtn.style.display = 'none';
            }
        }

        function addCustomFromModal() {
            const query = document.getElementById('modal-search').value.trim();
            if (query) {
                selectExercise(query);
                closeExerciseModal();
            }
        }

        function selectExercise(name) {
            let existing = activeWorkout.exercises.find(e => e.name.toLowerCase() === name.toLowerCase());
            if (existing) return;

            const newEx = { name: name, sets: [] };
            activeWorkout.exercises.push(newEx);
            renderAllExerciseBlocks();
        }

        function renderAllExerciseBlocks() {
            const container = document.getElementById('current-exercises-list');
            container.innerHTML = '';
            
            activeWorkout.exercises.forEach((exObj, index) => {
                const blockHtml = `
                    <div class="exercise-block">
                        <div class="exercise-title">${exObj.name}</div>
                        <div id="sets-container-${index}"></div>
                        <button class="btn-mini-add" onclick="addSetToBlock(${index})">+ Add Set</button>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', blockHtml);
                
                if (!exObj.sets || exObj.sets.length === 0) {
                    exObj.sets = [];
                    addSetToBlock(index);
                } else {
                    const savedSets = [...exObj.sets];
                    exObj.sets = [];
                    savedSets.forEach(s => addSetToBlock(index, s.weight, s.reps));
                }
            });
        }

        function addSetToBlock(exIndex, optW = null, optR = null) {
            const exObj = activeWorkout.exercises[exIndex];
            const setsContainer = document.getElementById(`sets-container-${exIndex}`);
            const currentSetsCount = exObj.sets.length;
            const nextSetNum = currentSetsCount + 1;
            
            let placeholderWeight = "0";
            let placeholderReps = "0";
            
            for (let i = workouts.length - 1; i >= 0; i--) {
                const found = workouts[i].exercises.find(e => e.name.toLowerCase() === exObj.name.toLowerCase().trim());
                if (found && found.sets[currentSetsCount]) {
                    placeholderWeight = found.sets[currentSetsCount].weight;
                    placeholderReps = found.sets[currentSetsCount].reps;
                    break;
                } else if (found && found.sets.length > 0) {
                    const lastSet = found.sets[found.sets.length - 1];
                    placeholderWeight = lastSet.weight;
                    placeholderReps = lastSet.reps;
                    break;
                }
            }

            const newSetObj = {
                weight: optW !== null ? optW : (placeholderWeight === "0" ? "" : placeholderWeight),
                reps: optR !== null ? optR : (placeholderReps === "0" ? "" : placeholderReps)
            };
            exObj.sets.push(newSetObj);

            const rowIdx = currentSetsCount;
            const setRowHtml = `
                <div class="set-row" id="set-row-${exIndex}-${rowIdx}">
                    <span class="set-number">SET ${nextSetNum}</span>
                    <div class="input-wrapper">
                        <span class="input-label">wt</span>
                        <input type="number" id="w-${exIndex}-${rowIdx}" pattern="[0-9]*" 
                               value="${newSetObj.weight}" placeholder="${placeholderWeight}" 
                               oninput="syncSetData(${exIndex}, ${rowIdx})">
                    </div>
                    <div class="input-wrapper">
                        <span class="input-label">reps</span>
                        <input type="number" id="r-${exIndex}-${rowIdx}" pattern="[0-9]*" 
                               value="${newSetObj.reps}" placeholder="${placeholderReps}"
                               oninput="syncSetData(${exIndex}, ${rowIdx})">
                    </div>
                    <button class="btn-row-delete" onclick="deleteSetFromBlock(${exIndex}, ${rowIdx})">✕</button>
                </div>
            `;
            setsContainer.insertAdjacentHTML('beforeend', setRowHtml);
        }

        function syncSetData(exIdx, setIdx) {
            const wInput = document.getElementById(`w-${exIdx}-${setIdx}`);
            const rInput = document.getElementById(`r-${exIdx}-${setIdx}`);
            if (activeWorkout.exercises[exIdx] && activeWorkout.exercises[exIdx].sets[setIdx]) {
                activeWorkout.exercises[exIdx].sets[setIdx].weight = wInput.value;
                activeWorkout.exercises[exIdx].sets[setIdx].reps = rInput.value;
            }
        }

        function deleteSetFromBlock(exIdx, setIdx) {
            activeWorkout.exercises[exIdx].sets.splice(setIdx, 1);
            const container = document.getElementById(`sets-container-${exIdx}`);
            container.innerHTML = '';
            
            const currentSets = [...activeWorkout.exercises[exIdx].sets];
            activeWorkout.exercises[exIdx].sets = [];
            
            currentSets.forEach((s) => {
                addSetToBlock(exIdx, s.weight, s.reps);
            });
        }

        function exitActiveWorkoutMode() {
            clearInterval(timerInterval);
            activeWorkout = null;
            document.getElementById('timer').innerText = '00:00:00';
            document.getElementById('current-exercises-list').innerHTML = '';
            
            document.getElementById('main-header').style.display = 'block';
            document.getElementById('main-nav').style.display = 'flex';
            
            const workoutTab = document.querySelector('#main-nav .nav-item');
            switchView('home-view', workoutTab);
        }

        function endWorkout() {
            if (activeWorkout.exercises.length === 0) return;

            activeWorkout.exercises.forEach((ex) => {
                ex.sets.forEach(s => {
                    if (!s.weight) s.weight = "0";
                    if (!s.reps) s.reps = "0";
                });
            });

            activeWorkout.exercises = activeWorkout.exercises.filter(ex => ex.sets.length > 0);
            if (activeWorkout.exercises.length === 0) return;

            activeWorkout.duration = document.getElementById('timer').innerText;
            workouts.push(activeWorkout);
            localStorage.setItem('workouts', JSON.stringify(workouts));
            exitActiveWorkoutMode();
        }

        function cancelWorkout() {
            if (confirm("Cancel workout?")) {
                exitActiveWorkoutMode();
            }
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            if (workouts.length === 0) {
                container.innerHTML = '<p style="color:var(--muted-text); font-size:0.9rem; padding: 4px;">No workouts logged yet.</p>';
                return;
            }
            container.innerHTML = workouts.slice().reverse().map(w => {
                let exercisesHtml = w.exercises.map(ex => {
                    let setsText = ex.sets.map((s) => `${s.weight}×${s.reps}`).join(', ');
                    return `<div style="margin-top:10px;"><span style="font-weight:600;">${ex.name}</span> — <span style="color:var(--muted-text); font-size:0.9rem;">${setsText}</span></div>`;
                }).join('');
                return `
                    <div class="history-card">
                        <div style="display:flex; justify-content:space-between; font-size:0.85rem; color:var(--muted-text);">
                            <span>${w.date}</span>
                            <span>${w.duration || '00:00:00'}</span>
                        </div>
                        <div>${exercisesHtml}</div>
                    </div>
                `;
            }).join('');
        }

        function logBodyweight() {
            const wt = document.getElementById('body-weight-input').value;
            if(!wt) return;
            bodyweightLog.push({ id: Date.now(), date: new Date().toLocaleDateString(), weight: wt });
            localStorage.setItem('bodyweightLog', JSON.stringify(bodyweightLog));
            document.getElementById('body-weight-input').value = '';
            renderBodyweight();
        }

        function deleteBodyweight(id) {
            bodyweightLog = bodyweightLog.filter(entry => entry.id !== id);
            localStorage.setItem('bodyweightLog', JSON.stringify(bodyweightLog));
            renderBodyweight();
        }

        function renderBodyweight() {
            const container = document.getElementById('weight-history-list');
            if(bodyweightLog.length === 0) {
                container.innerHTML = '<p style="color:var(--muted-text); font-size:0.9rem; padding: 4px;">No weight logs yet.</p>';
                return;
            }
            container.innerHTML = bodyweightLog.slice().reverse().map(b => `
                <div class="weight-row">
                    <span style="color:var(--muted-text); font-size:0.9rem;">${b.date}</span>
                    <div style="display:flex; align-items:center; gap:20px;">
                        <span style="font-weight:600;">${b.weight} lbs</span>
                        <button class="btn-row-delete" onclick="deleteBodyweight(${b.id})">✕</button>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
