<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>liftr - Workout Logger</title>
    <style>
        :root {
            /* Premium Dark Mode Palette */
            --bg-base: #000000;
            --bg-surface: #121212;
            --bg-surface-elevated: #1e1e20;
            
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --text-placeholder: #52525b;
            
            --border-light: #27272a;
            
            --btn-primary-bg: #ffffff;
            --btn-primary-text: #000000;
            --btn-primary-hover: #e4e4e7;
            
            --check-active-bg: #22c55e;
            --check-active-text: #ffffff;
            --check-inactive-bg: #1e1e20;
            
            --tag-bg: #1e1e20;
            
            /* Custom Modifier Colors */
            --mod-bw: #3b82f6;      
            --mod-side: #f97316;    
            --mod-fail: #ef4444;    
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        #app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-base);
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Typography & Headers */
        h1, h2, h3 { margin: 0; font-weight: 700; letter-spacing: -0.5px; }
        
        header {
            padding: 24px 24px 16px;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 { font-size: 1.5rem; font-weight: 800; }
        
        .header-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        h2 { font-size: 1.6rem; margin-bottom: 20px; }

        /* Screens */
        .screen {
            display: none;
            padding: 20px 20px 120px;
            flex-grow: 1;
            animation: fadeIn 0.3s ease;
        }
        .screen.active { display: block; }
        
        #workout-screen.active, #exercise-modal.active {
            padding-top: 0;
            padding-left: 0;
            padding-right: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Buttons */
        .btn {
            background-color: var(--btn-primary-bg);
            color: var(--btn-primary-text);
            border: none;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn:active { transform: scale(0.98); }
        .btn:hover { background-color: var(--btn-primary-hover); }
        
        .btn-outline {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-light);
            transition: background-color 0.2s, border-color 0.2s;
        }
        .btn-outline:active {
            background-color: var(--bg-surface-elevated);
        }

        /* Cards */
        .card {
            background: var(--bg-surface);
            border: none;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 12px;
        }

        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-weight: 700;
            font-size: 1.05rem;
        }

        .icon-btn {
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 12px;
            transition: background-color 0.2s, color 0.2s;
        }
        .icon-btn:active { background-color: var(--bg-surface-elevated); color: var(--text-main); }

        /* Active Workout Top Bar */
        .workout-top-bar {
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 50;
            padding: 16px 20px;
            margin-bottom: 12px;
        }

        .workout-name-input {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.3rem;
            font-weight: 800;
            width: 100%;
            padding: 0;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        .workout-name-input:focus { outline: none; }
        .workout-name-input::placeholder { color: var(--text-placeholder); }

        .workout-controls { display: flex; justify-content: space-between; align-items: center; }

        .timer {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
        }

        .btn-small {
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
        }
        .btn-small.cancel {
            background-color: transparent;
            color: var(--mod-fail);
        }
        .btn-small.finish {
            background-color: var(--btn-primary-bg);
            color: var(--btn-primary-text);
        }

        /* Set Rows & Modifiers */
        .set-container {
            margin-bottom: 8px;
            padding: 4px 0;
            transition: opacity 0.2s;
        }
        .set-container.completed { opacity: 0.5; }
        .set-container.is-failure { background-color: rgba(239, 68, 68, 0.05); border-radius: 12px; padding: 4px 8px; margin-left: -8px; margin-right: -8px; }

        .set-row {
            display: grid;
            grid-template-columns: 24px 1fr 1fr 44px 36px;
            gap: 12px;
            align-items: center;
        }

        .set-number {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 700;
            text-align: center;
        }
        .set-number.side { color: var(--mod-side); }

        .input-group input {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-surface-elevated);
            border: 1px solid transparent;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            transition: background-color 0.2s;
        }
        .input-group input:focus { outline: none; background-color: #27272a; }
        .input-group input:disabled { background-color: var(--bg-base); opacity: 0.8; }
        .input-group input.bw-active:disabled { color: var(--mod-bw); font-weight: 700; }

        .check-btn {
            background: var(--check-inactive-bg);
            border: none;
            border-radius: 12px;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            transition: background-color 0.2s;
        }
        .set-container.completed .check-btn {
            background: var(--check-active-bg);
            color: var(--check-active-text);
        }

        /* Simplified Drawer Menu */
        .set-drawer {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 8px;
            padding-top: 12px;
            padding-left: 36px;
        }
        
        .mod-tag {
            background: var(--tag-bg);
            border: none;
            color: var(--text-muted);
            padding: 8px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }
        .mod-tag.bw.active { background: var(--mod-bw); color: #fff; }
        .mod-tag.side.active { background: var(--mod-side); color: #fff; }
        .mod-tag.fail.active { background: var(--mod-fail); color: #fff; }
        .mod-tag.delete { color: var(--mod-fail); background: transparent; padding: 8px 12px; }

        .add-set-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            padding: 12px;
            font-size: 0.95rem;
            border-radius: 12px;
            margin-top: 8px;
            transition: color 0.2s, background-color 0.2s;
        }
        .add-set-btn:active { background-color: var(--bg-surface-elevated); color: var(--text-main); }

        /* Filters */
        .filter-section {
            padding: 0 20px 12px;
            margin-bottom: 12px;
            position: sticky;
            top: 0;
            background: var(--bg-base);
            z-index: 10;
        }
        
        .filter-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 4px;
            scrollbar-width: none;
        }
        .filter-row::-webkit-scrollbar { display: none; }
        
        .filter-pill {
            background: var(--tag-bg);
            border: none;
            color: var(--text-muted);
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .filter-pill.active { background: var(--text-main); color: var(--bg-base); }

        /* Lists */
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            cursor: pointer;
            border-radius: 20px;
            margin-bottom: 4px;
        }
        .list-item:active { background-color: var(--bg-surface); }
        .list-item-title { font-weight: 600; font-size: 1.05rem; margin-bottom: 4px; }
        .list-item-sub { color: var(--text-muted); font-size: 0.85rem; }

        /* Bottom Navigation */
        #bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 480px;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
            z-index: 20;
        }
        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .nav-btn svg { width: 24px; height: 24px; stroke-width: 2.5; }
        .nav-btn.active { color: var(--text-main); }

        /* Inputs */
        .text-input {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            background-color: var(--bg-surface);
            color: var(--text-main);
            margin-bottom: 16px;
            font-size: 1rem;
            font-weight: 500;
        }
        .text-input:focus { outline: none; background-color: var(--bg-surface-elevated); }

        .empty-state { text-align: center; color: var(--text-muted); margin-top: 60px; font-size: 0.95rem; font-weight: 500; }

        .detail-exercise { margin-bottom: 24px; }
        .detail-set-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .detail-set-row span { font-weight: 700; color: var(--text-main); }
        .detail-tags { display: flex; gap: 6px; margin-left: 12px; }
        .d-tag { font-size: 0.7rem; padding: 4px 8px; border-radius: 6px; color: #fff; font-weight: 700; }
        .d-tag.bw { background: var(--mod-bw); }
        .d-tag.side { background: var(--mod-side); }
        .d-tag.fail { background: var(--mod-fail); }
    </style>
</head>
<body>

<div id="app-container">
    <header id="main-header">
        <h1>liftr</h1>
        <button id="header-action" class="header-btn" style="display:none;" onclick="goBack()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back
        </button>
    </header>

    <div id="home-screen" class="screen active">
        <div style="text-align: center; margin-top: 60px; margin-bottom: 80px;">
            <h2 id="streak-text" style="font-size: 4.5rem; margin-bottom: 0; font-weight: 800; letter-spacing: -2px;">0</h2>
            <p style="color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem;">Workouts Completed</p>
        </div>
        <button class="btn" onclick="startWorkout()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            Start Empty Workout
        </button>
    </div>

    <div id="history-screen" class="screen">
        <h2>History</h2>
        <div id="history-list">
            <div class="empty-state">No workouts logged yet.</div>
        </div>
    </div>

    <div id="workout-detail-screen" class="screen">
        <h2 id="detail-title" style="margin-bottom: 8px;">Workout</h2>
        <p id="detail-stats" style="color: var(--text-muted); margin-top: 0; margin-bottom: 32px; font-weight: 500;"></p>
        <div id="detail-exercises"></div>
        <div style="margin-top: 40px; padding-top: 24px;">
            <button class="btn btn-outline" style="color: var(--mod-fail); border: none; background: rgba(239, 68, 68, 0.1);" id="delete-workout-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"/></svg>
                Delete Log
            </button>
        </div>
    </div>

    <div id="weight-screen" class="screen">
        <h2>Body Weight</h2>
        <div style="display: flex; gap: 12px; margin-bottom: 32px;">
            <input type="number" id="new-weight" class="text-input" placeholder="Enter weight (lbs)" step="0.1" style="margin-bottom: 0;">
            <button class="btn" style="width: auto; border-radius: 16px;" onclick="logWeight()">Log</button>
        </div>
        <div id="weight-list">
            <div class="empty-state">No weight logged yet.</div>
        </div>
    </div>

    <div id="workout-screen" class="screen">
        <div class="workout-top-bar">
            <input type="text" id="workout-name-input" class="workout-name-input" placeholder="Workout Name...">
            <div class="workout-controls">
                <button class="btn-small cancel" onclick="cancelWorkout()">Cancel</button>
                <div id="workout-timer" class="timer">00:00</div>
                <button class="btn-small finish" onclick="finishWorkout()">Finish</button>
            </div>
        </div>
        
        <div style="padding: 0 20px;">
            <div id="workout-cards"></div>
            <button class="btn btn-outline" style="margin-bottom: 24px;" onclick="showExerciseModal()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                Add Exercise
            </button>
        </div>
    </div>

    <div id="exercise-modal" class="screen">
        <div class="filter-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; margin-top: 16px;">
                <h2 style="margin: 0;">Select Exercise</h2>
                <button class="header-btn" onclick="hideExerciseModal()">Close</button>
            </div>
            <input type="text" id="search-exercise" class="text-input" placeholder="Search..." onkeyup="filterExercises()" style="margin-bottom: 16px;">
            
            <div class="filter-row" id="muscle-filters">
                <button class="filter-pill active" onclick="setCategory('All')">All</button>
                <button class="filter-pill" onclick="setCategory('Chest')">Chest</button>
                <button class="filter-pill" onclick="setCategory('Back')">Back</button>
                <button class="filter-pill" onclick="setCategory('Legs')">Legs</button>
                <button class="filter-pill" onclick="setCategory('Shoulders')">Shoulders</button>
                <button class="filter-pill" onclick="setCategory('Arms')">Arms</button>
                <button class="filter-pill" onclick="setCategory('Core')">Core</button>
            </div>
            
            <div class="filter-row" id="equipment-filters">
                <button class="filter-pill active" onclick="setEquipment('All')">All</button>
                <button class="filter-pill" onclick="setEquipment('Barbell')">Barbell</button>
                <button class="filter-pill" onclick="setEquipment('Dumbbell')">Dumbbell</button>
                <button class="filter-pill" onclick="setEquipment('Machine')">Machine</button>
                <button class="filter-pill" onclick="setEquipment('Cable')">Cable</button>
                <button class="filter-pill" onclick="setEquipment('Bodyweight')">Bodyweight</button>
            </div>
        </div>

        <div id="exercise-list"></div>
    </div>

    <nav id="bottom-nav">
        <button class="nav-btn active" id="nav-home" onclick="navigate('home')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6.5 6.5h11M6.5 17.5h11m-11-11v11m11-11v11M4 6.5h2.5M17.5 6.5H20M4 17.5h2.5m11 0H20M4 12h16"/></svg>
            Workout
        </button>
        <button class="nav-btn" id="nav-history" onclick="navigate('history')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            History
        </button>
        <button class="nav-btn" id="nav-weight" onclick="navigate('weight')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><path d="M12 8v4"></path><path d="M8 12h8"></path></svg>
            Weight
        </button>
    </nav>
</div>

        { name: "Bodyweight Crunch", category: "Core", equipment: "Bodyweight" },
        { name: "Bodyweight Hanging Leg Raise", category: "Core", equipment: "Bodyweight" },
        { name: "Bodyweight Russian Twist", category: "Core", equipment: "Bodyweight" },
        { name: "Cable Crunch", category: "Core", equipment: "Cable" },
        { name: "Machine Ab Wheel Rollout", category: "Core", equipment: "Machine" }
    ].sort((a, b) => a.name.localeCompare(b.name));

    let currentWorkout = [];
    let workoutTimerInterval;
    let secondsElapsed = 0;
    
    let activeCategory = 'All';
    let activeEquipment = 'All';

    let workoutHistory = []; 
    let weightHistory = [];  

    function navigate(tab) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(tab + '-screen').classList.add('active');
        
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('nav-' + tab).classList.add('active');
        
        document.getElementById('bottom-nav').style.display = 'flex';
        document.getElementById('main-header').style.display = 'flex';
        document.getElementById('header-action').style.display = 'none';
        document.querySelector('header h1').innerText = 'liftr';
        
        if (tab === 'history') renderHistory();
        if (tab === 'weight') renderWeight();
    }

    function showWorkoutScreen() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('workout-screen').classList.add('active');
        document.getElementById('bottom-nav').style.display = 'none';
        document.getElementById('main-header').style.display = 'none';
    }

    function goBack() { navigate('history'); }

    function getPreviousExerciseData(exerciseName) {
        for (let i = 0; i < workoutHistory.length; i++) {
            const pastEx = workoutHistory[i].exercises.find(e => e.name === exerciseName);
            if (pastEx && pastEx.sets.length > 0) {
                return pastEx.sets.map(s => ({
                    weight: s.weight, reps: s.reps, completed: false,
                    isBW: s.isBW || false, side: 'none', isFailure: false, menuOpen: false
                }));
            }
        }
        return [{ weight: '', reps: '', completed: false, isBW: false, side: 'none', isFailure: false, menuOpen: false }];
    }

    function startWorkout() {
        currentWorkout = [];
        secondsElapsed = 0;
        document.getElementById('workout-name-input').value = '';
        document.getElementById('workout-cards').innerHTML = '';
        updateTimerDisplay();
        workoutTimerInterval = setInterval(() => {
            secondsElapsed++;
            updateTimerDisplay();
        }, 1000);
        showWorkoutScreen();
    }

    function updateTimerDisplay() {
        const mins = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
        const secs = (secondsElapsed % 60).toString().padStart(2, '0');
        document.getElementById('workout-timer').innerText = `${mins}:${secs}`;
    }

    function finishWorkout() {
        if (currentWorkout.length === 0) {
            alert("Add some exercises before finishing!");
            return;
        }
        clearInterval(workoutTimerInterval);
        
        let customName = document.getElementById('workout-name-input').value.trim();
        if (!customName) customName = "Workout";

        const dateStr = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        const volume = calculateTotalVolume();
        
        const savedExercises = JSON.parse(JSON.stringify(currentWorkout)).map(ex => {
            ex.sets.forEach(s => delete s.menuOpen);
            return ex;
        });

        workoutHistory.unshift({
            id: Date.now(), name: customName, date: dateStr,
            duration: document.getElementById('workout-timer').innerText,
            volume: volume, exercises: savedExercises
        });

        document.getElementById('streak-text').innerText = workoutHistory.length;
        navigate('home');
    }
    
    function cancelWorkout() {
        if(confirm("Cancel workout? No data will be saved.")) {
            clearInterval(workoutTimerInterval);
            navigate('home');
        }
    }
    
    function calculateTotalVolume() {
        let vol = 0;
        currentWorkout.forEach(ex => {
            ex.sets.forEach(set => {
                if(set.completed && !set.isBW && set.weight && set.reps) {
                    vol += (parseFloat(set.weight) * parseInt(set.reps));
                }
            });
        });
        return vol;
    }

    function showExerciseModal() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('exercise-modal').classList.add('active');
        document.getElementById('main-header').style.display = 'none';
        filterExercises();
    }

    function hideExerciseModal() { showWorkoutScreen(); }
    
    function setCategory(cat) {
        activeCategory = cat;
        document.querySelectorAll('#muscle-filters .filter-pill').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === cat || (cat === 'All' && btn.innerText === 'All'));
        });
        filterExercises();
    }
    
    function setEquipment(eq) {
        activeEquipment = eq;
        document.querySelectorAll('#equipment-filters .filter-pill').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === eq || (eq === 'All' && btn.innerText === 'All'));
        });
        filterExercises();
    }

    function filterExercises() {
        const query = document.getElementById('search-exercise').value.toLowerCase();
        const filtered = exerciseDatabase.filter(ex => {
            const matchesText = ex.name.toLowerCase().includes(query);
            const matchesCat = activeCategory === 'All' || ex.category === activeCategory;
            const matchesEq = activeEquipment === 'All' || ex.equipment === activeEquipment;
            return matchesText && matchesCat && matchesEq;
        });
        renderExerciseList(filtered);
    }

    function renderExerciseList(list) {
        const container = document.getElementById('exercise-list');
        container.innerHTML = '';
        
        if(list.length === 0) {
            container.innerHTML = '<div class="empty-state">No exercises found.</div>';
            return;
        }
        
        list.forEach(ex => {
            const item = document.createElement('div');
            item.className = 'list-item';
            item.innerHTML = `<div><div class="list-item-title">${ex.name}</div><div class="list-item-sub">${ex.category}</div></div>`;
            item.onclick = () => addExerciseToWorkout(ex.name);
            container.appendChild(item);
        });
    }

    function addExerciseToWorkout(exerciseName) {
        currentWorkout.push({ id: Date.now(), name: exerciseName, sets: getPreviousExerciseData(exerciseName) });
        hideExerciseModal();
        renderWorkout();
    }

    function removeExercise(exerciseId) {
        if(confirm("Remove this exercise?")) {
            currentWorkout = currentWorkout.filter(ex => ex.id !== exerciseId);
            renderWorkout();
        }
    }

    function addSet(exerciseId) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        const lastSet = exercise.sets[exercise.sets.length - 1];
        exercise.sets.push({ 
            weight: lastSet ? lastSet.weight : '', reps: lastSet ? lastSet.reps : '', 
            completed: false, isBW: lastSet ? lastSet.isBW : false,
            side: 'none', isFailure: false, menuOpen: false
        });
        renderWorkout();
    }
    
    function removeSet(exerciseId, setIndex) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        exercise.sets.splice(setIndex, 1);
        renderWorkout();
    }

    function toggleSet(exerciseId, setIndex) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        exercise.sets[setIndex].completed = !exercise.sets[setIndex].completed;
        renderWorkout();
    }
    
    function toggleSetMenu(exerciseId, setIndex) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        exercise.sets[setIndex].menuOpen = !exercise.sets[setIndex].menuOpen;
        renderWorkout();
    }

    function updateSetData(exerciseId, setIndex, field, value) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        exercise.sets[setIndex][field] = value;
    }

    function toggleMod(exerciseId, setIndex, modType) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        const set = exercise.sets[setIndex];
        
        if (modType === 'BW') {
            set.isBW = !set.isBW;
            if (set.isBW) set.weight = 'BW'; 
            else set.weight = '';
        } else if (modType === 'Side') {
            if (set.side === 'none') set.side = 'L';
            else if (set.side === 'L') set.side = 'R';
            else set.side = 'none';
        } else if (modType === 'Fail') {
            set.isFailure = !set.isFailure;
        }
        renderWorkout();
    }

    function renderWorkout() {
        const container = document.getElementById('workout-cards');
        container.innerHTML = '';

        currentWorkout.forEach(exercise => {
            const card = document.createElement('div');
            card.className = 'card';

            const header = document.createElement('div');
            header.className = 'exercise-header';
            header.innerHTML = `
                <span>${exercise.name}</span>
                <button class="icon-btn" style="color: var(--mod-fail);" onclick="removeExercise(${exercise.id})">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            `;
            card.appendChild(header);

            exercise.sets.forEach((set, index) => {
                const setContainer = document.createElement('div');
                setContainer.className = `set-container ${set.completed ? 'completed' : ''} ${set.isFailure ? 'is-failure' : ''}`;
                
                let weightPlaceholder = 'lbs';
                let weightValue = set.weight;
                if(set.isBW) { weightPlaceholder = 'BW'; weightValue = 'BW'; }
                
                let setNumDisplay = index + 1;
                if(set.side === 'L') setNumDisplay = 'L';
                if(set.side === 'R') setNumDisplay = 'R';
                
                setContainer.innerHTML = `
                    <div class="set-row">
                        <div class="set-number ${set.side !== 'none' ? 'side' : ''}">${setNumDisplay}</div>
                        <div class="input-group">
                            <input type="${set.isBW ? 'text' : 'number'}" placeholder="${weightPlaceholder}" value="${weightValue}" class="${set.isBW ? 'bw-active' : ''}" onchange="updateSetData(${exercise.id}, ${index}, 'weight', this.value)" ${set.completed || set.isBW ? 'disabled' : ''}>
                        </div>
                        <div class="input-group">
                            <input type="number" placeholder="reps" value="${set.reps}" onchange="updateSetData(${exercise.id}, ${index}, 'reps', this.value)" ${set.completed ? 'disabled' : ''}>
                        </div>
                        <button class="check-btn" onclick="toggleSet(${exercise.id}, ${index})">
                            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M20 6L9 17l-5-5"/></svg>
                        </button>
                        <button class="icon-btn" onclick="toggleSetMenu(${exercise.id}, ${index})">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1.5"></circle><circle cx="12" cy="5" r="1.5"></circle><circle cx="12" cy="19" r="1.5"></circle></svg>
                        </button>
                    </div>
                    
                    ${set.menuOpen ? `
                    <div class="set-drawer">
                        <button class="mod-tag bw ${set.isBW ? 'active' : ''}" onclick="toggleMod(${exercise.id}, ${index}, 'BW')">BW</button>
                        <button class="mod-tag side ${set.side !== 'none' ? 'active' : ''}" onclick="toggleMod(${exercise.id}, ${index}, 'Side')">L / R</button>
                        <button class="mod-tag fail ${set.isFailure ? 'active' : ''}" onclick="toggleMod(${exercise.id}, ${index}, 'Fail')">F</button>
                        <button class="mod-tag delete" onclick="removeSet(${exercise.id}, ${index})">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
                        </button>
                    </div>
                    ` : ''}
                `;
                card.appendChild(setContainer);
            });

            const addSetBtn = document.createElement('button');
            addSetBtn.className = 'add-set-btn';
            addSetBtn.innerText = '+ Add Set';
            addSetBtn.onclick = () => addSet(exercise.id);
            card.appendChild(addSetBtn);

            container.appendChild(card);
        });
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        if(workoutHistory.length === 0) {
            list.innerHTML = '<div class="empty-state">No workouts logged yet.</div>';
            return;
        }
        
        workoutHistory.forEach(workout => {
            const exCount = workout.exercises.length;
            const item = document.createElement('div');
            item.className = 'list-item card';
            item.onclick = () => viewWorkoutInfo(workout.id);
            item.innerHTML = `
                <div>
                    <div class="list-item-title">${workout.name}</div>
                    <div class="list-item-sub">${workout.date} • ${exCount} Exercises</div>
                </div>
                <div style="color: var(--text-muted); font-weight: 600;">${workout.duration}</div>
            `;
            list.appendChild(item);
        });
    }

    function viewWorkoutInfo(id) {
        const workout = workoutHistory.find(w => w.id === id);
        if (!workout) return;
        
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('workout-detail-screen').classList.add('active');
        document.getElementById('bottom-nav').style.display = 'none';
        
        document.getElementById('main-header').style.display = 'flex';
        document.querySelector('header h1').innerText = 'Summary';
        const backBtn = document.getElementById('header-action');
        backBtn.style.display = 'flex';
        backBtn.innerHTML = `<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back`;
        backBtn.onclick = goBack;

        document.getElementById('detail-title').innerText = workout.name;
        document.getElementById('detail-stats').innerText = `${workout.date} • ${workout.duration} • ${workout.volume} lbs Vol`;
        
        const exContainer = document.getElementById('detail-exercises');
        exContainer.innerHTML = '';
        
        workout.exercises.forEach(ex => {
            let html = `<div class="detail-exercise card"><div style="font-weight: 700; font-size: 1.05rem; margin-bottom: 12px;">${ex.name}</div>`;
            ex.sets.forEach((set, idx) => {
                if (set.completed) {
                    let weightStr = set.isBW ? 'BW' : (set.weight || '0');
                    let tagsHtml = '';
                    if (set.isBW) tagsHtml += `<span class="d-tag bw">BW</span>`;
                    if (set.side === 'L') tagsHtml += `<span class="d-tag side">L</span>`;
                    if (set.side === 'R') tagsHtml += `<span class="d-tag side">R</span>`;
                    if (set.isFailure) tagsHtml += `<span class="d-tag fail">F</span>`;
                    
                    html += `
                        <div class="detail-set-row" style="background: ${set.isFailure ? 'rgba(239, 68, 68, 0.05)' : 'transparent'}; padding: 8px 12px; margin: 0 -12px; border-radius: 12px;">
                            <div>Set ${idx + 1}</div>
                            <div style="display:flex; align-items:center;">
                                <span>${weightStr}</span> &nbsp;×&nbsp; <span>${set.reps || 0}</span>
                                <div class="detail-tags">${tagsHtml}</div>
                            </div>
                        </div>
                    `;
                }
            });
            html += `</div>`;
            exContainer.innerHTML += html;
        });

        document.getElementById('delete-workout-btn').onclick = () => {
            if(confirm("Delete this workout log?")) {
                workoutHistory = workoutHistory.filter(w => w.id !== id);
                document.getElementById('streak-text').innerText = workoutHistory.length;
                goBack();
            }
        };
    }

    function logWeight() {
        const input = document.getElementById('new-weight');
        if (!input.value) return;
        const date = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        weightHistory.unshift({ id: Date.now(), date: date, weight: input.value });
        input.value = '';
        renderWeight();
    }
    
    function deleteWeight(id) {
        if(confirm("Delete this entry?")) {
            weightHistory = weightHistory.filter(w => w.id !== id);
            renderWeight();
        }
    }
    
    function renderWeight() {
        const list = document.getElementById('weight-list');
        list.innerHTML = '';
        if(weightHistory.length === 0) {
            list.innerHTML = '<div class="empty-state">No weight logged yet.</div>';
            return;
        }
        weightHistory.forEach(entry => {
            const item = document.createElement('div');
            item.className = 'list-item card';
            item.innerHTML = `
                <div>
                    <div class="list-item-title">${entry.weight} lbs</div>
                    <div class="list-item-sub">${entry.date}</div>
                </div>
                <button class="icon-btn" onclick="deleteWeight(${entry.id})" style="color: var(--mod-fail);">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            `;
            list.appendChild(item);
        });
    }
</script>

</body>
</html>
