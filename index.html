<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>liftr - Workout Logger</title>
    <style>
        :root {
            /* Premium Grayscale Dark Mode */
            --bg-base: #09090b;
            --bg-surface: #18181b;
            --bg-surface-elevated: #27272a;
            
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --text-placeholder: #52525b;
            
            --border: #3f3f46;
            --border-light: #52525b;
            
            --btn-primary-bg: #f4f4f5;
            --btn-primary-text: #09090b;
            --btn-primary-hover: #e4e4e7;
            
            --check-active-bg: #f4f4f5;
            --check-active-text: #09090b;
            --check-inactive-bg: #27272a;
            
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        #app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-base);
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Typography & Headers */
        header {
            padding: 24px 24px 16px;
            background-color: rgba(9, 9, 11, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        
        .header-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            padding: 8px;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        /* Screens */
        .screen {
            display: none;
            padding: 16px 24px 120px;
            flex-grow: 1;
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Buttons */
        .btn {
            background-color: var(--btn-primary-bg);
            color: var(--btn-primary-text);
            border: none;
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s, background-color 0.2s;
        }

        .btn:active { transform: scale(0.98); }
        .btn:hover { background-color: var(--btn-primary-hover); }
        
        .btn-outline {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
        }
        
        .btn-danger {
            background-color: transparent;
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Cards */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            transition: transform 0.2s;
        }

        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .icon-btn {
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 50%;
            transition: background-color 0.2s;
        }
        
        .icon-btn:hover {
            color: var(--text-main);
            background-color: var(--bg-surface-elevated);
        }

        /* Set Rows */
        .set-row {
            display: grid;
            grid-template-columns: 24px 1fr 1fr 44px 24px;
            gap: 12px;
            align-items: center;
            margin-bottom: 8px;
            padding: 8px 0;
            border-radius: 12px;
            transition: opacity 0.2s;
        }

        .set-row.completed {
            opacity: 0.6;
        }

        .set-number {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 700;
            text-align: center;
        }

        .input-group {
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            transition: border-color 0.2s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: var(--text-main);
            background-color: var(--bg-surface-elevated);
        }
        
        .input-group input::placeholder {
            color: var(--text-placeholder);
            font-weight: 400;
        }

        .check-btn {
            background: var(--check-inactive-bg);
            border: none;
            border-radius: 12px;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: transparent;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .set-row.completed .check-btn {
            background: var(--check-active-bg);
            color: var(--check-active-text);
        }

        .add-set-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            padding: 16px;
            text-align: center;
            border-radius: 12px;
            margin-top: 8px;
            transition: background-color 0.2s;
        }
        
        .add-set-btn:hover {
            background-color: var(--bg-surface-elevated);
            color: var(--text-main);
        }

        /* History & Weight Lists */
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .list-item:active { background-color: var(--bg-surface); }
        .list-item:last-child { border-bottom: none; }
        
        .list-item-title { font-weight: 600; font-size: 1.1rem; margin-bottom: 4px; }
        .list-item-sub { color: var(--text-muted); font-size: 0.9rem; }

        /* Bottom Navigation */
        #bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 480px;
            background-color: rgba(24, 24, 27, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
            z-index: 20;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 100px;
            transition: all 0.2s;
        }

        .nav-btn.active {
            color: var(--bg-base);
            background-color: var(--text-main);
        }

        /* Inputs */
        .search-input {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background-color: var(--bg-surface);
            color: var(--text-main);
            margin-bottom: 16px;
            font-size: 1rem;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--text-main);
        }
        
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            margin-top: 60px;
            font-size: 0.95rem;
        }

        /* Workout Detail View */
        .detail-exercise {
            margin-bottom: 24px;
        }
        .detail-set-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
        }
        .detail-set-row span { font-weight: 600; color: var(--text-main); }
    </style>
</head>
<body>

<div id="app-container">
    <header id="main-header">
        <h1>liftr</h1>
        <button id="header-action" class="header-btn" style="display:none;" onclick="goBack()">Back</button>
    </header>

    <div id="home-screen" class="screen active">
        <div style="text-align: center; margin-top: 60px; margin-bottom: 80px;">
            <h2 id="streak-text" style="font-size: 4rem; margin-bottom: 0; font-weight: 800; letter-spacing: -2px;">0</h2>
            <p style="color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem;">Workouts Completed</p>
        </div>
        <button class="btn" onclick="startWorkout()">Start Empty Workout</button>
    </div>

    <div id="history-screen" class="screen">
        <h2 style="margin-top: 0;">History</h2>
        <div class="card" style="padding: 0; border: none; overflow: hidden; background: transparent;">
            <div id="history-list">
                <div class="empty-state">No workouts logged yet.</div>
            </div>
        </div>
    </div>

    <div id="workout-detail-screen" class="screen">
        <h2 id="detail-title" style="margin-top: 0; margin-bottom: 8px;">Workout</h2>
        <p id="detail-stats" style="color: var(--text-muted); margin-top: 0; margin-bottom: 32px;"></p>
        
        <div id="detail-exercises"></div>
        
        <div style="margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border);">
            <button class="btn btn-danger" id="delete-workout-btn">Delete Workout</button>
        </div>
    </div>

    <div id="weight-screen" class="screen">
        <h2 style="margin-top: 0;">Body Weight</h2>
        <div style="display: flex; gap: 12px; margin-bottom: 32px;">
            <input type="number" id="new-weight" class="search-input" placeholder="Enter weight (lbs)" step="0.1" style="margin-bottom: 0;">
            <button class="btn" style="width: auto; border-radius: 16px;" onclick="logWeight()">Log</button>
        </div>
        <div class="card" style="padding: 0; overflow: hidden; border: none; background: transparent;">
            <div id="weight-list">
                <div class="empty-state">No weight logged yet.</div>
            </div>
        </div>
    </div>

    <div id="workout-screen" class="screen">
        <div id="workout-timer" style="text-align: center; font-weight: 800; font-size: 1.5rem; margin-bottom: 24px; color: var(--text-main); font-variant-numeric: tabular-nums;">00:00</div>
        
        <div id="workout-cards"></div>

        <button class="btn btn-outline" style="margin-bottom: 24px;" onclick="showExerciseModal()">+ Add Exercise</button>
        <button class="btn" style="margin-bottom: 12px;" onclick="finishWorkout()">Finish Workout</button>
        <button class="btn btn-danger" onclick="cancelWorkout()">Cancel Workout</button>
    </div>

    <div id="exercise-modal" class="screen">
        <h2 style="margin-top: 0;">Select Exercise</h2>
        <input type="text" id="search-exercise" class="search-input" placeholder="Search exercises..." onkeyup="filterExercises()">
        <div class="card" style="padding: 0; overflow: hidden;">
            <div id="exercise-list"></div>
        </div>
    </div>

    <nav id="bottom-nav">
        <button class="nav-btn active" id="nav-home" onclick="navigate('home')">Workout</button>
        <button class="nav-btn" id="nav-history" onclick="navigate('history')">History</button>
        <button class="nav-btn" id="nav-weight" onclick="navigate('weight')">Weight</button>
    </nav>
</div>

<script>
    // --- Data ---
    const exerciseDatabase = [
        { name: "Barbell Bench Press", category: "Chest" },
        { name: "Incline Dumbbell Press", category: "Chest" },
        { name: "Cable Crossover", category: "Chest" },
        { name: "Push-Ups", category: "Chest" },
        { name: "Barbell Squat", category: "Legs" },
        { name: "Leg Press", category: "Legs" },
        { name: "Romanian Deadlift", category: "Legs" },
        { name: "Calf Raises", category: "Legs" },
        { name: "Deadlift", category: "Back" },
        { name: "Pull-Ups", category: "Back" },
        { name: "Lat Pulldown", category: "Back" },
        { name: "Barbell Row", category: "Back" },
        { name: "Overhead Press", category: "Shoulders" },
        { name: "Lateral Raises", category: "Shoulders" },
        { name: "Barbell Bicep Curl", category: "Arms" },
        { name: "Tricep Rope Pushdown", category: "Arms" },
        { name: "Plank", category: "Core" },
        { name: "Crunch", category: "Core" }
    ];

    let currentWorkout = [];
    let workoutTimerInterval;
    let secondsElapsed = 0;
    
    // Persistent Data 
    let workoutHistory = []; // format: { id, date, duration, volume, exercises: [] }
    let weightHistory = [];  // format: { id, date, weight }
    let viewHistoryId = null; // Track which past workout we are viewing

    // --- Navigation Functions ---
    function navigate(tab) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(tab + '-screen').classList.add('active');
        
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('nav-' + tab).classList.add('active');
        
        document.getElementById('bottom-nav').style.display = 'flex';
        document.getElementById('header-action').style.display = 'none';
        document.querySelector('header h1').innerText = 'liftr';
        
        if (tab === 'history') renderHistory();
        if (tab === 'weight') renderWeight();
    }

    function showWorkoutScreen() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('workout-screen').classList.add('active');
        document.getElementById('bottom-nav').style.display = 'none';
        document.getElementById('header-action').style.display = 'none';
        document.querySelector('header h1').innerText = 'Active Workout';
    }

    function goBack() {
        navigate('history');
    }

    // --- Autofill Logic ---
    function getPreviousExerciseData(exerciseName) {
        // Search history backwards for the most recent instance of this exercise
        for (let i = 0; i < workoutHistory.length; i++) {
            const pastWorkout = workoutHistory[i];
            const pastEx = pastWorkout.exercises.find(e => e.name === exerciseName);
            if (pastEx && pastEx.sets.length > 0) {
                // Return a deep copy of the sets, reset completion status
                return pastEx.sets.map(s => ({
                    weight: s.weight,
                    reps: s.reps,
                    completed: false
                }));
            }
        }
        // Default if never done before
        return [{ weight: '', reps: '', completed: false }];
    }

    // --- Workout Functions ---
    function startWorkout() {
        currentWorkout = [];
        secondsElapsed = 0;
        document.getElementById('workout-cards').innerHTML = '';
        updateTimerDisplay();
        workoutTimerInterval = setInterval(() => {
            secondsElapsed++;
            updateTimerDisplay();
        }, 1000);
        showWorkoutScreen();
    }

    function updateTimerDisplay() {
        const mins = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
        const secs = (secondsElapsed % 60).toString().padStart(2, '0');
        document.getElementById('workout-timer').innerText = `${mins}:${secs}`;
    }

    function finishWorkout() {
        if (currentWorkout.length === 0) {
            alert("Add some exercises before finishing!");
            return;
        }
        
        clearInterval(workoutTimerInterval);
        
        const date = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        const volume = calculateTotalVolume();
        
        // Save full workout
        workoutHistory.unshift({
            id: Date.now(),
            date: date,
            duration: document.getElementById('workout-timer').innerText,
            volume: volume,
            exercises: JSON.parse(JSON.stringify(currentWorkout)) // Deep copy
        });

        document.getElementById('streak-text').innerText = workoutHistory.length;
        navigate('home');
    }
    
    function cancelWorkout() {
        if(confirm("Cancel workout? No data will be saved.")) {
            clearInterval(workoutTimerInterval);
            navigate('home');
        }
    }
    
    function calculateTotalVolume() {
        let vol = 0;
        currentWorkout.forEach(ex => {
            ex.sets.forEach(set => {
                if(set.completed && set.weight && set.reps) {
                    vol += (parseFloat(set.weight) * parseInt(set.reps));
                }
            });
        });
        return vol;
    }

    // --- History & Detail View ---
    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        
        if(workoutHistory.length === 0) {
            list.innerHTML = '<div class="empty-state">No workouts logged yet.</div>';
            return;
        }
        
        workoutHistory.forEach(workout => {
            const exCount = workout.exercises.length;
            const item = document.createElement('div');
            item.className = 'list-item card';
            item.style.marginBottom = '12px';
            item.onclick = () => viewWorkoutInfo(workout.id);
            item.innerHTML = `
                <div>
                    <div class="list-item-title">${workout.date}</div>
                    <div class="list-item-sub">${exCount} Exercises • ${workout.volume} lbs Volume</div>
                </div>
                <div style="color: var(--text-muted); font-weight: 600;">${workout.duration}</div>
            `;
            list.appendChild(item);
        });
    }

    function viewWorkoutInfo(id) {
        const workout = workoutHistory.find(w => w.id === id);
        if (!workout) return;
        
        viewHistoryId = id;
        
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('workout-detail-screen').classList.add('active');
        document.getElementById('bottom-nav').style.display = 'none';
        
        // Header setup
        document.querySelector('header h1').innerText = 'Summary';
        const backBtn = document.getElementById('header-action');
        backBtn.style.display = 'block';
        backBtn.innerText = 'Back';
        backBtn.onclick = goBack;

        // Content
        document.getElementById('detail-title').innerText = workout.date;
        document.getElementById('detail-stats').innerText = `${workout.duration} • ${workout.volume} lbs Volume`;
        
        const exContainer = document.getElementById('detail-exercises');
        exContainer.innerHTML = '';
        
        workout.exercises.forEach(ex => {
            let html = `
                <div class="detail-exercise card">
                    <div style="font-weight: 700; font-size: 1.1rem; margin-bottom: 16px;">${ex.name}</div>
            `;
            
            ex.sets.forEach((set, idx) => {
                if (set.completed) {
                    html += `
                        <div class="detail-set-row">
                            <div>Set ${idx + 1}</div>
                            <div><span>${set.weight}</span> lbs × <span>${set.reps}</span></div>
                        </div>
                    `;
                }
            });
            html += `</div>`;
            exContainer.innerHTML += html;
        });

        // Setup delete button
        document.getElementById('delete-workout-btn').onclick = () => deleteWorkout(id);
    }

    function deleteWorkout(id) {
        if(confirm("Are you sure you want to delete this workout?")) {
            workoutHistory = workoutHistory.filter(w => w.id !== id);
            document.getElementById('streak-text').innerText = workoutHistory.length;
            goBack();
        }
    }

    // --- Weight Functions ---
    function logWeight() {
        const input = document.getElementById('new-weight');
        const val = input.value;
        if (!val) return;
        
        const date = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        weightHistory.unshift({ id: Date.now(), date: date, weight: val });
        
        input.value = '';
        renderWeight();
    }
    
    function deleteWeight(id) {
        if(confirm("Delete this entry?")) {
            weightHistory = weightHistory.filter(w => w.id !== id);
            renderWeight();
        }
    }
    
    function renderWeight() {
        const list = document.getElementById('weight-list');
        list.innerHTML = '';
        
        if(weightHistory.length === 0) {
            list.innerHTML = '<div class="empty-state">No weight logged yet.</div>';
            return;
        }
        
        weightHistory.forEach(entry => {
            const item = document.createElement('div');
            item.className = 'list-item card';
            item.style.marginBottom = '12px';
            item.innerHTML = `
                <div>
                    <div class="list-item-title">${entry.weight} lbs</div>
                    <div class="list-item-sub">${entry.date}</div>
                </div>
                <button class="icon-btn" onclick="deleteWeight(${entry.id})" style="color: var(--danger);">×</button>
            `;
            list.appendChild(item);
        });
    }

    // --- Exercise Modal Functions ---
    function showExerciseModal() {
        renderExerciseList(exerciseDatabase);
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('exercise-modal').classList.add('active');
        document.querySelector('header h1').innerText = 'Exercises';
        
        const cancelBtn = document.getElementById('header-action');
        cancelBtn.style.display = 'block';
        cancelBtn.innerText = 'Cancel';
        cancelBtn.onclick = hideExerciseModal;
    }

    function hideExerciseModal() {
        showWorkoutScreen();
    }

    function renderExerciseList(list) {
        const container = document.getElementById('exercise-list');
        container.innerHTML = '';
        
        list.forEach((ex, idx) => {
            const item = document.createElement('div');
            item.className = 'list-item';
            if (idx === list.length -1) item.style.borderBottom = 'none';
            item.innerHTML = `
                <div>
                    <div class="list-item-title">${ex.name}</div>
                    <div class="list-item-sub">${ex.category}</div>
                </div>
            `;
            item.onclick = () => addExerciseToWorkout(ex.name);
            container.appendChild(item);
        });
    }

    function filterExercises() {
        const query = document.getElementById('search-exercise').value.toLowerCase();
        const filtered = exerciseDatabase.filter(ex => ex.name.toLowerCase().includes(query));
        renderExerciseList(filtered);
    }

    // --- Logging Functions ---
    function addExerciseToWorkout(exerciseName) {
        // Use autofill to pull previous sets/reps
        const autofilledSets = getPreviousExerciseData(exerciseName);
        
        currentWorkout.push({
            id: Date.now(),
            name: exerciseName,
            sets: autofilledSets
        });
        hideExerciseModal();
        renderWorkout();
    }

    function removeExercise(exerciseId) {
        currentWorkout = currentWorkout.filter(ex => ex.id !== exerciseId);
        renderWorkout();
    }

    function addSet(exerciseId) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        const lastSet = exercise.sets[exercise.sets.length - 1];
        exercise.sets.push({ 
            weight: lastSet ? lastSet.weight : '', 
            reps: lastSet ? lastSet.reps : '', 
            completed: false 
        });
        renderWorkout();
    }
    
    function removeSet(exerciseId, setIndex) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        exercise.sets.splice(setIndex, 1);
        renderWorkout();
    }

    function toggleSet(exerciseId, setIndex) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        exercise.sets[setIndex].completed = !exercise.sets[setIndex].completed;
        renderWorkout();
    }

    function updateSetData(exerciseId, setIndex, field, value) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        exercise.sets[setIndex][field] = value;
    }

    // --- Rendering Functions ---
    function renderWorkout() {
        const container = document.getElementById('workout-cards');
        container.innerHTML = '';

        currentWorkout.forEach(exercise => {
            const card = document.createElement('div');
            card.className = 'card';

            // Card Header
            const header = document.createElement('div');
            header.className = 'exercise-header';
            header.innerHTML = `
                <span>${exercise.name}</span>
                <button class="icon-btn" style="color: var(--danger);" onclick="removeExercise(${exercise.id})">×</button>
            `;
            card.appendChild(header);

            // Sets
            exercise.sets.forEach((set, index) => {
                const setRow = document.createElement('div');
                setRow.className = `set-row ${set.completed ? 'completed' : ''}`;
                
                setRow.innerHTML = `
                    <div class="set-number">${index + 1}</div>
                    <div class="input-group">
                        <input type="number" placeholder="lbs" value="${set.weight}" onchange="updateSetData(${exercise.id}, ${index}, 'weight', this.value)" ${set.completed ? 'disabled' : ''}>
                    </div>
                    <div class="input-group">
                        <input type="number" placeholder="reps" value="${set.reps}" onchange="updateSetData(${exercise.id}, ${index}, 'reps', this.value)" ${set.completed ? 'disabled' : ''}>
                    </div>
                    <button class="check-btn" onclick="toggleSet(${exercise.id}, ${index})">✓</button>
                    <button class="icon-btn" style="font-size: 1rem;" onclick="removeSet(${exercise.id}, ${index})">×</button>
                `;
                card.appendChild(setRow);
            });

            // Add Set Button
            const addSetBtn = document.createElement('button');
            addSetBtn.className = 'add-set-btn';
            addSetBtn.innerText = '+ Add Set';
            addSetBtn.onclick = () => addSet(exercise.id);
            card.appendChild(addSetBtn);

            container.appendChild(card);
        });
    }
</script>

</body>
