<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>liftr - Workout Logger</title>
    <style>
        :root {
            /* Strict Grayscale Dark Mode Palette */
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --border: #3f3f46;
            
            --btn-primary-bg: #ffffff;
            --btn-primary-text: #000000;
            --btn-primary-hover: #e4e4e7;
            
            --btn-secondary-bg: #27272a;
            --btn-secondary-text: #ffffff;
            
            --set-completed-bg: #27272a;
            --check-active-bg: #ffffff;
            --check-active-text: #000000;
            --check-inactive-bg: #3f3f46;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        #app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-color);
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 24px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background-color: var(--bg-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .screen {
            display: none;
            padding: 24px;
            padding-bottom: 100px; /* Space for bottom nav */
            flex-grow: 1;
        }

        .screen.active {
            display: block;
        }

        /* Buttons */
        .btn {
            background-color: var(--btn-primary-bg);
            color: var(--btn-primary-text);
            border: none;
            padding: 16px 20px;
            border-radius: 20px; /* More rounded */
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .btn:hover { background-color: var(--btn-primary-hover); }
        
        .btn-outline {
            background-color: transparent;
            color: var(--text-main);
            border: 2px solid var(--border);
            margin-top: 12px;
        }
        
        .btn-danger {
            background-color: transparent;
            color: var(--text-muted);
            border: 2px solid var(--border);
            margin-top: 12px;
        }

        /* Bottom Navigation */
        #bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 480px;
            background-color: var(--card-bg);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 16px 0 calc(16px + env(safe-area-inset-bottom));
            z-index: 20;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .nav-btn.active {
            color: var(--text-main);
            background-color: var(--border);
        }

        /* Cards */
        .card {
            border: 1px solid var(--border);
            border-radius: 24px; /* More rounded */
            padding: 20px;
            margin-bottom: 20px;
            background: var(--card-bg);
        }

        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .delete-btn {
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            line-height: 1;
        }

        /* Set Rows */
        .set-row {
            display: grid;
            grid-template-columns: 40px 1fr 1fr 44px;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 16px; /* More rounded */
            transition: background 0.2s;
        }

        .set-row.completed {
            background-color: var(--set-completed-bg);
        }

        .set-number {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: center;
            font-weight: 700;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-align: center;
        }

        .input-group input {
            width: 100%;
            padding: 12px 8px;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            text-align: center;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: var(--text-main);
        }

        .check-btn {
            background: var(--check-inactive-bg);
            border: none;
            border-radius: 12px;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: transparent;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .set-row.completed .check-btn {
            background: var(--check-active-bg);
            color: var(--check-active-text);
        }

        .add-set-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            padding: 12px;
            text-align: center;
            border-radius: 12px;
            margin-top: 8px;
        }
        
        .add-set-btn:hover {
            background-color: var(--border);
            color: var(--text-main);
        }

        /* Exercise List Modal */
        #search-exercise {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background-color: var(--card-bg);
            color: var(--text-main);
            margin-bottom: 16px;
            font-size: 1rem;
        }

        .exercise-list-item {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            font-weight: 500;
        }

        .exercise-category {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 24px;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
        }
        
        /* History & Weight Styles */
        .history-item, .weight-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .weight-input-container {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }
        
        .weight-input-container input {
            flex-grow: 1;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background-color: var(--card-bg);
            color: var(--text-main);
            font-size: 1.2rem;
            text-align: center;
        }
        
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            margin-top: 40px;
        }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <h1>liftr</h1>
    </header>

    <div id="home-screen" class="screen active">
        <div style="text-align: center; margin-top: 60px; margin-bottom: 60px;">
            <h2 id="streak-text" style="font-size: 2.5rem; margin-bottom: 8px;">0</h2>
            <p style="color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Workouts</p>
        </div>
        <button class="btn" onclick="startWorkout()">Start Workout</button>
    </div>

    <div id="history-screen" class="screen">
        <h2 style="margin-top: 0;">Past Workouts</h2>
        <div id="history-list">
            <div class="empty-state">No workouts logged yet.</div>
        </div>
    </div>

    <div id="weight-screen" class="screen">
        <h2 style="margin-top: 0;">Body Weight</h2>
        <div class="weight-input-container">
            <input type="number" id="new-weight" placeholder="lbs" step="0.1">
            <button class="btn" style="width: auto;" onclick="logWeight()">Log</button>
        </div>
        <div class="card" style="padding: 0; overflow: hidden; border: none;">
            <div id="weight-list">
                <div class="empty-state" style="margin-top: 20px; padding-bottom: 20px;">No weight logged yet.</div>
            </div>
        </div>
    </div>

    <div id="workout-screen" class="screen">
        <div id="workout-timer" style="text-align: center; font-weight: 800; font-size: 1.5rem; margin-bottom: 24px; color: var(--text-main);">00:00</div>
        
        <div id="workout-cards"></div>

        <button class="btn btn-outline" onclick="showExerciseModal()">+ Add Exercise</button>
        <button class="btn" style="margin-top: 24px;" onclick="finishWorkout()">Finish Workout</button>
        <button class="btn btn-danger" onclick="cancelWorkout()">Cancel Workout</button>
    </div>

    <div id="exercise-modal" class="screen">
        <h2 style="margin-top: 0;">Select Exercise</h2>
        <input type="text" id="search-exercise" placeholder="Search exercises..." onkeyup="filterExercises()">
        <div id="exercise-list" style="margin-bottom: 24px;"></div>
        <button class="btn btn-outline" onclick="hideExerciseModal()">Cancel</button>
    </div>

    <nav id="bottom-nav">
        <button class="nav-btn active" id="nav-home" onclick="navigate('home')">Workout</button>
        <button class="nav-btn" id="nav-history" onclick="navigate('history')">History</button>
        <button class="nav-btn" id="nav-weight" onclick="navigate('weight')">Weight</button>
    </nav>
</div>

<script>
    // --- Data ---
    const exerciseDatabase = [
        { name: "Barbell Bench Press", category: "Chest" },
        { name: "Incline Dumbbell Press", category: "Chest" },
        { name: "Cable Crossover", category: "Chest" },
        { name: "Push-Ups", category: "Chest" },
        { name: "Barbell Squat", category: "Legs" },
        { name: "Leg Press", category: "Legs" },
        { name: "Romanian Deadlift", category: "Legs" },
        { name: "Calf Raises", category: "Legs" },
        { name: "Deadlift", category: "Back" },
        { name: "Pull-Ups", category: "Back" },
        { name: "Lat Pulldown", category: "Back" },
        { name: "Barbell Row", category: "Back" },
        { name: "Overhead Press", category: "Shoulders" },
        { name: "Lateral Raises", category: "Shoulders" },
        { name: "Barbell Bicep Curl", category: "Arms" },
        { name: "Tricep Rope Pushdown", category: "Arms" },
        { name: "Plank", category: "Core" },
        { name: "Crunch", category: "Core" }
    ];

    let currentWorkout = [];
    let workoutTimerInterval;
    let secondsElapsed = 0;
    
    // Persistent Data (simulated with arrays)
    let workoutHistory = [];
    let weightHistory = [];

    // --- Navigation Functions ---
    function navigate(tab) {
        // Hide all screens
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        
        // Show selected screen
        document.getElementById(tab + '-screen').classList.add('active');
        
        // Update nav buttons
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('nav-' + tab).classList.add('active');
        
        // Ensure bottom nav is visible
        document.getElementById('bottom-nav').style.display = 'flex';
        
        if (tab === 'history') renderHistory();
        if (tab === 'weight') renderWeight();
    }

    function showWorkoutScreen() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('workout-screen').classList.add('active');
        document.getElementById('bottom-nav').style.display = 'none'; // Hide nav during workout
    }

    // --- Workout Functions ---
    function startWorkout() {
        currentWorkout = [];
        secondsElapsed = 0;
        document.getElementById('workout-cards').innerHTML = '';
        updateTimerDisplay();
        workoutTimerInterval = setInterval(() => {
            secondsElapsed++;
            updateTimerDisplay();
        }, 1000);
        showWorkoutScreen();
    }

    function updateTimerDisplay() {
        const mins = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
        const secs = (secondsElapsed % 60).toString().padStart(2, '0');
        document.getElementById('workout-timer').innerText = `${mins}:${secs}`;
    }

    function finishWorkout() {
        if (currentWorkout.length === 0) {
            alert("Add some exercises before finishing!");
            return;
        }
        
        clearInterval(workoutTimerInterval);
        
        // Save to history
        const date = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const volume = calculateTotalVolume();
        
        workoutHistory.unshift({
            date: date,
            duration: document.getElementById('workout-timer').innerText,
            exercises: currentWorkout.length,
            volume: volume
        });

        document.getElementById('streak-text').innerText = workoutHistory.length;
        navigate('home');
    }
    
    function cancelWorkout() {
        if(confirm("Are you sure you want to cancel? This workout will not be saved.")) {
            clearInterval(workoutTimerInterval);
            navigate('home');
        }
    }
    
    function calculateTotalVolume() {
        let vol = 0;
        currentWorkout.forEach(ex => {
            ex.sets.forEach(set => {
                if(set.completed && set.weight && set.reps) {
                    vol += (parseFloat(set.weight) * parseInt(set.reps));
                }
            });
        });
        return vol;
    }

    // --- History & Weight Functions ---
    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        
        if(workoutHistory.length === 0) {
            list.innerHTML = '<div class="empty-state">No workouts logged yet.</div>';
            return;
        }
        
        workoutHistory.forEach(workout => {
            const item = document.createElement('div');
            item.className = 'card';
            item.innerHTML = `
                <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                    <strong>${workout.date}</strong>
                    <span style="color: var(--text-muted);">${workout.duration}</span>
                </div>
                <div style="color: var(--text-muted); font-size: 0.9rem;">
                    ${workout.exercises} Exercises • ${workout.volume} lbs Volume
                </div>
            `;
            list.appendChild(item);
        });
    }
    
    function logWeight() {
        const input = document.getElementById('new-weight');
        const val = input.value;
        if (!val) return;
        
        const date = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        weightHistory.unshift({ date: date, weight: val });
        
        input.value = '';
        renderWeight();
    }
    
    function renderWeight() {
        const list = document.getElementById('weight-list');
        list.innerHTML = '';
        
        if(weightHistory.length === 0) {
            list.innerHTML = '<div class="empty-state" style="margin-top: 20px; padding-bottom: 20px;">No weight logged yet.</div>';
            return;
        }
        
        weightHistory.forEach(entry => {
            const item = document.createElement('div');
            item.className = 'weight-item';
            item.innerHTML = `
                <span style="color: var(--text-muted);">${entry.date}</span>
                <strong>${entry.weight} lbs</strong>
            `;
            list.appendChild(item);
        });
    }

    // --- Exercise Modal Functions ---
    function showExerciseModal() {
        renderExerciseList(exerciseDatabase);
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('exercise-modal').classList.add('active');
    }

    function hideExerciseModal() {
        showWorkoutScreen();
    }

    function renderExerciseList(list) {
        const container = document.getElementById('exercise-list');
        container.innerHTML = '';
        
        let currentCategory = '';
        list.forEach(ex => {
            if (ex.category !== currentCategory) {
                const catHeader = document.createElement('div');
                catHeader.className = 'exercise-category';
                catHeader.innerText = ex.category;
                container.appendChild(catHeader);
                currentCategory = ex.category;
            }
            const item = document.createElement('div');
            item.className = 'exercise-list-item';
            item.innerText = ex.name;
            item.onclick = () => addExerciseToWorkout(ex.name);
            container.appendChild(item);
        });
    }

    function filterExercises() {
        const query = document.getElementById('search-exercise').value.toLowerCase();
        const filtered = exerciseDatabase.filter(ex => ex.name.toLowerCase().includes(query));
        renderExerciseList(filtered);
    }

    // --- Logging Functions ---
    function addExerciseToWorkout(exerciseName) {
        currentWorkout.push({
            id: Date.now(),
            name: exerciseName,
            sets: [{ weight: '', reps: '', completed: false }]
        });
        hideExerciseModal();
        renderWorkout();
    }

    function removeExercise(exerciseId) {
        currentWorkout = currentWorkout.filter(ex => ex.id !== exerciseId);
        renderWorkout();
    }

    function addSet(exerciseId) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        const lastSet = exercise.sets[exercise.sets.length - 1];
        exercise.sets.push({ 
            weight: lastSet ? lastSet.weight : '', 
            reps: lastSet ? lastSet.reps : '', 
            completed: false 
        });
        renderWorkout();
    }

    function toggleSet(exerciseId, setIndex) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        exercise.sets[setIndex].completed = !exercise.sets[setIndex].completed;
        renderWorkout();
    }

    function updateSetData(exerciseId, setIndex, field, value) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        exercise.sets[setIndex][field] = value;
    }

    // --- Rendering Functions ---
    function renderWorkout() {
        const container = document.getElementById('workout-cards');
        container.innerHTML = '';

        currentWorkout.forEach(exercise => {
            const card = document.createElement('div');
            card.className = 'card';

            // Card Header
            const header = document.createElement('div');
            header.className = 'exercise-header';
            header.innerHTML = `
                <span>${exercise.name}</span>
                <button class="delete-btn" onclick="removeExercise(${exercise.id})">×</button>
            `;
            card.appendChild(header);

            // Sets
            exercise.sets.forEach((set, index) => {
                const setRow = document.createElement('div');
                setRow.className = `set-row ${set.completed ? 'completed' : ''}`;
                
                setRow.innerHTML = `
                    <div class="set-number">${index + 1}</div>
                    <div class="input-group">
                        <label>lbs</label>
                        <input type="number" value="${set.weight}" onchange="updateSetData(${exercise.id}, ${index}, 'weight', this.value)" ${set.completed ? 'disabled' : ''}>
                    </div>
                    <div class="input-group">
                        <label>Reps</label>
                        <input type="number" value="${set.reps}" onchange="updateSetData(${exercise.id}, ${index}, 'reps', this.value)" ${set.completed ? 'disabled' : ''}>
                    </div>
                    <button class="check-btn" onclick="toggleSet(${exercise.id}, ${index})">✓</button>
                `;
                card.appendChild(setRow);
            });

            // Add Set Button
            const addSetBtn = document.createElement('button');
            addSetBtn.className = 'add-set-btn';
            addSetBtn.innerText = '+ Add Set';
            addSetBtn.onclick = () => addSet(exercise.id);
            card.appendChild(addSetBtn);

            container.appendChild(card);
        });
    }
</script>

</body>
</html>
