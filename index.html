<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>liftr - Workout Logger</title>
    <style>
        :root {
            --bg-base: #000000;
            --bg-surface: #121212;
            --bg-surface-elevated: #1e1e20;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --text-placeholder: #52525b;
            --border: #27272a;
            --border-light: #3f3f46;
            --btn-primary-bg: #ffffff;
            --btn-primary-text: #000000;
            --btn-primary-hover: #e4e4e7;
            --check-active-bg: #22c55e;
            --check-active-text: #ffffff;
            --check-inactive-bg: #27272a;
            --tag-bg: #18181b;
            --mod-bw: #3b82f6;
            --mod-side: #f97316;
            --mod-fail: #ef4444;
            --superset: #ec4899;
            --superset-bg: rgba(236, 72, 153, 0.1);
            --superset-border: rgba(236, 72, 153, 0.3);
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        #app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-base);
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 20px 20px 14px;
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        
        .header-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.95rem;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 600;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .screen {
            display: none;
            padding: 20px 20px 120px;
            flex-grow: 1;
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: block;
        }
        
        #workout-screen.active, #exercise-modal.active {
            padding-top: 0;
            padding-left: 0;
            padding-right: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn {
            background-color: var(--btn-primary-bg);
            color: var(--btn-primary-text);
            border: none;
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn:active { transform: scale(0.98); }
        
        .btn-outline {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-light);
            font-weight: 600;
        }
        .btn-outline:hover {
            background-color: var(--bg-surface);
            border-color: var(--text-muted);
        }
        .btn-outline:active {
            background-color: var(--bg-surface-elevated);
            border-color: var(--text-muted);
        }

        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 12px;
        }

        /* Superset card styling */
        .card.superset {
            border-color: var(--superset-border);
            background: var(--superset-bg);
            position: relative;
        }
        
        .superset-label {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--superset);
            color: #fff;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        
        .superset-divider {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 10px 0;
            color: var(--superset);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .superset-divider::before,
        .superset-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--superset-border);
        }

        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            font-weight: 700;
            font-size: 1.05rem;
        }
        
        .exercise-header-controls {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .icon-btn {
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 50%;
            transition: background-color 0.2s, color 0.2s;
        }
        
        .icon-btn:hover {
            color: var(--text-main);
            background-color: var(--bg-surface-elevated);
        }
        
        .icon-btn.drag-handle {
            cursor: grab;
        }
        .icon-btn.drag-handle:active {
            cursor: grabbing;
        }

        .workout-top-bar {
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 50;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .workout-name-input {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: 800;
            width: 100%;
            padding: 0;
            margin-bottom: 14px;
            letter-spacing: -0.5px;
        }
        .workout-name-input:focus { outline: none; }
        .workout-name-input::placeholder { color: var(--text-placeholder); font-weight: 700; }

        .workout-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timer {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
        }

        .btn-small {
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: transform 0.1s, background-color 0.2s;
        }
        .btn-small:active { transform: scale(0.95); }
        
        .btn-small.cancel {
            background-color: transparent;
            color: var(--mod-fail);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .btn-small.cancel:hover {
            background-color: rgba(239, 68, 68, 0.1);
        }
        .btn-small.finish {
            background-color: var(--btn-primary-bg);
            color: var(--btn-primary-text);
        }
        .btn-small.finish:hover {
            background-color: var(--btn-primary-hover);
        }

        .set-container {
            margin-bottom: 6px;
            padding: 6px 8px;
            border-radius: 10px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .set-container.completed { 
            opacity: 0.6; 
        }
        
        .set-container.is-failure {
            background-color: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.25);
        }

        .set-row {
            display: grid;
            grid-template-columns: 32px 1fr 1fr 44px 36px;
            gap: 8px;
            align-items: center;
        }

        .set-number {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 700;
            text-align: center;
            min-width: 32px;
        }
        
        .set-number.side-indicator {
            color: var(--mod-side);
            font-weight: 700;
            font-size: 0.8rem;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            background-color: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 600;
            text-align: center;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--text-muted);
        }
        .input-group input:disabled {
            background-color: var(--bg-surface-elevated);
            border-color: transparent;
        }
        
        .input-group input.bw-active:disabled {
            color: var(--mod-bw);
            font-weight: 700;
        }

        .check-btn {
            background: var(--check-inactive-bg);
            border: none;
            border-radius: 10px;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .set-container.completed .check-btn {
            background: var(--check-active-bg);
            color: var(--check-active-text);
        }

        .menu-btn {
            background: none;
            border: none;
            border-radius: 10px;
            width: 36px;
            height: 44px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            transition: color 0.2s;
            padding: 0;
        }
        .menu-btn svg {
            width: 22px;
            height: 22px;
        }

        .set-drawer {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            padding-top: 6px;
            margin-top: 2px;
            padding-left: 40px;
        }
        
        .set-drawer .mod-tag {
            background: var(--tag-bg);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-align: center;
            white-space: nowrap;
        }
        
        .mod-tag.bw.active { background: var(--mod-bw); border-color: var(--mod-bw); color: #fff; }
        .mod-tag.side.active { background: var(--mod-side); border-color: var(--mod-side); color: #fff; }
        .mod-tag.fail.active { background: var(--mod-fail); border-color: var(--mod-fail); color: #fff; }
        .mod-tag.superset-tag { color: var(--superset); border-color: var(--superset-border); }
        .mod-tag.superset-tag.active { background: var(--superset); border-color: var(--superset); color: #fff; }
        
        .set-drawer .mod-tag.delete { 
            color: var(--mod-fail); 
            background: transparent; 
            border-color: rgba(239, 68, 68, 0.3); 
            margin-left: auto;
        }

        .add-set-btn {
            background: var(--bg-surface-elevated);
            border: 1px dashed var(--border-light);
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            padding: 14px;
            text-align: center;
            border-radius: 10px;
            margin-top: 8px;
            transition: all 0.2s;
            font-size: 0.95rem;
        }
        .add-set-btn:hover {
            background-color: var(--bg-surface-elevated);
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        /* Drag and drop styles */
        .card.dragging {
            opacity: 0.4;
        }
        .card.drag-over {
            border-color: var(--text-main);
            border-style: dashed;
        }
        
        /* Reorder mode */
        .reorder-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--bg-surface-elevated);
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .filter-section {
            padding: 0 20px 14px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 14px;
            position: sticky;
            top: 0;
            background: var(--bg-base);
            z-index: 30;
        }
        
        .filter-row {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 6px;
            margin-bottom: 6px;
            scrollbar-width: none;
        }
        .filter-row::-webkit-scrollbar { display: none; }
        
        .filter-pill {
            background: var(--tag-bg);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 7px 14px;
            border-radius: 18px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .filter-pill.active {
            background: var(--text-main);
            color: var(--bg-base);
            border-color: var(--text-main);
            font-weight: 700;
        }
        .filter-pill:hover:not(.active) {
            border-color: var(--text-muted);
            color: var(--text-main);
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background-color 0.15s;
        }
        .list-item:hover { background-color: var(--bg-surface); }
        .list-item:active { background-color: var(--bg-surface-elevated); }
        .list-item:last-child { border-bottom: none; }
        .list-item-title { font-weight: 700; font-size: 1.05rem; margin-bottom: 3px; }
        .list-item-sub { color: var(--text-muted); font-size: 0.82rem; font-weight: 500; }

        #bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 480px;
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
            z-index: 20;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            transition: color 0.2s;
        }
        .nav-btn svg { width: 22px; height: 22px; stroke-width: 2; }
        .nav-btn.active { color: var(--text-main); }

        .text-input {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid var(--border-light);
            background-color: var(--bg-surface);
            color: var(--text-main);
            margin-bottom: 14px;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .text-input:focus { outline: none; border-color: var(--text-main); }
        .text-input::placeholder { color: var(--text-placeholder); }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            margin-top: 50px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .detail-exercise { margin-bottom: 20px; }
        .detail-set-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
            font-weight: 500;
        }
        .detail-set-row span { font-weight: 600; color: var(--text-main); }
        .detail-tags { display: flex; gap: 4px; margin-left: 6px; }
        
        .d-tag { font-size: 0.68rem; padding: 2px 6px; border-radius: 4px; color: #fff; font-weight: 700; }
        .d-tag.bw { background: var(--mod-bw); }
        .d-tag.side { background: var(--mod-side); }
        .d-tag.fail { background: var(--mod-fail); }
        .d-tag.superset { background: var(--superset); }
    </style>
</head>
<body>

<div id="app-container">
    <header id="main-header">
        <h1>liftr</h1>
        <button id="header-action" class="header-btn" style="display:none;" onclick="goBack()">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back
        </button>
    </header>

    <div id="home-screen" class="screen active">
        <div style="text-align: center; margin-top: 50px; margin-bottom: 60px;">
            <h2 id="streak-text" style="font-size: 4.5rem; margin-bottom: 0; font-weight: 800; letter-spacing: -2px;">0</h2>
            <p style="color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem;">Workouts Completed</p>
        </div>
        <button class="btn" onclick="startWorkout()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            Start Empty Workout
        </button>
    </div>

    <div id="history-screen" class="screen">
        <h2 style="margin-top: 0;">History</h2>
        <div class="card" style="padding: 0; border: none; overflow: hidden; background: transparent;">
            <div id="history-list">
                <div class="empty-state">No workouts logged yet.</div>
            </div>
        </div>
    </div>

    <div id="workout-detail-screen" class="screen">
        <h2 id="detail-title" style="margin-top: 0; margin-bottom: 6px;">Workout</h2>
        <p id="detail-stats" style="color: var(--text-muted); margin-top: 0; margin-bottom: 28px; font-weight: 600;"></p>
        
        <div id="detail-exercises"></div>
        
        <div style="margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--border);">
            <button class="btn btn-outline" style="color: var(--mod-fail); border-color: rgba(239, 68, 68, 0.3);" id="delete-workout-btn">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"/></svg>
                Delete Log
            </button>
        </div>
    </div>

    <div id="weight-screen" class="screen">
        <h2 style="margin-top: 0;">Body Weight</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 28px;">
            <input type="number" id="new-weight" class="text-input" placeholder="Enter weight (lbs)" step="0.1" style="margin-bottom: 0;">
            <button class="btn" style="width: auto; border-radius: 14px; flex-shrink: 0; padding: 14px 24px;" onclick="logWeight()">Log</button>
        </div>
        <div class="card" style="padding: 0; overflow: hidden; border: none; background: transparent;">
            <div id="weight-list">
                <div class="empty-state">No weight logged yet.</div>
            </div>
        </div>
    </div>

    <div id="workout-screen" class="screen">
        <div class="workout-top-bar">
            <input type="text" id="workout-name-input" class="workout-name-input" placeholder="Workout Name...">
            <div class="workout-controls">
                <button class="btn-small cancel" onclick="cancelWorkout()">Cancel</button>
                <div id="workout-timer" class="timer">00:00</div>
                <button class="btn-small finish" onclick="finishWorkout()">Finish</button>
            </div>
        </div>
        
        <div style="padding: 0 20px;">
            <div id="workout-cards"></div>
            <button class="btn btn-outline" style="margin-bottom: 20px; border-style: dashed; border-color: var(--border-light);" onclick="showExerciseModal()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                Add Exercise
            </button>
        </div>
    </div>

    <div id="exercise-modal" class="screen">
        <div class="filter-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; margin-top: 14px;">
                <h2 style="margin: 0; font-size: 1.5rem;">Select Exercise</h2>
                <button class="header-btn" onclick="hideExerciseModal()">Close</button>
            </div>
            <input type="text" id="search-exercise" class="text-input" placeholder="Search..." onkeyup="filterExercises()" style="margin-bottom: 10px; padding: 12px;">
            
            <div class="filter-row" id="muscle-filters">
                <button class="filter-pill active" onclick="setCategory('All')">All Muscles</button>
                <button class="filter-pill" onclick="setCategory('Chest')">Chest</button>
                <button class="filter-pill" onclick="setCategory('Back')">Back</button>
                <button class="filter-pill" onclick="setCategory('Legs')">Legs</button>
                <button class="filter-pill" onclick="setCategory('Shoulders')">Shoulders</button>
                <button class="filter-pill" onclick="setCategory('Arms')">Arms</button>
                <button class="filter-pill" onclick="setCategory('Core')">Core</button>
            </div>
            
            <div class="filter-row" id="equipment-filters">
                <button class="filter-pill active" onclick="setEquipment('All')">All Equipment</button>
                <button class="filter-pill" onclick="setEquipment('Barbell')">Barbell</button>
                <button class="filter-pill" onclick="setEquipment('Dumbbell')">Dumbbell</button>
                <button class="filter-pill" onclick="setEquipment('Machine')">Machine</button>
                <button class="filter-pill" onclick="setEquipment('Cable')">Cable</button>
                <button class="filter-pill" onclick="setEquipment('Bodyweight')">Bodyweight</button>
            </div>
        </div>

        <div id="exercise-list"></div>
    </div>

    <nav id="bottom-nav">
        <button class="nav-btn active" id="nav-home" onclick="navigate('home')">

    function navigate(tab) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));

    function showWorkoutScreen() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('workout-screen').classList.add('active');
        document.getElementById('bottom-nav').style.display = 'none';
        document.getElementById('main-header').style.display = 'none';

    function goBack() {
        navigate('history');
    }

    function getPreviousExerciseData(exerciseName) {
        for (let i = 0; i < workoutHistory.length; i++) {
            const pastEx = workoutHistory[i].exercises.find(e => e.name === exerciseName);
            if (pastEx && pastEx.sets.length > 0) {
                return pastEx.sets.map(s => ({
                    weight: s.weight, reps: s.reps, completed: false,
                    isBW: s.isBW || false, side: 'none', isFailure: false, menuOpen: false
                }));
            }
        }
        return [{ weight: '', reps: '', completed: false, isBW: false, side: 'none', isFailure: false, menuOpen: false }];
    }

    function startWorkout() {
        currentWorkout = [];
        secondsElapsed = 0;
        document.getElementById('workout-name-input').value = '';
        document.getElementById('workout-cards').innerHTML = '';
        updateTimerDisplay();
        workoutTimerInterval = setInterval(() => {
            secondsElapsed++;
            updateTimerDisplay();
        }, 1000);
        showWorkoutScreen();
    }

    function updateTimerDisplay() {
        const mins = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
        const secs = (secondsElapsed % 60).toString().padStart(2, '0');
        document.getElementById('workout-timer').innerText = `${mins}:${secs}`;
    }

    function finishWorkout() {
        if (currentWorkout.length === 0) {
            alert("Add some exercises before finishing!");
            return;
        }
        clearInterval(workoutTimerInterval);
        let customName = document.getElementById('workout-name-input').value.trim();
        if (!customName) customName = "Workout";
        const dateStr = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        const volume = calculateTotalVolume();
        const savedExercises = JSON.parse(JSON.stringify(currentWorkout)).map(ex => {
            ex.sets.forEach(s => delete s.menuOpen);
            return ex;
        });
        workoutHistory.unshift({
            id: Date.now(),
            name: customName,
            date: dateStr,
            duration: document.getElementById('workout-timer').innerText,
            volume: volume,
            exercises: savedExercises
        });
        document.getElementById('streak-text').innerText = workoutHistory.length;
        navigate('home');
    }
    
    function cancelWorkout() {
        if(confirm("Cancel workout? No data will be saved.")) {
            clearInterval(workoutTimerInterval);
            navigate('home');
        }
    }
    
    function calculateTotalVolume() {
        let vol = 0;
        currentWorkout.forEach(ex => {
            if (ex.isSupersetDivider) return;
            ex.sets.forEach(set => {
                if(set.completed && !set.isBW && set.weight && set.reps) {
                    vol += (parseFloat(set.weight) * parseInt(set.reps));
                }
            });
        });
        return vol;
    }

    function showExerciseModal() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('exercise-modal').classList.add('active');
        document.getElementById('main-header').style.display = 'none';
        filterExercises();
    }

    function hideExerciseModal() {
        showWorkoutScreen();
    }
    
    function setCategory(cat) {
        activeCategory = cat;
        document.querySelectorAll('#muscle-filters .filter-pill').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === cat || (cat==='All' && btn.innerText==='All Muscles'));
        });
        filterExercises();
    }
    
    function setEquipment(eq) {
        activeEquipment = eq;
        document.querySelectorAll('#equipment-filters .filter-pill').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === eq || (eq==='All' && btn.innerText==='All Equipment'));
        });
        filterExercises();
    }

    function filterExercises() {
        const query = document.getElementById('search-exercise').value.toLowerCase();
        const filtered = exerciseDatabase.filter(ex => {
            const matchesText = ex.name.toLowerCase().includes(query);
            const matchesCat = activeCategory === 'All' || ex.category === activeCategory;
            const matchesEq = activeEquipment === 'All' || ex.equipment === activeEquipment;
            return matchesText && matchesCat && matchesEq;
        });
        renderExerciseList(filtered);
    }

    function renderExerciseList(list) {
        const container = document.getElementById('exercise-list');
        container.innerHTML = '';
        if(list.length === 0) {
            container.innerHTML = '<div class="empty-state">No exercises found.</div>';
            return;
        }
        list.forEach((ex, idx) => {
            const item = document.createElement('div');
            item.className = 'list-item';
            if (idx === list.length -1) item.style.borderBottom = 'none';
            item.innerHTML = `
                <div>
                    <div class="list-item-title">${ex.name}</div>
                    <div class="list-item-sub">${ex.category}</div>
                </div>
            `;
            item.onclick = () => addExerciseToWorkout(ex.name);
            container.appendChild(item);
        });
    }

    function addExerciseToWorkout(exerciseName) {
        currentWorkout.push({ id: Date.now(), name: exerciseName, sets: getPreviousExerciseData(exerciseName), supersetGroup: null });
        hideExerciseModal();
        renderWorkout();
    }

    function removeExercise(exerciseId) {
        if(confirm("Remove this exercise?")) {
            currentWorkout = currentWorkout.filter(ex => {
                if (ex.id === exerciseId || ex.supersetGroup === exerciseId) return false;
                return true;
            });
            // Clean up superset dividers
            cleanupSupersets();
            renderWorkout();
        }
    }

    function addSet(exerciseId) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        if (!exercise || exercise.isSupersetDivider) return;
        const lastSet = exercise.sets[exercise.sets.length - 1];
        exercise.sets.push({ 
            weight: lastSet ? lastSet.weight : '', 
            reps: lastSet ? lastSet.reps : '', 
            completed: false,
            isBW: lastSet ? lastSet.isBW : false,
            side: 'none',
            isFailure: false,
            menuOpen: false
        });
        renderWorkout();
    }
    
    function removeSet(exerciseId, setIndex) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        if (!exercise) return;
        exercise.sets.splice(setIndex, 1);
        renderWorkout();
    }

    function toggleSet(exerciseId, setIndex) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        if (!exercise) return;
        exercise.sets[setIndex].completed = !exercise.sets[setIndex].completed;
        renderWorkout();
    }
    
    function toggleSetMenu(exerciseId, setIndex) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        if (!exercise) return;
        exercise.sets[setIndex].menuOpen = !exercise.sets[setIndex].menuOpen;
        renderWorkout();
    }

    function updateSetData(exerciseId, setIndex, field, value) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        if (!exercise) return;
        exercise.sets[setIndex][field] = value;
    }

    function toggleMod(exerciseId, setIndex, modType) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        if (!exercise) return;
        const set = exercise.sets[setIndex];
        if (modType === 'BW') {
            set.isBW = !set.isBW;
            if (set.isBW) set.weight = 'BW'; 
            else set.weight = '';
        } else if (modType === 'L') {
            set.side = set.side === 'L' ? 'none' : 'L';
        } else if (modType === 'R') {
            set.side = set.side === 'R' ? 'none' : 'R';
        } else if (modType === 'Fail') {
            set.isFailure = !set.isFailure;
        }
        renderWorkout();
    }

    // --- Superset Functions ---
    function createSuperset(exerciseId) {
        const exIndex = currentWorkout.findIndex(ex => ex.id === exerciseId);
        if (exIndex === -1 || exIndex >= currentWorkout.length - 1) return;
        
        const nextEx = currentWorkout[exIndex + 1];
        if (nextEx.isSupersetDivider) return;
        
        // Create superset group ID (use the first exercise's ID)
        const groupId = currentWorkout[exIndex].id;
        currentWorkout[exIndex].supersetGroup = groupId;
        nextEx.supersetGroup = groupId;
        
        // Insert a superset divider between them
        currentWorkout.splice(exIndex + 1, 0, {
            id: Date.now() + Math.random(),
            isSupersetDivider: true,
            supersetGroup: groupId
        });
        
        renderWorkout();
    }

    function addToSuperset(exerciseId) {
        const exIndex = currentWorkout.findIndex(ex => ex.id === exerciseId);
        if (exIndex === -1) return;
        
        // Find the superset group
        let groupId = currentWorkout[exIndex].supersetGroup;
        if (!groupId) return;
        
        // Find the last exercise in this superset
        let lastInGroup = exIndex;
        for (let i = exIndex + 1; i < currentWorkout.length; i++) {
            if (currentWorkout[i].supersetGroup === groupId) {
                lastInGroup = i;
            } else {
                break;
            }
        }
        
        // Add a new exercise after the last in group
        const newEx = {
            id: Date.now(),
            name: 'New Exercise',
            sets: [{ weight: '', reps: '', completed: false, isBW: false, side: 'none', isFailure: false, menuOpen: false }],
            supersetGroup: groupId
        };
        
        currentWorkout.splice(lastInGroup + 1, 0, newEx);
        renderWorkout();
    }

    function removeFromSuperset(exerciseId) {
        const exIndex = currentWorkout.findIndex(ex => ex.id === exerciseId);
        if (exIndex === -1) return;
        
        currentWorkout[exIndex].supersetGroup = null;
        cleanupSupersets();
        renderWorkout();
    }

    function cleanupSupersets() {
        // Remove dividers that no longer have a superset
        for (let i = currentWorkout.length - 1; i >= 0; i--) {
            if (currentWorkout[i].isSupersetDivider) {
                const groupId = currentWorkout[i].supersetGroup;
                const hasMembers = currentWorkout.some(ex => ex.supersetGroup === groupId && !ex.isSupersetDivider);
                if (!hasMembers) {
                    currentWorkout.splice(i, 1);
                }
            }
        }
        
        // If a group has only one member, remove the group
        const groupCounts = {};
        currentWorkout.forEach(ex => {
            if (ex.supersetGroup) {
                groupCounts[ex.supersetGroup] = (groupCounts[ex.supersetGroup] || 0) + 1;
            }
        });
        
        for (const [groupId, count] of Object.entries(groupCounts)) {
            if (count <= 1) {
                currentWorkout.forEach(ex => {
                    if (ex.supersetGroup == groupId) ex.supersetGroup = null;
                });
                // Remove associated dividers
                for (let i = currentWorkout.length - 1; i >= 0; i--) {
                    if (currentWorkout[i].isSupersetDivider && currentWorkout[i].supersetGroup == groupId) {
                        currentWorkout.splice(i, 1);
                    }
                }
            }
        }
    }

    // --- Drag and Drop ---
    function moveExercise(fromIndex, toIndex) {
        if (fromIndex === toIndex) return;
        const exercise = currentWorkout.splice(fromIndex, 1)[0];
        currentWorkout.splice(toIndex, 0, exercise);
        renderWorkout();
    }

    function renderWorkout() {
        const container = document.getElementById('workout-cards');
        container.innerHTML = '';

        let currentSupersetGroup = null;
        let isInSuperset = false;

        currentWorkout.forEach((exercise, globalIndex) => {
            if (exercise.isSupersetDivider) {
                // Create a visual divider
                const divider = document.createElement('div');
                divider.className = 'superset-divider';
                divider.innerHTML = '&nbsp;Superset&nbsp;';
                container.appendChild(divider);
                isInSuperset = true;
                return;
            }
            
            // Check if this exercise starts or continues a superset
            if (exercise.supersetGroup && !isInSuperset) {
                isInSuperset = true;
                currentSupersetGroup = exercise.supersetGroup;
            } else if (!exercise.supersetGroup) {
                isInSuperset = false;
                currentSupersetGroup = null;
            }

            const card = document.createElement('div');
            card.className = 'card';
            if (exercise.supersetGroup) {
                card.classList.add('superset');
            }
            card.draggable = true;
            card.dataset.index = globalIndex;

            // Drag events
            card.addEventListener('dragstart', (e) => {
                draggedExerciseIndex = globalIndex;
                card.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            });

            card.addEventListener('dragend', (e) => {
                card.classList.remove('dragging');
                document.querySelectorAll('.card.drag-over').forEach(c => c.classList.remove('drag-over'));
                draggedExerciseIndex = null;
            });

            card.addEventListener('dragover', (e) => {
                e.preventDefault();
                if (draggedExerciseIndex !== null && draggedExerciseIndex !== globalIndex) {
                    e.dataTransfer.dropEffect = 'move';
                    card.classList.add('drag-over');
                }
            });

            card.addEventListener('dragleave', () => {
                card.classList.remove('drag-over');
            });

            card.addEventListener('drop', (e) => {
                e.preventDefault();
                card.classList.remove('drag-over');
                if (draggedExerciseIndex !== null && draggedExerciseIndex !== globalIndex) {
                    moveExercise(draggedExerciseIndex, globalIndex);
                }
            });

            // Superset label
            if (exercise.supersetGroup && currentSupersetGroup === exercise.supersetGroup) {
                const label = document.createElement('div');
                label.className = 'superset-label';
                label.innerHTML = `
                    <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                    Superset
                `;
                card.appendChild(label);
                currentSupersetGroup = null; // Only show label once per group
            }

            // Header
            const header = document.createElement('div');
            header.className = 'exercise-header';
            header.innerHTML = `
                <span>${exercise.name}</span>
                <div class="exercise-header-controls">
                    <button class="icon-btn drag-handle" title="Drag to reorder">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="5" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="19" r="1"/></svg>
                    </button>
                    ${!exercise.supersetGroup ? `
                    <button class="icon-btn" title="Create Superset" onclick="createSuperset(${exercise.id})" style="color: var(--superset);">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                    </button>
                    ` : `
                    <button class="icon-btn" title="Remove from Superset" onclick="removeFromSuperset(${exercise.id})" style="color: var(--superset);">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </button>
                    `}
                    <button class="icon-btn" style="color: var(--mod-fail);" onclick="removeExercise(${exercise.id})">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </button>
                </div>
            `;
            card.appendChild(header);

            // Sets
            exercise.sets.forEach((set, index) => {
                const setContainer = document.createElement('div');
                setContainer.className = `set-container ${set.completed ? 'completed' : ''} ${set.isFailure ? 'is-failure' : ''}`;
                
                let weightPlaceholder = 'lbs';
                let weightValue = set.weight;
                if(set.isBW) {
                    weightPlaceholder = 'BW';
                    weightValue = 'BW';
                }
                
                let setNumberHtml = `<span class="set-number">${index + 1}</span>`;
                if (set.side !== 'none') {
                    setNumberHtml = `<span class="set-number side-indicator">${set.side === 'L' ? 'L' : 'R'}</span>`;
                }
                
                setContainer.innerHTML = `
                    <div class="set-row">
                        ${setNumberHtml}
                        <div class="input-group">
                            <input type="${set.isBW ? 'text' : 'number'}" placeholder="${weightPlaceholder}" value="${weightValue}" class="${set.isBW ? 'bw-active' : ''}" onchange="updateSetData(${exercise.id}, ${index}, 'weight', this.value)" ${set.completed || set.isBW ? 'disabled' : ''}>
                        </div>
                        <div class="input-group">
                            <input type="number" placeholder="reps" value="${set.reps}" onchange="updateSetData(${exercise.id}, ${index}, 'reps', this.value)" ${set.completed ? 'disabled' : ''}>
                        </div>
                        <button class="check-btn" onclick="toggleSet(${exercise.id}, ${index})">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
                        </button>
                        <button class="menu-btn" onclick="toggleSetMenu(${exercise.id}, ${index})">
                            <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2.5"></circle><circle cx="12" cy="12" r="2.5"></circle><circle cx="12" cy="19" r="2.5"></circle></svg>
                        </button>
                    </div>
                    ${set.menuOpen ? `
                    <div class="set-drawer">
                        <button class="mod-tag bw ${set.isBW ? 'active' : ''}" onclick="toggleMod(${exercise.id}, ${index}, 'BW')">BW</button>
                        <button class="mod-tag side ${set.side === 'L' ? 'active' : ''}" onclick="toggleMod(${exercise.id}, ${index}, 'L')">L</button>
                        <button class="mod-tag side ${set.side === 'R' ? 'active' : ''}" onclick="toggleMod(${exercise.id}, ${index}, 'R')">R</button>
                        <button class="mod-tag fail ${set.isFailure ? 'active' : ''}" onclick="toggleMod(${exercise.id}, ${index}, 'Fail')">F</button>
                        <button class="mod-tag delete" onclick="removeSet(${exercise.id}, ${index})">✕</button>
                    </div>
                    ` : ''}
                `;
                card.appendChild(setContainer);
            });

            const addSetBtn = document.createElement('button');
            addSetBtn.className = 'add-set-btn';
            addSetBtn.innerText = '+ Add Set';
            addSetBtn.onclick = () => addSet(exercise.id);
            card.appendChild(addSetBtn);

            container.appendChild(card);
        });
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        if(workoutHistory.length === 0) {
            list.innerHTML = '<div class="empty-state">No workouts logged yet.</div>';
            return;
        }
        workoutHistory.forEach(workout => {
            const exCount = workout.exercises.filter(ex => !ex.isSupersetDivider).length;
            const item = document.createElement('div');
            item.className = 'list-item card';
            item.style.marginBottom = '10px';
            item.style.padding = '16px';
            item.onclick = () => viewWorkoutInfo(workout.id);
            item.innerHTML = `
                <div>
                    <div class="list-item-title">${workout.name}</div>
                    <div class="list-item-sub">${workout.date} • ${exCount} Exercises</div>
                </div>
                <div style="color: var(--text-muted); font-weight: 700;">${workout.duration}</div>
            `;
            list.appendChild(item);
        });
    }

    function viewWorkoutInfo(id) {
        const workout = workoutHistory.find(w => w.id === id);
        if (!workout) return;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('workout-detail-screen').classList.add('active');
        document.getElementById('bottom-nav').style.display = 'none';
        document.getElementById('main-header').style.display = 'flex';
        document.querySelector('header h1').innerText = 'Summary';
        const backBtn = document.getElementById('header-action');
        backBtn.style.display = 'flex';
        backBtn.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back`;
        backBtn.onclick = goBack;
        document.getElementById('detail-title').innerText = workout.name;
        document.getElementById('detail-stats').innerText = `${workout.date} • ${workout.duration} • ${workout.volume} lbs Vol`;
        const exContainer = document.getElementById('detail-exercises');
        exContainer.innerHTML = '';
        
        workout.exercises.forEach(ex => {
            if (ex.isSupersetDivider) {
                exContainer.innerHTML += '<div class="superset-divider">&nbsp;Superset&nbsp;</div>';
                return;
            }
            let html = `<div class="detail-exercise card" style="${ex.supersetGroup ? 'border-color: var(--superset-border); background: var(--superset-bg);' : ''}"><div style="font-weight: 700; font-size: 1.05rem; margin-bottom: 14px;">${ex.name}</div>`;
            ex.sets.forEach((set, idx) => {
                if (set.completed) {
                    let weightStr = set.isBW ? 'BW' : (set.weight || '0');
                    let tagsHtml = '';
                    if (set.isBW) tagsHtml += `<span class="d-tag bw">BW</span>`;
                    if (set.side === 'L') tagsHtml += `<span class="d-tag side">L</span>`;
                    if (set.side === 'R') tagsHtml += `<span class="d-tag side">R</span>`;
                    if (set.isFailure) tagsHtml += `<span class="d-tag fail">F</span>`;
                    if (ex.supersetGroup) tagsHtml += `<span class="d-tag superset">SS</span>`;
                    html += `
                        <div class="detail-set-row" style="background: ${set.isFailure ? 'rgba(239, 68, 68, 0.08)' : 'transparent'}; padding: 8px 6px; margin: 0 -6px; border-radius: 6px;">
                            <div>Set ${idx + 1}</div>
                            <div style="display:flex; align-items:center;">
                                <span>${weightStr}</span> &nbsp;×&nbsp; <span>${set.reps || 0}</span>
                                <div class="detail-tags">${tagsHtml}</div>
                            </div>
                        </div>
                    `;
                }
            });
            html += `</div>`;
            exContainer.innerHTML += html;
        });
        document.getElementById('delete-workout-btn').onclick = () => {
            if(confirm("Delete this workout log?")) {
                workoutHistory = workoutHistory.filter(w => w.id !== id);
                document.getElementById('streak-text').innerText = workoutHistory.length;
                goBack();
            }
        };
    }

    function logWeight() {
        const input = document.getElementById('new-weight');
        const val = input.value;
        if (!val) return;
        const date = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        weightHistory.unshift({ id: Date.now(), date: date, weight: val });
        input.value = '';
        renderWeight();
    }
    
    function deleteWeight(id) {
        if(confirm("Delete this entry?")) {
            weightHistory = weightHistory.filter(w => w.id !== id);
            renderWeight();
        }
    }
    
    function renderWeight() {
        const list = document.getElementById('weight-list');
        list.innerHTML = '';
        if(weightHistory.length === 0) {
            list.innerHTML = '<div class="empty-state">No weight logged yet.</div>';
            return;
        }
        weightHistory.forEach(entry => {
            const item = document.createElement('div');
            item.className = 'list-item card';
            item.style.marginBottom = '10px';
            item.style.padding = '16px';
            item.innerHTML = `
                <div>
                    <div class="list-item-title">${entry.weight} lbs</div>
                    <div class="list-item-sub">${entry.date}</div>
                </div>
                <button class="icon-btn" onclick="deleteWeight(${entry.id})" style="color: var(--mod-fail);">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            `;
            list.appendChild(item);
        });
    }
</script>

</body>
</html>
