<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>liftr</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="liftr">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --input-bg: #2c2c2e;
            --accent-color: #ffffff;
            --accent-text: #000000;
            --text-color: #ffffff;
            --muted-text: #aeaeb2;
            --border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 100px;
            padding-top: env(safe-area-inset-top);
            min-height: 100vh;
        }

        header {
            padding: 24px 20px;
            text-align: center;
        }

        header h1 {
            letter-spacing: 4px;
            text-transform: lowercase;
            font-size: 2rem;
            font-weight: 800;
        }

        .container {
            padding: 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h2 {
            margin-bottom: 18px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            background-color: var(--input-bg);
            border: 1px solid transparent;
            border-radius: 10px;
            color: var(--text-color);
            font-size: 1rem;
            margin-bottom: 12px;
        }

        input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Quick-select exercise tags chips */
        .exercise-chips {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 8px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        .exercise-chips::-webkit-scrollbar {
            display: none;
        }

        .chip {
            background-color: #2c2c2e;
            color: var(--text-color);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            font-weight: 500;
        }

        .chip:active {
            background-color: #3a3a3c;
            transform: scale(0.95);
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 12px;
            color: var(--accent-text);
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background-color: #2c2c2e;
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        button.danger {
            background-color: rgba(255, 69, 58, 0.15);
            color: #ff453a;
        }

        label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted-text);
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .timer-display {
            font-size: 3.2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
        }

        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(28, 28, 30, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 calc(12px + env(safe-area-inset-bottom)) 0;
            z-index: 1000;
        }

        nav .nav-item {
            flex: 1;
            text-align: center;
            color: #7c7c80;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            font-weight: 600;
            padding: 8px 0;
        }

        nav .nav-item.active {
            color: var(--text-color);
        }

        /* Exercise block inside the active workout */
        .exercise-block {
            background: #2c2c2e;
            padding: 16px;
            border-radius: 12px;
            margin-top: 16px;
            border-left: 4px solid var(--accent-color);
        }

        .exercise-title {
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .set-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .set-number {
            font-size: 0.85rem;
            color: var(--muted-text);
            width: 50px;
            font-weight: bold;
        }

        .set-row input {
            margin-bottom: 0;
            padding: 8px 10px;
            text-align: center;
        }

        .btn-mini-add {
            padding: 8px;
            font-size: 0.85rem;
            margin-top: 8px;
            margin-bottom: 0;
        }

        .btn-delete {
            background: transparent;
            color: #ff453a;
            padding: 4px 8px;
            width: auto;
            font-size: 0.8rem;
            margin: 0;
        }
    </style>
</head>
<body>

    <header id="main-header">
        <h1>liftr</h1>
    </header>

    <div class="container">
        <div id="home-view" class="view active">
            <div class="card" style="text-align: center; padding: 40px 20px;">
                <h2 style="margin-bottom: 20px;">Ready?</h2>
                <button onclick="startNewWorkout()">Start Blank Workout</button>
            </div>
        </div>

        <div id="active-workout-view" class="view">
            <div class="card">
                <div class="timer-display" id="timer">00:00:00</div>
            </div>

            <div class="card">
                <h2>Add Exercise</h2>
                
                <label>Quick Select</label>
                <div class="exercise-chips">
                    <div class="chip" onclick="selectExercise('Bench Press')">Bench Press</div>
                    <div class="chip" onclick="selectExercise('Incline Bench')">Incline Bench</div>
                    <div class="chip" onclick="selectExercise('Squat')">Squat</div>
                    <div class="chip" onclick="selectExercise('Deadlift')">Deadlift</div>
                    <div class="chip" onclick="selectExercise('Overhead Press')">Overhead Press</div>
                    <div class="chip" onclick="selectExercise('Barbell Row')">Barbell Row</div>
                    <div class="chip" onclick="selectExercise('Lat Pulldown')">Lat Pulldown</div>
                    <div class="chip" onclick="selectExercise('Bicep Curl')">Bicep Curl</div>
                    <div class="chip" onclick="selectExercise('Tricep Pushdown')">Tricep Pushdown</div>
                    <div class="chip" onclick="selectExercise('Lateral Raise')">Lateral Raise</div>
                    <div class="chip" onclick="selectExercise('Leg Press')">Leg Press</div>
                </div>

                <input type="text" id="exercise-name" placeholder="Type custom exercise...">
                <button class="secondary" onclick="addNewExerciseBlock()">Add to Workout</button>
            </div>

            <div class="card">
                <h2>Current Session</h2>
                <div id="current-exercises-list"></div>
                
                <button style="margin-top: 30px; background-color: #34c759; color: #000;" onclick="endWorkout()">Finish & Save</button>
                <button class="danger" onclick="cancelWorkout()">Cancel Workout</button>
            </div>
        </div>

        <div id="history-view" class="view">
            <h2>Workout History</h2>
            <div id="history-list"></div>
        </div>

        <div id="weight-view" class="view">
            <div class="card">
                <h2>Log Bodyweight</h2>
                <label>Weight (lbs)</label>
                <input type="number" step="0.1" id="body-weight-input" pattern="[0-9]*" placeholder="175.0">
                <button onclick="logBodyweight()">Save Weight</button>
            </div>
            <div class="card">
                <h2>Weight Log History</h2>
                <div id="weight-history-list"></div>
            </div>
        </div>
    </div>

    <nav id="main-nav">
        <div class="nav-item active" onclick="switchView('home-view', this)">Workout</div>
        <div class="nav-item" onclick="switchView('history-view', this)">History</div>
        <div class="nav-item" onclick="switchView('weight-view', this)">Weight</div>
    </nav>

    <script>
        let workouts = JSON.parse(localStorage.getItem('workouts')) || [];
        let bodyweightLog = JSON.parse(localStorage.getItem('bodyweightLog')) || [];
        
        let activeWorkout = null;
        let timerInterval = null;
        let secondsElapsed = 0;

        function switchView(viewId, element) {
            if (activeWorkout && viewId !== 'active-workout-view') {
                alert("Please finish or cancel your active workout first!");
                return;
            }
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(viewId).classList.add('active');
            if (element) element.classList.add('active');
            
            if(viewId === 'history-view') renderHistory();
            if(viewId === 'weight-view') renderBodyweight();
        }

        function startNewWorkout() {
            activeWorkout = { date: new Date().toLocaleDateString(), exercises: [] };
            secondsElapsed = 0;
            
            document.getElementById('main-header').style.display = 'none';
            document.getElementById('main-nav').style.display = 'none';
            document.getElementById('current-exercises-list').innerHTML = '';
            
            switchView('active-workout-view', null);
            
            timerInterval = setInterval(() => {
                secondsElapsed++;
                updateTimerDisplay();
            }, 1000);
        }

        function updateTimerDisplay() {
            const hrs = String(Math.floor(secondsElapsed / 3600)).padStart(2, '0');
            const mins = String(Math.floor((secondsElapsed % 3600) / 60)).padStart(2, '0');
            const secs = String(secondsElapsed % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${hrs}:${mins}:${secs}`;
        }

        function selectExercise(name) {
            document.getElementById('exercise-name').value = name;
            addNewExerciseBlock();
        }

        // Creates a new exercise card block inside the live tracker screen
        function addNewExerciseBlock() {
            const nameInput = document.getElementById('exercise-name');
            const name = nameInput.value.trim();

            if (!name) {
                alert("Please select or enter an exercise name.");
                return;
            }

            // Prevent duplicating the exact same block setup if already open
            let existing = activeWorkout.exercises.find(e => e.name.toLowerCase() === name.toLowerCase());
            if (existing) {
                alert("This exercise is already added to your list below!");
                return;
            }

            const newEx = { name: name, sets: [] };
            activeWorkout.exercises.push(newEx);
            
            const exIndex = activeWorkout.exercises.length - 1;
            renderExerciseBlockElement(newEx, exIndex);
            
            // Auto-append 1 default set row immediately upon card creation
            addSetToBlock(exIndex);

            nameInput.value = '';
        }

        // Renders the wrapper node frame for an added exercise
        function renderExerciseBlockElement(exObj, index) {
            const container = document.getElementById('current-exercises-list');
            
            const blockHtml = `
                <div class="exercise-block" id="ex-block-${index}">
                    <div class="exercise-title">${exObj.name}</div>
                    <div id="sets-container-${index}"></div>
                    <button class="secondary btn-mini-add" onclick="addSetToBlock(${index})">+ Add Set</button>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', blockHtml);
        }

        // Spawns input line metrics row when clicking "+ Add Set" within an exercise block
        function addSetToBlock(exIndex) {
            const setsContainer = document.getElementById(`sets-container-${exIndex}`);
            const currentSetsCount = setsContainer.children.length;
            const nextSetNum = currentSetsCount + 1;
            
            // Check lookup historical records for placeholder data matching this title string
            let placeholderWeight = "0";
            let placeholderReps = "0";
            const currentExName = activeWorkout.exercises[exIndex].name;

            for (let i = workouts.length - 1; i >= 0; i--) {
                const found = workouts[i].exercises.find(e => e.name.toLowerCase() === currentExName.toLowerCase().trim());
                if (found && found.sets[currentSetsCount]) {
                    placeholderWeight = found.sets[currentSetsCount].weight;
                    placeholderReps = found.sets[currentSetsCount].reps;
                    break;
                } else if (found && found.sets.length > 0) {
                    // Fallback to the last logged set if exact count match row index doesn't align
                    const lastSet = found.sets[found.sets.length - 1];
                    placeholderWeight = lastSet.weight;
                    placeholderReps = lastSet.reps;
                    break;
                }
            }

            const setRowHtml = `
                <div class="set-row">
                    <span class="set-number">SET ${nextSetNum}</span>
                    <input type="number" id="w-${exIndex}-${currentSetsCount}" pattern="[0-9]*" value="${placeholderWeight === "0" ? "" : placeholderWeight}" placeholder="${placeholderWeight} lbs">
                    <input type="number" id="r-${exIndex}-${currentSetsCount}" pattern="[0-9]*" value="${placeholderReps === "0" ? "" : placeholderReps}" placeholder="${placeholderReps} reps">
                </div>
            `;
            setsContainer.insertAdjacentHTML('beforeend', setRowHtml);
        }

        function exitActiveWorkoutMode() {
            clearInterval(timerInterval);
            activeWorkout = null;
            document.getElementById('exercise-name').value = '';
            document.getElementById('timer').innerText = '00:00:00';
            document.getElementById('current-exercises-list').innerHTML = '';
            
            document.getElementById('main-header').style.display = 'block';
            document.getElementById('main-nav').style.display = 'flex';
            
            const workoutTab = document.querySelector('#main-nav .nav-item');
            switchView('home-view', workoutTab);
        }

        // Pulls values from live dynamic textboxes right before processing structural preservation
        function endWorkout() {
            if (activeWorkout.exercises.length === 0) {
                alert("You haven't added any exercises yet!");
                return;
            }

            let processingValid = true;

            // Step through each active block object tree item to ingest row inputs values safely
            activeWorkout.exercises.forEach((ex, exIdx) => {
                const container = document.getElementById(`sets-container-${exIdx}`);
                const rowsCount = container.children.length;
                
                ex.sets = []; // wipe tracking templates array clear to map verified data nodes explicitly
                
                for (let sIdx = 0; sIdx < rowsCount; sIdx++) {
                    const wVal = document.getElementById(`w-${exIdx}-${sIdx}`).value;
                    const rVal = document.getElementById(`r-${exIdx}-${sIdx}`).value;
                    
                    if (!wVal || !rVal) {
                        processingValid = false;
                    }
                    
                    ex.sets.push({ weight: wVal || "0", reps: rVal || "0" });
                }
            });

            if (!processingValid) {
                if (!confirm("Some set fields are blank. Save workout anyway?")) {
                    return;
                }
            }

            activeWorkout.duration = document.getElementById('timer').innerText;
            workouts.push(activeWorkout);
            localStorage.setItem('workouts', JSON.stringify(workouts));
            alert("Workout Saved!");
            exitActiveWorkoutMode();
        }

        function cancelWorkout() {
            if (confirm("Are you sure you want to cancel this workout? Data won't be saved.")) {
                exitActiveWorkoutMode();
            }
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            if (workouts.length === 0) {
                container.innerHTML = '<p style="color:var(--muted-text); text-transform:uppercase; letter-spacing:1px; font-size:0.85rem;">No workouts logged yet.</p>';
                return;
            }
            container.innerHTML = workouts.slice().reverse().map(w => {
                let exercisesHtml = w.exercises.map(ex => {
                    let setsText = ex.sets.map((s, i) => `S${i+1}: ${s.weight}lbs × ${s.reps}`).join(', ');
                    return `<div style="margin-bottom:12px;"><strong style="text-transform:uppercase; font-size:0.9rem;">${ex.name}</strong><br><span style="color:var(--muted-text); font-size:0.85rem;">${setsText}</span></div>`;
                }).join('');
                return `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:14px; border-bottom:1px solid rgba(255,255,255,0.08); padding-bottom:10px; font-size:0.95rem;">
                            <strong>${w.date}</strong>
                            <span style="color:var(--muted-text)">⏱️ ${w.duration || '00:00:00'}</span>
                        </div>
                        <div style="line-height:1.4;">${exercisesHtml}</div>
                    </div>
                `;
            }).join('');
        }

        function logBodyweight() {
            const wt = document.getElementById('body-weight-input').value;
            if(!wt) return;
            bodyweightLog.push({ id: Date.now(), date: new Date().toLocaleDateString(), weight: wt });
            localStorage.setItem('bodyweightLog', JSON.stringify(bodyweightLog));
            document.getElementById('body-weight-input').value = '';
            renderBodyweight();
        }

        function deleteBodyweight(id) {
            bodyweightLog = bodyweightLog.filter(entry => entry.id !== id);
            localStorage.setItem('bodyweightLog', JSON.stringify(bodyweightLog));
            renderBodyweight();
        }

        function renderBodyweight() {
            const container = document.getElementById('weight-history-list');
            if(bodyweightLog.length === 0) {
                container.innerHTML = '<p style="color:var(--muted-text); text-transform:uppercase; letter-spacing:1px; font-size:0.85rem;">No weight logs yet.</p>';
                return;
            }
            container.innerHTML = bodyweightLog.slice().reverse().map(b => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding: 14px 4px; border-bottom:1px solid rgba(255,255,255,0.08)">
                    <span style="color:var(--muted-text); font-size:0.9rem;">${b.date}</span>
                    <div>
                        <strong style="font-size:0.95rem; margin-right:15px;">${b.weight} LBS</strong>
                        <button class="btn-delete" onclick="deleteBodyweight(${b.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
