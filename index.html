<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>liftr</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="liftr">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --input-bg: #2c2c2e;
            --accent-color: #ffffff;
            --accent-text: #000000;
            --text-color: #ffffff;
            --muted-text: #aeaeb2;
            --border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 100px;
            padding-top: env(safe-area-inset-top);
            min-height: 100vh;
        }

        header {
            padding: 24px 20px;
            text-align: center;
        }

        header h1 {
            letter-spacing: 4px;
            text-transform: lowercase;
            font-size: 2rem;
            font-weight: 800;
        }

        .container {
            padding: 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h2 {
            margin-bottom: 18px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--input-bg);
            border: 1px solid transparent;
            border-radius: 12px;
            color: var(--text-color);
            font-size: 1rem;
            margin-bottom: 12px;
        }

        input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 12px;
            color: var(--accent-text);
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background-color: #2c2c2e;
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        button.danger {
            background-color: rgba(255, 69, 58, 0.15);
            color: #ff453a;
        }

        label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted-text);
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .timer-display {
            font-size: 3.2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
        }

        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(28, 28, 30, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 calc(12px + env(safe-area-inset-bottom)) 0;
            z-index: 1000;
        }

        nav .nav-item {
            flex: 1;
            text-align: center;
            color: #7c7c80;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            font-weight: 600;
            padding: 8px 0;
        }

        nav .nav-item.active {
            color: var(--text-color);
        }

        /* Exercise block inside the active workout */
        .exercise-block {
            background: #2c2c2e;
            padding: 16px;
            border-radius: 12px;
            margin-top: 16px;
            border-left: 4px solid var(--accent-color);
        }

        .exercise-title {
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .set-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .set-number {
            font-size: 0.8rem;
            color: var(--muted-text);
            width: 45px;
            font-weight: bold;
        }

        /* Highly visible high-contrast target boxes for input fields */
        .input-wrapper {
            display: flex;
            align-items: center;
            background-color: #1c1c1e;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 4px 10px;
            flex: 1;
        }

        .input-wrapper:focus-within {
            border-color: rgba(255, 255, 255, 0.4);
        }

        .input-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--muted-text);
            font-weight: bold;
            margin-right: 6px;
            user-select: none;
        }

        .set-row input {
            margin-bottom: 0;
            padding: 6px 2px;
            background: transparent;
            border: none;
            border-radius: 0;
            font-size: 1rem;
            width: 100%;
        }

        .btn-mini-add {
            padding: 10px;
            font-size: 0.85rem;
            margin-top: 8px;
            margin-bottom: 0;
        }

        .btn-row-delete {
            background: transparent;
            color: #ff453a;
            padding: 4px 6px;
            width: auto;
            font-size: 0.9rem;
            margin: 0;
            font-weight: bold;
            opacity: 0.6;
        }
        
        .btn-row-delete:active {
            opacity: 1;
            transform: scale(0.9);
        }

        /* Modal Overlay Window Styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: flex-end;
        }

        .modal-window {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.08);
            border-bottom: none;
        }

        .search-results {
            overflow-y: auto;
            flex: 1;
            margin-bottom: 16px;
        }

        .search-item {
            padding: 14px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 1rem;
            cursor: pointer;
        }

        .search-item:active {
            background-color: var(--input-bg);
        }

        .btn-delete {
            background: transparent;
            color: #ff453a;
            padding: 4px 8px;
            width: auto;
            font-size: 0.8rem;
            margin: 0;
        }
    </style>
</head>
<body>

    <header id="main-header">
        <h1>liftr</h1>
    </header>

    <div class="container">
        <div id="home-view" class="view active">
            <div class="card" style="text-align: center; padding: 40px 20px;">
                <h2 style="margin-bottom: 20px;">Ready?</h2>
                <button onclick="startNewWorkout()">Start Blank Workout</button>
            </div>
        </div>

        <div id="active-workout-view" class="view">
            <div class="card">
                <div class="timer-display" id="timer">00:00:00</div>
                <button onclick="openExerciseModal()">+ Add Exercise</button>
            </div>

            <div class="card">
                <h2>Current Session</h2>
                <div id="current-exercises-list"></div>
                
                <button style="margin-top: 30px; background-color: #34c759; color: #000;" onclick="endWorkout()">Finish & Save</button>
                <button class="danger" onclick="cancelWorkout()">Cancel Workout</button>
            </div>
        </div>

        <div id="history-view" class="view">
            <h2>Workout History</h2>
            <div id="history-list"></div>
        </div>

        <div id="weight-view" class="view">
            <div class="card">
                <h2>Log Bodyweight</h2>
                <label>Weight (lbs)</label>
                <input type="number" step="0.1" id="body-weight-input" pattern="[0-9]*" placeholder="175.0">
                <button onclick="logBodyweight()">Save Weight</button>
            </div>
            <div class="card">
                <h2>Weight Log History</h2>
                <div id="weight-history-list"></div>
            </div>
        </div>
    </div>

    <div id="exercise-modal" class="modal-overlay" onclick="closeExerciseModal(event)">
        <div class="modal-window" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                <h2 style="margin-bottom:0;">Select Exercise</h2>
                <span style="color:var(--muted-text); font-weight:bold; cursor:pointer;" onclick="closeExerciseModal()">Close</span>
            </div>
            
            <input type="text" id="modal-search" placeholder="Search exercises or type custom..." oninput="filterExercises(this.value)">
            
            <div class="search-results" id="modal-list-container">
                </div>

            <button class="secondary" id="btn-add-custom" onclick="addCustomFromModal()">Add Custom Exercise</button>
        </div>
    </div>

    <nav id="main-nav">
        <div class="nav-item active" onclick="switchView('home-view', this)">Workout</div>
        <div class="nav-item" onclick="switchView('history-view', this)">History</div>
        <div class="nav-item" onclick="switchView('weight-view', this)">Weight</div>
    </nav>

    <script>
        let workouts = JSON.parse(localStorage.getItem('workouts')) || [];
        let bodyweightLog = JSON.parse(localStorage.getItem('bodyweightLog')) || [];
        
        let activeWorkout = null;
        let timerInterval = null;
        let secondsElapsed = 0;

        // Expanded Exercise Library
        const exerciseLibrary = [
            "Bench Press (Barbell)", "Incline Bench Press (Barbell)", "Decline Bench Press (Barbell)",
            "Dumbbell Bench Press", "Incline Dumbbell Press", "Chest Fly", "Push-Up",
            "Squat (Barbell)", "Front Squat", "Leg Press", "Leg Extension", "Leg Curl", "Lunges", "Calf Raise",
            "Deadlift (Barbell)", "Romanian Deadlift", "Barbell Row", "Dumbbell Row", "Lat Pulldown", "Pull-Up", "Seated Cable Row",
            "Overhead Press", "Lateral Raise", "Front Raise", "Rear Delt Fly", "Shrugs",
            "Bicep Curl (Barbell)", "Dumbbell Hammer Curl", "Preacher Curl",
            "Tricep Pushdown", "Overhead Tricep Extension", "Skull Crusher", "Dips",
            "Plank", "Crunch", "Hanging Leg Raise"
        ].sort();

        function switchView(viewId, element) {
            if (activeWorkout && viewId !== 'active-workout-view') {
                alert("Please finish or cancel your active workout first!");
                return;
            }
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(viewId).classList.add('active');
            if (element) element.classList.add('active');
            
            if(viewId === 'history-view') renderHistory();
            if(viewId === 'weight-view') renderBodyweight();
        }

        function startNewWorkout() {
            activeWorkout = { date: new Date().toLocaleDateString(), exercises: [] };
            secondsElapsed = 0;
            
            document.getElementById('main-header').style.display = 'none';
            document.getElementById('main-nav').style.display = 'none';
            document.getElementById('current-exercises-list').innerHTML = '';
            
            switchView('active-workout-view', null);
            
            timerInterval = setInterval(() => {
                secondsElapsed++;
                updateTimerDisplay();
            }, 1000);
        }

        function updateTimerDisplay() {
            const hrs = String(Math.floor(secondsElapsed / 3600)).padStart(2, '0');
            const mins = String(Math.floor((secondsElapsed % 3600) / 60)).padStart(2, '0');
            const secs = String(secondsElapsed % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${hrs}:${mins}:${secs}`;
        }

        // Modal Logic
        function openExerciseModal() {
            document.getElementById('exercise-modal').style.display = 'flex';
            document.getElementById('modal-search').value = '';
            document.getElementById('modal-search').focus();
            filterExercises('');
        }

        function closeExerciseModal(event) {
            document.getElementById('exercise-modal').style.display = 'none';
        }

        function filterExercises(query) {
            const container = document.getElementById('modal-list-container');
            container.innerHTML = '';
            
            const filtered = exerciseLibrary.filter(ex => ex.toLowerCase().includes(query.toLowerCase().trim()));
            
            filtered.forEach(exName => {
                const item = document.createElement('div');
                item.className = 'search-item';
                item.innerText = exName;
                item.onclick = () => {
                    selectExercise(exName);
                    closeExerciseModal();
                };
                container.appendChild(item);
            });

            // Adjust custom button state
            const customBtn = document.getElementById('btn-add-custom');
            if (query.trim().length > 0) {
                customBtn.innerText = `Add Custom "${query}"`;
                customBtn.style.display = 'block';
            } else {
                customBtn.style.display = 'none';
            }
        }

        function addCustomFromModal() {
            const query = document.getElementById('modal-search').value.trim();
            if (query) {
                selectExercise(query);
                closeExerciseModal();
            }
        }

        function selectExercise(name) {
            let existing = activeWorkout.exercises.find(e => e.name.toLowerCase() === name.toLowerCase());
            if (existing) {
                alert("This exercise is already added!");
                return;
            }

            const newEx = { name: name, uid: Date.now() + Math.random().toString(36).substr(2, 5) };
            activeWorkout.exercises.push(newEx);
            
            renderAllExerciseBlocks();
        }

        function renderAllExerciseBlocks() {
            const container = document.getElementById('current-exercises-list');
            container.innerHTML = '';
            
            activeWorkout.exercises.forEach((exObj, index) => {
                const blockHtml = `
                    <div class="exercise-block" id="ex-block-${index}">
                        <div class="exercise-title">${exObj.name}</div>
                        <div id="sets-container-${index}"></div>
                        <button class="secondary btn-mini-add" onclick="addSetToBlock(${index})">+ Add Set</button>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', blockHtml);
                
                // If this is a newly initialized exercise with zero sets, auto-give it one row
                if (!exObj.sets || exObj.sets.length === 0) {
                    exObj.sets = [];
                    addSetToBlock(index);
                } else {
                    // Otherwise rebuild what row memories were actively mapped
                    const savedSets = [...exObj.sets];
                    exObj.sets = [];
                    savedSets.forEach(s => addSetToBlock(index, s.weight, s.reps));
                }
            });
        }

        function addSetToBlock(exIndex, optW = null, optR = null) {
            const exObj = activeWorkout.exercises[exIndex];
            const setsContainer = document.getElementById(`sets-container-${exIndex}`);
            const currentSetsCount = exObj.sets.length;
            const nextSetNum = currentSetsCount + 1;
            
            let placeholderWeight = "0";
            let placeholderReps = "0";
            
            // History lookup fallback engine
            for (let i = workouts.length - 1; i >= 0; i--) {
                const found = workouts[i].exercises.find(e => e.name.toLowerCase() === exObj.name.toLowerCase().trim());
                if (found && found.sets[currentSetsCount]) {
                    placeholderWeight = found.sets[currentSetsCount].weight;
                    placeholderReps = found.sets[currentSetsCount].reps;
                    break;
                } else if (found && found.sets.length > 0) {
                    const lastSet = found.sets[found.sets.length - 1];
                    placeholderWeight = lastSet.weight;
                    placeholderReps = lastSet.reps;
                    break;
                }
            }

            // Construct structural memory row object metrics trace tracker
            const newSetObj = {
                weight: optW !== null ? optW : (placeholderWeight === "0" ? "" : placeholderWeight),
                reps: optR !== null ? optR : (placeholderReps === "0" ? "" : placeholderReps)
            };
            exObj.sets.push(newSetObj);

            const rowIdx = currentSetsCount;
            const setRowHtml = `
                <div class="set-row" id="set-row-${exIndex}-${rowIdx}">
                    <span class="set-number" id="set-num-label-${exIndex}-${rowIdx}">SET ${nextSetNum}</span>
                    <div class="input-wrapper">
                        <span class="input-label">wt:</span>
                        <input type="number" id="w-${exIndex}-${rowIdx}" pattern="[0-9]*" 
                               value="${newSetObj.weight}" placeholder="${placeholderWeight}" 
                               oninput="syncSetData(${exIndex}, ${rowIdx})">
                    </div>
                    <div class="input-wrapper">
                        <span class="input-label">reps:</span>
                        <input type="number" id="r-${exIndex}-${rowIdx}" pattern="[0-9]*" 
                               value="${newSetObj.reps}" placeholder="${placeholderReps}"
                               oninput="syncSetData(${exIndex}, ${rowIdx})">
                    </div>
                    <button class="btn-row-delete" onclick="deleteSetFromBlock(${exIndex}, ${rowIdx})">✕</button>
                </div>
            `;
            setsContainer.insertAdjacentHTML('beforeend', setRowHtml);
        }

        // Live caches updates directly into memory structures to preserve data across deletion re-renders
        function syncSetData(exIdx, setIdx) {
            const wInput = document.getElementById(`w-${exIdx}-${setIdx}`);
            const rInput = document.getElementById(`r-${exIdx}-${setIdx}`);
            if (activeWorkout.exercises[exIdx] && activeWorkout.exercises[exIdx].sets[setIdx]) {
                activeWorkout.exercises[exIdx].sets[setIdx].weight = wInput.value;
                activeWorkout.exercises[exIdx].sets[setIdx].reps = rInput.value;
            }
        }

        function deleteSetFromBlock(exIdx, setIdx) {
            // Remove row entry matching exact targeting structural array parameters
            activeWorkout.exercises[exIdx].sets.splice(setIdx, 1);
            
            // Re-render this isolated exercise item block container to fix indices layout lists instantly
            const container = document.getElementById(`sets-container-${exIdx}`);
            container.innerHTML = '';
            
            const currentSets = [...activeWorkout.exercises[exIdx].sets];
            activeWorkout.exercises[exIdx].sets = [];
            
            currentSets.forEach((s, newIdx) => {
                addSetToBlock(exIdx, s.weight, s.reps);
            });
        }

        function exitActiveWorkoutMode() {
            clearInterval(timerInterval);
            activeWorkout = null;
            document.getElementById('timer').innerText = '00:00:00';
            document.getElementById('current-exercises-list').innerHTML = '';
            
            document.getElementById('main-header').style.display = 'block';
            document.getElementById('main-nav').style.display = 'flex';
            
            const workoutTab = document.querySelector('#main-nav .nav-item');
            switchView('home-view', workoutTab);
        }

        function endWorkout() {
            if (activeWorkout.exercises.length === 0) {
                alert("You haven't added any exercises yet!");
                return;
            }

            let processingValid = true;

            activeWorkout.exercises.forEach((ex) => {
                ex.sets.forEach(s => {
                    if (!s.weight || !s.reps) {
                        processingValid = false;
                    }
                });
            });

            if (!processingValid) {
                if (!confirm("Some fields are blank. Save workout anyway?")) {
                    return;
                }
            }

            // Cleanup step: Filter out any completely empty exercises or ones where sets are left entirely at 0 explicitly
            activeWorkout.exercises = activeWorkout.exercises.filter(ex => ex.sets.length > 0);

            if (activeWorkout.exercises.length === 0) {
                alert("No non-empty set logs found to save!");
                return;
            }

            activeWorkout.duration = document.getElementById('timer').innerText;
            workouts.push(activeWorkout);
            localStorage.setItem('workouts', JSON.stringify(workouts));
            alert("Workout Saved!");
            exitActiveWorkoutMode();
        }

        function cancelWorkout() {
            if (confirm("Are you sure you want to cancel this workout? Data won't be saved.")) {
                exitActiveWorkoutMode();
            }
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            if (workouts.length === 0) {
                container.innerHTML = '<p style="color:var(--muted-text); text-transform:uppercase; letter-spacing:1px; font-size:0.85rem;">No workouts logged yet.</p>';
                return;
            }
            container.innerHTML = workouts.slice().reverse().map(w => {
                let exercisesHtml = w.exercises.map(ex => {
                    let setsText = ex.sets.map((s, i) => `S${i+1}: ${s.weight}lbs × ${s.reps}`).join(', ');
                    return `<div style="margin-bottom:12px;"><strong style="text-transform:uppercase; font-size:0.9rem;">${ex.name}</strong><br><span style="color:var(--muted-text); font-size:0.85rem;">${setsText}</span></div>`;
                }).join('');
                return `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:14px; border-bottom:1px solid rgba(255,255,255,0.08); padding-bottom:10px; font-size:0.95rem;">
                            <strong>${w.date}</strong>
                            <span style="color:var(--muted-text)">⏱️ ${w.duration || '00:00:00'}</span>
                        </div>
                        <div style="line-height:1.4;">${exercisesHtml}</div>
                    </div>
                `;
            }).join('');
        }

        function logBodyweight() {
            const wt = document.getElementById('body-weight-input').value;
            if(!wt) return;
            bodyweightLog.push({ id: Date.now(), date: new Date().toLocaleDateString(), weight: wt });
            localStorage.setItem('bodyweightLog', JSON.stringify(bodyweightLog));
            document.getElementById('body-weight-input').value = '';
            renderBodyweight();
        }

        function deleteBodyweight(id) {
            bodyweightLog = bodyweightLog.filter(entry => entry.id !== id);
            localStorage.setItem('bodyweightLog', JSON.stringify(bodyweightLog));
            renderBodyweight();
        }

        function renderBodyweight() {
            const container = document.getElementById('weight-history-list');
            if(bodyweightLog.length === 0) {
                container.innerHTML = '<p style="color:var(--muted-text); text-transform:uppercase; letter-spacing:1px; font-size:0.85rem;">No weight logs yet.</p>';
                return;
            }
            container.innerHTML = bodyweightLog.slice().reverse().map(b => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding: 14px 4px; border-bottom:1px solid rgba(255,255,255,0.08)">
                    <span style="color:var(--muted-text); font-size:0.9rem;">${b.date}</span>
                    <div>
                        <strong style="font-size:0.95rem; margin-right:15px;">${b.weight} LBS</strong>
                        <button class="btn-delete" onclick="deleteBodyweight(${b.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
