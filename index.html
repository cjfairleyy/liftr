<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>liftr - Workout Logger</title>
    <style>
        :root {
            /* Premium Dark Mode Palette */
            --bg-base: #000000;
            --bg-surface: #121212;
            --bg-surface-elevated: #1e1e20;
            
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --text-placeholder: #52525b;
            
            --border: #27272a;
            --border-light: #3f3f46;
            
            --btn-primary-bg: #ffffff;
            --btn-primary-text: #000000;
            --btn-primary-hover: #e4e4e7;
            
            --check-active-bg: #ffffff;
            --check-active-text: #000000;
            --check-inactive-bg: #27272a;
            
            --tag-bg: #18181b;
            
            /* Custom Modifier Colors */
            --mod-bw: #3b82f6;      /* Blue */
            --mod-side: #f97316;    /* Orange */
            --mod-fail: #ef4444;    /* Red */
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        #app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-base);
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Typography & Headers */
        header {
            padding: 24px 24px 16px;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        
        .header-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        /* Screens */
        .screen {
            display: none;
            padding: 24px 24px 120px;
            flex-grow: 1;
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: block;
        }
        
        #workout-screen.active {
            padding-top: 0;
            padding-left: 0;
            padding-right: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Buttons */
        .btn {
            background-color: var(--btn-primary-bg);
            color: var(--btn-primary-text);
            border: none;
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn:active { transform: scale(0.98); }
        .btn:hover { background-color: var(--btn-primary-hover); }
        
        .btn-outline {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-light);
        }

        /* Cards */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .icon-btn {
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            border-radius: 50%;
            transition: background-color 0.2s, color 0.2s;
        }
        
        .icon-btn:hover {
            color: var(--text-main);
            background-color: var(--bg-surface-elevated);
        }

        /* Active Workout Top Bar */
        .workout-top-bar {
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 30;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .workout-name-input {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: 800;
            width: 100%;
            padding: 0;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }
        .workout-name-input:focus { outline: none; }
        .workout-name-input::placeholder { color: var(--text-placeholder); font-weight: 700; }

        .workout-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timer {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
        }

        .btn-small {
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: transform 0.1s;
        }
        .btn-small:active { transform: scale(0.95); }
        
        .btn-small.cancel {
            background-color: transparent;
            color: var(--mod-fail);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .btn-small.finish {
            background-color: var(--btn-primary-bg);
            color: var(--btn-primary-text);
        }

        /* Set Rows */
        .set-container {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            transition: opacity 0.2s;
        }
        .set-container:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .set-container.completed { opacity: 0.5; }

        .set-row {
            display: grid;
            grid-template-columns: 24px 1fr 1fr 44px 24px;
            gap: 12px;
            align-items: center;
            margin-bottom: 10px;
        }

        .set-number {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 700;
            text-align: center;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--text-muted);
        }
        .input-group input:disabled {
            color: var(--text-main);
            opacity: 1;
            background-color: var(--bg-surface-elevated);
            border-color: transparent;
        }

        .check-btn {
            background: var(--check-inactive-bg);
            border: none;
            border-radius: 12px;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .set-container.completed .check-btn {
            background: var(--check-active-bg);
            color: var(--check-active-text);
        }

        /* Set Modifiers (Colored) */
        .set-modifiers {
            display: flex;
            gap: 8px;
            padding-left: 36px;
            padding-right: 36px;
        }
        .mod-tag {
            background: var(--tag-bg);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .mod-tag.bw.active { background: var(--mod-bw); border-color: var(--mod-bw); color: #fff; }
        .mod-tag.side.active { background: var(--mod-side); border-color: var(--mod-side); color: #fff; }
        .mod-tag.fail.active { background: var(--mod-fail); border-color: var(--mod-fail); color: #fff; }

        .add-set-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            padding: 16px;
            text-align: center;
            border-radius: 12px;
            margin-top: 8px;
            transition: background-color 0.2s;
        }
        .add-set-btn:hover {
            background-color: var(--bg-surface-elevated);
            color: var(--text-main);
        }

        /* Lists */
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .list-item:active { background-color: var(--bg-surface); }
        .list-item:last-child { border-bottom: none; }
        .list-item-title { font-weight: 600; font-size: 1.1rem; margin-bottom: 4px; }
        .list-item-sub { color: var(--text-muted); font-size: 0.9rem; }

        /* Bottom Navigation */
        #bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 480px;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
            z-index: 20;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }
        .nav-btn svg { width: 24px; height: 24px; stroke-width: 2; }
        .nav-btn.active { color: var(--text-main); }

        /* Inputs */
        .text-input {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--border-light);
            background-color: var(--bg-surface);
            color: var(--text-main);
            margin-bottom: 16px;
            font-size: 1rem;
        }
        .text-input:focus { outline: none; border-color: var(--text-main); }
        .text-input::placeholder { color: var(--text-placeholder); }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            margin-top: 60px;
            font-size: 0.95rem;
        }

        /* Detail View */
        .detail-exercise { margin-bottom: 24px; }
        .detail-set-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
        }
        .detail-set-row span { font-weight: 600; color: var(--text-main); }
        .detail-tags { display: flex; gap: 6px; margin-left: 8px; }
        
        .d-tag { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; color: #fff; font-weight: 700; }
        .d-tag.bw { background: var(--mod-bw); }
        .d-tag.side { background: var(--mod-side); }
        .d-tag.fail { background: var(--mod-fail); }
    </style>
</head>
<body>

<div id="app-container">
    <header id="main-header">
        <h1>liftr</h1>
        <button id="header-action" class="header-btn" style="display:none;" onclick="goBack()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back
        </button>
    </header>

    <div id="home-screen" class="screen active">
        <div style="text-align: center; margin-top: 60px; margin-bottom: 80px;">
            <h2 id="streak-text" style="font-size: 4.5rem; margin-bottom: 0; font-weight: 800; letter-spacing: -2px;">0</h2>
            <p style="color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem;">Workouts Completed</p>
        </div>
        <button class="btn" onclick="startWorkout()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            Start Empty Workout
        </button>
    </div>

    <div id="history-screen" class="screen">
        <h2 style="margin-top: 0;">History</h2>
        <div class="card" style="padding: 0; border: none; overflow: hidden; background: transparent;">
            <div id="history-list">
                <div class="empty-state">No workouts logged yet.</div>
            </div>
        </div>
    </div>

    <div id="workout-detail-screen" class="screen">
        <h2 id="detail-title" style="margin-top: 0; margin-bottom: 8px;">Workout</h2>
        <p id="detail-stats" style="color: var(--text-muted); margin-top: 0; margin-bottom: 32px;"></p>
        
        <div id="detail-exercises"></div>
        
        <div style="margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border);">
            <button class="btn btn-outline" style="color: var(--mod-fail); border-color: rgba(239, 68, 68, 0.3);" id="delete-workout-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"/></svg>
                Delete Log
            </button>
        </div>
    </div>

    <div id="weight-screen" class="screen">
        <h2 style="margin-top: 0;">Body Weight</h2>
        <div style="display: flex; gap: 12px; margin-bottom: 32px;">
            <input type="number" id="new-weight" class="text-input" placeholder="Enter weight (lbs)" step="0.1" style="margin-bottom: 0;">
            <button class="btn" style="width: auto; border-radius: 16px;" onclick="logWeight()">Log</button>
        </div>
        <div class="card" style="padding: 0; overflow: hidden; border: none; background: transparent;">
            <div id="weight-list">
                <div class="empty-state">No weight logged yet.</div>
            </div>
        </div>
    </div>

    <div id="workout-screen" class="screen">
        <div class="workout-top-bar">
            <input type="text" id="workout-name-input" class="workout-name-input" placeholder="Workout Name...">
            <div class="workout-controls">
                <button class="btn-small cancel" onclick="cancelWorkout()">Cancel</button>
                <div id="workout-timer" class="timer">00:00</div>
                <button class="btn-small finish" onclick="finishWorkout()">Finish</button>
            </div>
        </div>
        
        <div style="padding: 0 24px;">
            <div id="workout-cards"></div>
            <button class="btn btn-outline" style="margin-bottom: 24px; border-style: dashed;" onclick="showExerciseModal()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                Add Exercise
            </button>
        </div>
    </div>

    <div id="exercise-modal" class="screen">
        <h2 style="margin-top: 0;">Select Exercise</h2>
        <input type="text" id="search-exercise" class="text-input" placeholder="Search exercises..." onkeyup="filterExercises()">
        <div class="card" style="padding: 0; overflow: hidden;">
            <div id="exercise-list"></div>
        </div>
    </div>

    <nav id="bottom-nav">
        <button class="nav-btn active" id="nav-home" onclick="navigate('home')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6.5 6.5h11M6.5 17.5h11m-11-11v11m11-11v11M4 6.5h2.5M17.5 6.5H20M4 17.5h2.5m11 0H20M4 12h16"/></svg>
            Workout
        </button>
        <button class="nav-btn" id="nav-history" onclick="navigate('history')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            History
        </button>
        <button class="nav-btn" id="nav-weight" onclick="navigate('weight')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><path d="M12 8v4"></path><path d="M8 12h8"></path></svg>
            Weight
        </button>
    </nav>
</div>

<script>
    // --- Data ---
    const exerciseDatabase = [
        { name: "Barbell Bench Press", category: "Chest" },
        { name: "Incline Dumbbell Press", category: "Chest" },
        { name: "Push-Ups", category: "Chest" },
        { name: "Dips", category: "Chest" },
        { name: "Cable Crossover", category: "Chest" },
        
        { name: "Barbell Squat", category: "Legs" },
        { name: "Bulgarian Split Squat", category: "Legs" },
        { name: "Romanian Deadlift", category: "Legs" },
        { name: "Leg Press", category: "Legs" },
        { name: "Leg Extension", category: "Legs" },
        { name: "Leg Curl", category: "Legs" },
        { name: "Calf Raises", category: "Legs" },
        { name: "Walking Lunges", category: "Legs" },
        { name: "Hip Thrusts", category: "Legs" },
        
        { name: "Deadlift", category: "Back" },
        { name: "Pull-Ups", category: "Back" },
        { name: "Lat Pulldown", category: "Back" },
        { name: "Dumbbell Row", category: "Back" },
        { name: "Seated Cable Row", category: "Back" },
        { name: "Barbell Row", category: "Back" },
        
        { name: "Overhead Press", category: "Shoulders" },
        { name: "Dumbbell Shoulder Press", category: "Shoulders" },
        { name: "Lateral Raises", category: "Shoulders" },
        { name: "Front Raises", category: "Shoulders" },
        { name: "Face Pulls", category: "Shoulders" },
        { name: "Shrugs", category: "Shoulders" },
        
        { name: "Barbell Bicep Curl", category: "Arms" },
        { name: "Dumbbell Curl", category: "Arms" },
        { name: "Hammer Curls", category: "Arms" },
        { name: "Tricep Pushdown", category: "Arms" },
        { name: "Overhead Tricep Extension", category: "Arms" },
        
        { name: "Plank", category: "Core" },
        { name: "Crunches", category: "Core" },
        { name: "Hanging Leg Raises", category: "Core" },
        { name: "Russian Twists", category: "Core" }
    ].sort((a, b) => a.name.localeCompare(b.name));

    let currentWorkout = [];
    let workoutTimerInterval;
    let secondsElapsed = 0;
    
    // Persistent Data 
    let workoutHistory = []; 
    let weightHistory = [];  

    // --- Navigation Functions ---
    function navigate(tab) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(tab + '-screen').classList.add('active');
        
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('nav-' + tab).classList.add('active');
        
        document.getElementById('bottom-nav').style.display = 'flex';
        document.getElementById('main-header').style.display = 'flex';
        document.getElementById('header-action').style.display = 'none';
        document.querySelector('header h1').innerText = 'liftr';
        
        if (tab === 'history') renderHistory();
        if (tab === 'weight') renderWeight();
    }

    function showWorkoutScreen() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('workout-screen').classList.add('active');
        
        document.getElementById('bottom-nav').style.display = 'none';
        document.getElementById('main-header').style.display = 'none'; // Hide main header completely
    }

    function goBack() {
        navigate('history');
    }

    // --- Autofill Logic ---
    function getPreviousExerciseData(exerciseName) {
        for (let i = 0; i < workoutHistory.length; i++) {
            const pastEx = workoutHistory[i].exercises.find(e => e.name === exerciseName);
            if (pastEx && pastEx.sets.length > 0) {
                return pastEx.sets.map(s => ({
                    weight: s.weight, reps: s.reps, completed: false,
                    isBW: s.isBW || false, side: 'none', isFailure: false
                }));
            }
        }
        return [{ weight: '', reps: '', completed: false, isBW: false, side: 'none', isFailure: false }];
    }

    // --- Workout Functions ---
    function startWorkout() {
        currentWorkout = [];
        secondsElapsed = 0;
        document.getElementById('workout-name-input').value = '';
        document.getElementById('workout-cards').innerHTML = '';
        updateTimerDisplay();
        workoutTimerInterval = setInterval(() => {
            secondsElapsed++;
            updateTimerDisplay();
        }, 1000);
        showWorkoutScreen();
    }

    function updateTimerDisplay() {
        const mins = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
        const secs = (secondsElapsed % 60).toString().padStart(2, '0');
        document.getElementById('workout-timer').innerText = `${mins}:${secs}`;
    }

    function finishWorkout() {
        if (currentWorkout.length === 0) {
            alert("Add some exercises before finishing!");
            return;
        }
        clearInterval(workoutTimerInterval);
        
        let customName = document.getElementById('workout-name-input').value.trim();
        if (!customName) customName = "Workout";

        const dateStr = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        const volume = calculateTotalVolume();
        
        workoutHistory.unshift({
            id: Date.now(),
            name: customName,
            date: dateStr,
            duration: document.getElementById('workout-timer').innerText,
            volume: volume,
            exercises: JSON.parse(JSON.stringify(currentWorkout))
        });

        document.getElementById('streak-text').innerText = workoutHistory.length;
        navigate('home');
    }
    
    function cancelWorkout() {
        if(confirm("Cancel workout? No data will be saved.")) {
            clearInterval(workoutTimerInterval);
            navigate('home');
        }
    }
    
    function calculateTotalVolume() {
        let vol = 0;
        currentWorkout.forEach(ex => {
            ex.sets.forEach(set => {
                if(set.completed && !set.isBW && set.weight && set.reps) {
                    vol += (parseFloat(set.weight) * parseInt(set.reps));
                }
            });
        });
        return vol;
    }

    // --- History & Detail View ---
    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        if(workoutHistory.length === 0) {
            list.innerHTML = '<div class="empty-state">No workouts logged yet.</div>';
            return;
        }
        
        workoutHistory.forEach(workout => {
            const exCount = workout.exercises.length;
            const item = document.createElement('div');
            item.className = 'list-item card';
            item.style.marginBottom = '12px';
            item.onclick = () => viewWorkoutInfo(workout.id);
            item.innerHTML = `
                <div>
                    <div class="list-item-title">${workout.name}</div>
                    <div class="list-item-sub">${workout.date} • ${exCount} Exercises</div>
                </div>
                <div style="color: var(--text-muted); font-weight: 600;">${workout.duration}</div>
            `;
            list.appendChild(item);
        });
    }

    function viewWorkoutInfo(id) {
        const workout = workoutHistory.find(w => w.id === id);
        if (!workout) return;
        
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('workout-detail-screen').classList.add('active');
        document.getElementById('bottom-nav').style.display = 'none';
        
        document.getElementById('main-header').style.display = 'flex';
        document.querySelector('header h1').innerText = 'Summary';
        const backBtn = document.getElementById('header-action');
        backBtn.style.display = 'flex';
        backBtn.innerHTML = `<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back`;
        backBtn.onclick = goBack;

        document.getElementById('detail-title').innerText = workout.name;
        document.getElementById('detail-stats').innerText = `${workout.date} • ${workout.duration} • ${workout.volume} lbs Vol`;
        
        const exContainer = document.getElementById('detail-exercises');
        exContainer.innerHTML = '';
        
        workout.exercises.forEach(ex => {
            let html = `<div class="detail-exercise card"><div style="font-weight: 700; font-size: 1.1rem; margin-bottom: 16px;">${ex.name}</div>`;
            ex.sets.forEach((set, idx) => {
                if (set.completed) {
                    let weightStr = set.isBW ? 'BW' : (set.weight || '0');
                    let tagsHtml = '';
                    if (set.isBW) tagsHtml += `<span class="d-tag bw">BW</span>`;
                    if (set.side === 'L') tagsHtml += `<span class="d-tag side">Left</span>`;
                    if (set.side === 'R') tagsHtml += `<span class="d-tag side">Right</span>`;
                    if (set.isFailure) tagsHtml += `<span class="d-tag fail">Failure</span>`;
                    
                    html += `
                        <div class="detail-set-row">
                            <div>Set ${idx + 1}</div>
                            <div style="display:flex; align-items:center;">
                                <span>${weightStr}</span> &nbsp;×&nbsp; <span>${set.reps || 0}</span>
                                <div class="detail-tags">${tagsHtml}</div>
                            </div>
                        </div>
                    `;
                }
            });
            html += `</div>`;
            exContainer.innerHTML += html;
        });

        document.getElementById('delete-workout-btn').onclick = () => {
            if(confirm("Delete this workout log?")) {
                workoutHistory = workoutHistory.filter(w => w.id !== id);
                document.getElementById('streak-text').innerText = workoutHistory.length;
                goBack();
            }
        };
    }

    // --- Weight Functions ---
    function logWeight() {
        const input = document.getElementById('new-weight');
        const val = input.value;
        if (!val) return;
        
        const date = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        weightHistory.unshift({ id: Date.now(), date: date, weight: val });
        input.value = '';
        renderWeight();
    }
    
    function deleteWeight(id) {
        if(confirm("Delete this entry?")) {
            weightHistory = weightHistory.filter(w => w.id !== id);
            renderWeight();
        }
    }
    
    function renderWeight() {
        const list = document.getElementById('weight-list');
        list.innerHTML = '';
        if(weightHistory.length === 0) {
            list.innerHTML = '<div class="empty-state">No weight logged yet.</div>';
            return;
        }
        
        weightHistory.forEach(entry => {
            const item = document.createElement('div');
            item.className = 'list-item card';
            item.style.marginBottom = '12px';
            item.innerHTML = `
                <div>
                    <div class="list-item-title">${entry.weight} lbs</div>
                    <div class="list-item-sub">${entry.date}</div>
                </div>
                <button class="icon-btn" onclick="deleteWeight(${entry.id})" style="color: var(--mod-fail);">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            `;
            list.appendChild(item);
        });
    }

    // --- Modal / Exercises ---
    function showExerciseModal() {
        renderExerciseList(exerciseDatabase);
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('exercise-modal').classList.add('active');
        
        document.getElementById('main-header').style.display = 'flex';
        document.querySelector('header h1').innerText = 'Exercises';
        const cancelBtn = document.getElementById('header-action');
        cancelBtn.style.display = 'flex';
        cancelBtn.innerText = 'Cancel';
        cancelBtn.onclick = hideExerciseModal;
    }

    function hideExerciseModal() {
        showWorkoutScreen();
    }

    function renderExerciseList(list) {
        const container = document.getElementById('exercise-list');
        container.innerHTML = '';
        list.forEach((ex, idx) => {
            const item = document.createElement('div');
            item.className = 'list-item';
            if (idx === list.length -1) item.style.borderBottom = 'none';
            item.innerHTML = `<div><div class="list-item-title">${ex.name}</div><div class="list-item-sub">${ex.category}</div></div>`;
            item.onclick = () => addExerciseToWorkout(ex.name);
            container.appendChild(item);
        });
    }

    function filterExercises() {
        const query = document.getElementById('search-exercise').value.toLowerCase();
        const filtered = exerciseDatabase.filter(ex => ex.name.toLowerCase().includes(query));
        renderExerciseList(filtered);
    }

    // --- Logging & Modifiers ---
    function addExerciseToWorkout(exerciseName) {
        currentWorkout.push({ id: Date.now(), name: exerciseName, sets: getPreviousExerciseData(exerciseName) });
        hideExerciseModal();
        renderWorkout();
    }

    function removeExercise(exerciseId) {
        currentWorkout = currentWorkout.filter(ex => ex.id !== exerciseId);
        renderWorkout();
    }

    function addSet(exerciseId) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        const lastSet = exercise.sets[exercise.sets.length - 1];
        exercise.sets.push({ 
            weight: lastSet ? lastSet.weight : '', 
            reps: lastSet ? lastSet.reps : '', 
            completed: false,
            isBW: lastSet ? lastSet.isBW : false,
            side: 'none',
            isFailure: false
        });
        renderWorkout();
    }
    
    function removeSet(exerciseId, setIndex) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        exercise.sets.splice(setIndex, 1);
        renderWorkout();
    }

    function toggleSet(exerciseId, setIndex) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        exercise.sets[setIndex].completed = !exercise.sets[setIndex].completed;
        renderWorkout();
    }

    function updateSetData(exerciseId, setIndex, field, value) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        exercise.sets[setIndex][field] = value;
    }

    function toggleMod(exerciseId, setIndex, modType) {
        const exercise = currentWorkout.find(ex => ex.id === exerciseId);
        const set = exercise.sets[setIndex];
        
        if (modType === 'BW') {
            set.isBW = !set.isBW;
            if (set.isBW) set.weight = ''; 
        } else if (modType === 'Side') {
            if (set.side === 'none') set.side = 'L';
            else if (set.side === 'L') set.side = 'R';
            else set.side = 'none';
        } else if (modType === 'Fail') {
            set.isFailure = !set.isFailure;
        }
        renderWorkout();
    }

    // --- Rendering ---
    function renderWorkout() {
        const container = document.getElementById('workout-cards');
        container.innerHTML = '';

        currentWorkout.forEach(exercise => {
            const card = document.createElement('div');
            card.className = 'card';

            const header = document.createElement('div');
            header.className = 'exercise-header';
            header.innerHTML = `
                <span>${exercise.name}</span>
                <button class="icon-btn" style="color: var(--mod-fail);" onclick="removeExercise(${exercise.id})">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            `;
            card.appendChild(header);

            exercise.sets.forEach((set, index) => {
                const setContainer = document.createElement('div');
                setContainer.className = `set-container ${set.completed ? 'completed' : ''}`;
                
                let weightPlaceholder = set.isBW ? 'BW' : 'lbs';
                
                setContainer.innerHTML = `
                    <div class="set-row">
                        <div class="set-number">${index + 1}</div>
                        <div class="input-group">
                            <input type="number" placeholder="${weightPlaceholder}" value="${set.weight}" onchange="updateSetData(${exercise.id}, ${index}, 'weight', this.value)" ${set.completed || set.isBW ? 'disabled' : ''}>
                        </div>
                        <div class="input-group">
                            <input type="number" placeholder="reps" value="${set.reps}" onchange="updateSetData(${exercise.id}, ${index}, 'reps', this.value)" ${set.completed ? 'disabled' : ''}>
                        </div>
                        <button class="check-btn" onclick="toggleSet(${exercise.id}, ${index})">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
                        </button>
                        <button class="icon-btn" style="font-size: 1rem; color: var(--text-placeholder);" onclick="removeSet(${exercise.id}, ${index})">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                        </button>
                    </div>
                    <div class="set-modifiers">
                        <button class="mod-tag bw ${set.isBW ? 'active' : ''}" onclick="toggleMod(${exercise.id}, ${index}, 'BW')">BW</button>
                        <button class="mod-tag side ${set.side !== 'none' ? 'active' : ''}" onclick="toggleMod(${exercise.id}, ${index}, 'Side')">
                            ${set.side === 'none' ? 'L / R' : set.side}
                        </button>
                        <button class="mod-tag fail ${set.isFailure ? 'active' : ''}" onclick="toggleMod(${exercise.id}, ${index}, 'Fail')">Failure</button>
                    </div>
                `;
                card.appendChild(setContainer);
            });

            const addSetBtn = document.createElement('button');
            addSetBtn.className = 'add-set-btn';
            addSetBtn.innerText = '+ Add Set';
            addSetBtn.onclick = () => addSet(exercise.id);
            card.appendChild(addSetBtn);

            container.appendChild(card);
        });
    }
</script>

</body>
</html>
