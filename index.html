<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>liftr - Workout Logger</title>
    <style>
        :root {
            /* Premium Dark Mode Palette */
            --bg-base: #000000;
            --bg-surface: #0d0d0f;
            --bg-surface-elevated: #1e1e20;
            
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --text-placeholder: #52525b;
            
            --border-light: #27272a;
            
            --btn-primary-bg: #ffffff;
            --btn-primary-text: #000000;
            --btn-primary-hover: #e4e4e7;
            
            --check-active-bg: #22c55e;
            --check-active-text: #ffffff;
            --check-inactive-bg: #1e1e20;
            
            --tag-bg: #1e1e20;
            
            /* Custom Modifier Colors */
            --mod-bw: #3b82f6;      
            --mod-side-l: #f97316; /* Orange */
            --mod-side-r: #8b5cf6; /* Purple */   
            --mod-fail: #ef4444;    
            --mod-superset: #ec4899; /* Premium Pink */
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        #app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-base);
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Typography & Headers */
        h1, h2, h3 { margin: 0; font-weight: 700; letter-spacing: -0.5px; }
        
        header {
            padding: 24px 24px 16px;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 { font-size: 1.5rem; font-weight: 800; }
        
        .header-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        h2 { font-size: 1.6rem; margin-bottom: 20px; }

        /* Screens */
        .screen {
            display: none;
            padding: 20px 20px 120px;
            flex-grow: 1;
            animation: fadeIn 0.3s ease;
        }
        .screen.active { display: block; }
        
        #workout-screen.active, #exercise-modal.active {
            padding-top: 0;
            padding-left: 0;
            padding-right: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Buttons */
        .btn {
            background-color: var(--btn-primary-bg);
            color: var(--btn-primary-text);
            border: none;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn:active { transform: scale(0.98); }
        .btn:hover { background-color: var(--btn-primary-hover); }
        
        .btn-outline {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-light);
            transition: background-color 0.2s, border-color 0.2s;
        }
        .btn-outline:active {
            background-color: var(--bg-surface-elevated);
        }

        /* Cards & Superset Indicators */
        .card {
            background: var(--bg-surface);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 18px 20px 16px;
            margin-bottom: 12px;
            transition: border 0.2s, background-color 0.2s;
        }

        /* Unifies superset exercises into a single connected block */
        .card.in-superset {
            border: 1px solid var(--mod-superset) !important;
            background: rgba(236, 72, 153, 0.02) !important;
            margin-bottom: 0; 
            border-radius: 0;
            border-bottom: none !important;
        }
        .card.superset-start {
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }
        .card.superset-end {
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            border-bottom: 1px solid var(--mod-superset) !important;
            margin-bottom: 12px; /* Restores the gap below the group */
        }
        .card.superset-single { /* Fallback if only 1 item is left */
            border-radius: 20px;
            border-bottom: 1px solid var(--mod-superset) !important;
            margin-bottom: 12px;
        }

        /* Cleaner connection target during selection mode */
        .card.linking-target {
            border: 1px dashed var(--mod-superset) !important;
            background: rgba(236, 72, 153, 0.05) !important;
            cursor: pointer;
        }

        /* Move Animation Classes */
        .card { transition: opacity 0.2s ease; }
        .card.just-moved { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes popIn {
            0% { transform: translateY(15px) scale(0.98); opacity: 0; background: var(--bg-surface-elevated); }
            70% { transform: translateY(-4px) scale(1.02); opacity: 1; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .superset-badge {
            font-size: 0.7rem;
            color: var(--mod-superset);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        /* Pop-up Action Menus */
        .exercise-header {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .action-menu-popup {
            position: absolute;
            top: 40px;
            right: 0;
            background: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 12px;
            padding: 6px;
            z-index: 100;
            box-shadow: 0 4px 16px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            min-width: 170px;
        }

        .menu-item {
            background: transparent;
            border: none;
            color: var(--text-main);
            text-align: left;
            padding: 10px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .menu-item:active { background: #2c2c2e; }
        .menu-item.danger { color: var(--mod-fail); }

        .icon-btn {
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 12px;
            transition: background-color 0.2s, color 0.2s;
        }
        .icon-btn:active { background-color: var(--bg-surface-elevated); color: var(--text-main); }

        /* Active Workout Top Bar */
        .workout-top-bar {
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 50;
            padding: 16px 20px;
            margin-bottom: 12px;
        }

        .workout-name-input {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.3rem;
            font-weight: 800;
            width: 100%;
            padding: 0;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        .workout-name-input:focus { outline: none; background-color: transparent !important; }
        .workout-name-input::placeholder { color: var(--text-placeholder); }

        .workout-controls { display: flex; justify-content: space-between; align-items: center; }

        .timer {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
        }

        .btn-small {
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
        }
        .btn-small.cancel {
            background-color: transparent;
            color: var(--mod-fail);
        }
        .btn-small.finish {
            background-color: var(--btn-primary-bg);
            color: var(--btn-primary-text);
        }

        /* Set Rows & Modifiers Grid */
        .set-container {
            margin-bottom: 6px;
            padding: 3px 0;
            transition: opacity 0.2s;
        }
        .set-container.completed { opacity: 0.5; }
        .set-container.is-failure { background-color: rgba(239, 68, 68, 0.15); border-radius: 12px; padding: 3px 8px; margin-left: -8px; margin-right: -8px; }

        .set-row, .set-drawer {
            display: grid;
            grid-template-columns: 28px 1fr 1fr 44px 36px !important;
            gap: 12px;
            align-items: center;
        }

        .set-drawer {
            margin-top: 6px;
            padding: 0;
            background: transparent !important;
            border: none !important;
        }

        .set-number {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 700;
            text-align: center;
        }
        .set-number.side-l { color: var(--mod-side-l); }
        .set-number.side-r { color: var(--mod-side-r); }

        .input-group input {
            width: 100%;
            padding: 12px;
            background-color: #09090b !important;
            border: 1px solid #202023 !important;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            transition: background-color 0.2s;
        }
        .input-group input:focus { outline: none; background-color: #000000 !important; border-color: #3f3f46 !important; }
        .input-group input:disabled { background-color: #050505; opacity: 0.6; }
        .input-group input.bw-active:disabled { color: var(--mod-bw); font-weight: 700; opacity: 1; }

        .check-btn {
            background: var(--check-inactive-bg);
            border: none;
            border-radius: 12px;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            transition: background-color 0.2s;
        }
        .set-container.completed .check-btn {
            background: var(--check-active-bg);
            color: var(--check-active-text);
        }

        .mod-tag {
            background: var(--tag-bg);
            border: none;
            color: var(--text-muted);
            padding: 10px 4px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }
        .mod-tag.bw.active { background: var(--mod-bw); color: #fff; }
        .mod-tag.side-l.active { background: var(--mod-side-l); color: #fff; }
        .mod-tag.side-r.active { background: var(--mod-side-r); color: #fff; }
        .mod-tag.fail.active { background: var(--mod-fail); color: #fff; }
        .mod-tag.delete { 
            color: var(--mod-fail) !important; 
            background: rgba(239, 68, 68, 0.05) !important; 
            border: none !important;
        }
        .mod-tag.delete:active { background: rgba(239, 68, 68, 0.15) !important; }

        .add-set-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            padding: 10px;
            font-size: 0.95rem;
            border-radius: 12px;
            margin-top: 6px;
            transition: color 0.2s, background-color 0.2s;
        }
        .add-set-btn:active { background-color: var(--bg-surface-elevated); color: var(--text-main); }

        /* Filters */
        .filter-section {
            padding: 0 20px 12px;
            margin-bottom: 12px;
            position: sticky;
            top: 0;
            background: var(--bg-base);
            z-index: 10;
        }
        
        .filter-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 4px;
            scrollbar-width: none;
        }
        .filter-row::-webkit-scrollbar { display: none; }
        
        .filter-pill {
            background: var(--tag-bg);
            border: none;
            color: var(--text-muted);
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .filter-pill.active { background: var(--text-main); color: var(--bg-base); }

        /* Lists */
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            cursor: pointer;
            border-radius: 20px;
            margin-bottom: 4px;
        }
        .list-item:active { background-color: var(--bg-surface); }
        .list-item-title { font-weight: 600; font-size: 1.05rem; margin-bottom: 4px; }
        .list-item-sub { color: var(--text-muted); font-size: 0.85rem; }

        /* Bottom Navigation */
        #bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 480px;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
            z-index: 20;
        }
        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .nav-btn svg { width: 24px; height: 24px; stroke-width: 2.5; }
        .nav-btn.active { color: var(--text-main); }

        /* Inputs */
        .text-input {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            background-color: var(--bg-surface);
            color: var(--text-main);
            margin-bottom: 16px;
            font-size: 1rem;
            font-weight: 500;
        }
        .text-input:focus { outline: none; background-color: var(--bg-surface-elevated); }

        .empty-state { text-align: center; color: var(--text-muted); margin-top: 60px; font-size: 0.95rem; font-weight: 500; }

        /* Stats & Progress */
        .section-title {
            font-size: 1.05rem;
            font-weight: 800;
            margin-bottom: 14px;
            letter-spacing: -0.3px;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 28px;
        }
        .stat-tile {
            background: var(--bg-surface);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 18px 16px;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }
        .stat-label {
            color: var(--text-muted);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .detail-set-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .detail-set-row span { font-weight: 700; color: var(--text-main); }
        .detail-tags { display: flex; gap: 6px; margin-left: 12px; }
        .d-tag { font-size: 0.7rem; padding: 4px 8px; border-radius: 6px; color: #fff; font-weight: 700; }
        .d-tag.bw { background: var(--mod-bw); }
        .d-tag.side-l { background: var(--mod-side-l); }
        .d-tag.side-r { background: var(--mod-side-r); }
        .d-tag.fail { background: var(--mod-fail); }
    </style>
</head>
<body>

<div id="app-container">
    <header id="main-header">
        <h1>liftr</h1>
        <button id="header-action" class="header-btn" style="display:none;" onclick="goBack()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back
        </button>
    </header>

    <div id="home-screen" class="screen active">
        <div style="text-align: center; margin-top: 60px; margin-bottom: 80px;">
            <h2 id="streak-text" style="font-size: 4.5rem; margin-bottom: 0; font-weight: 800; letter-spacing: -2px;">0</h2>
            <p style="color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem;">Workouts Completed</p>
        </div>
        <button class="btn" onclick="startWorkout()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            Start Empty Workout
        </button>
    </div>

    <div id="history-screen" class="screen">
        <h2>History</h2>
        <div id="history-list">
            <div class="empty-state">No workouts logged yet.</div>
        </div>
    </div>

    <div id="workout-detail-screen" class="screen">
        <h2 id="detail-title" style="margin-bottom: 8px;">Workout</h2>
        <p id="detail-stats" style="color: var(--text-muted); margin-top: 0; margin-bottom: 32px; font-weight: 500;"></p>
        <div id="detail-exercises"></div>
        <div style="margin-top: 40px; padding-top: 24px;">
            <button class="btn btn-outline" style="color: var(--mod-fail); border: none; background: rgba(239, 68, 68, 0.1); font-weight:700;" id="delete-workout-btn" onclick="deleteWorkoutFromHistory()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"/></svg>
                Delete Log
            </button>
        </div>
    </div>

    <div id="weight-screen" class="screen">
        <h2>Body Weight</h2>
        <div style="display: flex; gap: 12px; margin-bottom: 24px; margin-top: 12px;">
            <input type="number" id="new-weight" class="text-input" placeholder="Enter weight (lbs)" step="0.1" style="margin-bottom: 0;">
            <button class="btn" style="width: auto; border-radius: 16px;" onclick="logWeight()">Log</button>
        </div>
        
        <div id="weight-trend-section" style="margin-top: 36px; margin-bottom: 36px; display: none;">
            <h3 class="section-title">Weight Trend</h3>
            <div id="weight-trend-chart" class="card"></div>
        </div>

        <h3 class="section-title" style="margin-top: 24px;">History Log</h3>
        <div id="weight-list">
            <div class="empty-state">No weight logged yet.</div>
        </div>
    </div>

    <div id="stats-screen" class="screen">
        <h2>Stats &amp; Progress</h2>

        <div class="stat-grid" id="stats-overview"></div>

        <div style="margin-top: 48px;">
            <h3 class="section-title">Exercise Progress</h3>
            <select id="progress-exercise-select" class="text-input" onchange="renderExerciseProgress()"></select>
            <div id="exercise-progress-chart" class="card"></div>
            <div id="exercise-progress-pr"></div>
        </div>

        <div style="margin-top: 48px;">
            <h3 class="section-title">Muscle Group Balance <span style="color: var(--text-muted); font-weight: 500; font-size: 0.75rem; text-transform: none; letter-spacing: 0;">&middot; Last 30 Days</span></h3>
            <div id="muscle-balance-list"></div>
        </div>

        <div style="margin-top: 48px;">
            <h3 class="section-title">Personal Records</h3>
            <div id="pr-list"></div>
        </div>
    </div>

    <div id="workout-screen" class="screen">
        <div class="workout-top-bar">
            <input type="text" id="workout-name-input" class="workout-name-input" placeholder="Workout Name..." oninput="workoutName = this.value" onchange="saveApp()">
            <div class="workout-controls">
                <button class="btn-small cancel" onclick="cancelWorkout()">Cancel</button>
                <div id="workout-timer" class="timer">00:00</div>
                <button class="btn-small finish" onclick="finishWorkout()">Finish</button>
            </div>
        </div>
        
        <div style="padding: 0 20px;">
            <div id="workout-cards"></div>
            <button class="btn btn-outline" style="margin-bottom: 24px;" onclick="showExerciseModal()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                Add Exercise
            </button>
        </div>
    </div>

    <div id="exercise-modal" class="screen">
        <div class="filter-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; margin-top: 16px;">
                <h2 style="margin: 0;">Select Exercise</h2>
                <button class="header-btn" onclick="hideExerciseModal()">Close</button>
            </div>
            <input type="text" id="search-exercise" class="text-input" placeholder="Search..." onkeyup="filterExercises()" style="margin-bottom: 16px;">
            
            <div class="filter-row" id="muscle-filters">
                <button class="filter-pill active" onclick="setCategory('All')">All</button>
                <button class="filter-pill" onclick="setCategory('Chest')">Chest</button>
                <button class="filter-pill" onclick="setCategory('Back')">Back</button>
                <button class="filter-pill" onclick="setCategory('Legs')">Legs</button>
                <button class="filter-pill" onclick="setCategory('Shoulders')">Shoulders</button>
                <button class="filter-pill" onclick="setCategory('Arms')">Arms</button>
                <button class="filter-pill" onclick="setCategory('Core')">Core</button>
            </div>
            
            <div class="filter-row" id="equipment-filters">
                <button class="filter-pill active" onclick="setEquipment('All')">All</button>
                <button class="filter-pill" onclick="setEquipment('Barbell')">Barbell</button>
                <button class="filter-pill" onclick="setEquipment('Dumbbell')">Dumbbell</button>
                <button class="filter-pill" onclick="setEquipment('Machine')">Machine</button>
                <button class="filter-pill" onclick="setEquipment('Cable')">Cable</button>

</div>

<script>
    const exerciseDatabase = [

        { name: "Cable Bicep Curl", category: "Arms", equipment: "Cable" },
        { name: "Cable Tricep Pushdown", category: "Arms", equipment: "Cable" },
        { name: "Cable Overhead Tricep Extension", category: "Arms", equipment: "Cable" },
        { name: "Machine Preacher Curl", category: "Arms", equipment: "Machine" },
        { name: "Machine Tricep Extension", category: "Arms", equipment: "Machine" },
        
        { name: "Bodyweight Plank", category: "Core", equipment: "Bodyweight" },
        { name: "Bodyweight Crunch", category: "Core", equipment: "Bodyweight" },
        { name: "Bodyweight Hanging Leg Raise", category: "Core", equipment: "Bodyweight" },
        { name: "Bodyweight Russian Twist", category: "Core", equipment: "Bodyweight" },
        { name: "Cable Crunch", category: "Core", equipment: "Cable" },
        { name: "Machine Ab Wheel Rollout", category: "Core", equipment: "Machine" }
    ].sort((a, b) => a.name.localeCompare(b.name));

// --- CORE TRACKING VARIABLES ---
let currentWorkout = [];
let workoutHistory = [];
let weightHistory = [];
let workoutName = '';
let workoutStartTime = null;
let supersetSourceId = null;
let activeMenuExerciseId = null;
let currentCategory = 'All';
let currentEquipment = 'All';
let currentDetailIndex = null;
let timerInterval = null;
let confirmModalCallback = null;
let selectedProgressExercise = null;

// Maps every exercise name to its muscle category for the Stats page
const exerciseCategoryMap = {};
exerciseDatabase.forEach(ex => { exerciseCategoryMap[ex.name] = ex.category; });

// Load saved data immediately when the app opens
try {
    const savedData = JSON.parse(localStorage.getItem('myWorkoutApp_data'));
    if (savedData) {
        currentWorkout = savedData.currentWorkout || [];
        workoutHistory = savedData.workoutHistory || [];
        weightHistory = savedData.weightHistory || [];
        workoutName = savedData.workoutName || '';
        workoutStartTime = savedData.workoutStartTime || null;
    }
} catch (e) {
    console.error("No saved data found or error loading data.");
}

// Save data to device storage
function saveApp() {
    localStorage.setItem('myWorkoutApp_data', JSON.stringify({
        currentWorkout: currentWorkout,
        workoutHistory: workoutHistory,
        weightHistory: weightHistory,
        workoutName: workoutName,
        workoutStartTime: workoutStartTime
    }));
}

// --- SCREEN NAVIGATION ---
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function navigate(tab) {
    document.getElementById('bottom-nav').style.display = 'flex';
    document.getElementById('header-action').style.display = 'none';
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

    if (tab === 'home') {
        showScreen('home-screen');
        document.getElementById('nav-home').classList.add('active');
        updateStreak();
    } else if (tab === 'history') {
        showScreen('history-screen');
        document.getElementById('nav-history').classList.add('active');
        renderHistory();
    } else if (tab === 'weight') {
        showScreen('weight-screen');
        document.getElementById('nav-weight').classList.add('active');
        renderWeight();
    } else if (tab === 'stats') {
        showScreen('stats-screen');
        document.getElementById('nav-stats').classList.add('active');
        renderStats();
    }
}

function goBack() {
    document.getElementById('header-action').style.display = 'none';
    navigate('history');
}

function updateStreak() {
    document.getElementById('streak-text').textContent = workoutHistory.length;
}

// --- WORKOUT LIFECYCLE ---
function startWorkout() {
    if (!workoutStartTime) workoutStartTime = Date.now();
    document.getElementById('workout-name-input').value = workoutName;
    document.getElementById('bottom-nav').style.display = 'none';
    showScreen('workout-screen');
    renderWorkout();
    startTimer();
    saveApp();
}

function cancelWorkout() {
    if (currentWorkout.length > 0) {
        showConfirmModal('Discard this workout? This cannot be undone.', 'Discard', performCancelWorkout);
    } else {
        performCancelWorkout();
    }
}

function performCancelWorkout() {
    stopTimer();
    currentWorkout = [];
    workoutName = '';
    workoutStartTime = null;
    document.getElementById('workout-name-input').value = '';
    saveApp();
    navigate('home');
}

function finishWorkout() {
    if (currentWorkout.length === 0) {
        cancelWorkout();
        return;
    }
    stopTimer();
    const durationSeconds = workoutStartTime ? Math.floor((Date.now() - workoutStartTime) / 1000) : 0;

    workoutHistory.unshift({
        date: new Date().toISOString(),
        name: workoutName || 'Workout',
        durationSeconds: durationSeconds,
        exercises: JSON.parse(JSON.stringify(currentWorkout))
    });

    currentWorkout = [];
    workoutName = '';
    workoutStartTime = null;
    document.getElementById('workout-name-input').value = '';
    saveApp();
    navigate('home');
}

// --- TIMER ---
function startTimer() {
    stopTimer();
    updateTimerDisplay();
    timerInterval = setInterval(updateTimerDisplay, 1000);
}

function stopTimer() {
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }
}

// --- SUPERSETS ---
function updateTimerDisplay() {
    if (!workoutStartTime) return;
    const elapsed = Math.floor((Date.now() - workoutStartTime) / 1000);
    const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const secs = String(elapsed % 60).padStart(2, '0');
    document.getElementById('workout-timer').textContent = `${mins}:${secs}`;
}

function getSupersetLabel(supersetId, exercisesArray) {
    if (!supersetId) return '';
    const source = exercisesArray || currentWorkout;
    const activeSupersets = [...new Set(source.map(e => e.supersetId).filter(Boolean))];
    const index = activeSupersets.indexOf(supersetId);
    return index !== -1 ? `Superset ${String.fromCharCode(65 + index)}` : 'Superset';
}

function startSupersetLink(exerciseId) {
    supersetSourceId = exerciseId;
    activeMenuExerciseId = null;
    renderWorkout();
}

function completeSupersetLink(targetId) {
    if (!supersetSourceId || supersetSourceId === targetId) return;

    const sourceIndex = currentWorkout.findIndex(ex => ex.id === supersetSourceId);
    const targetIndex = currentWorkout.findIndex(ex => ex.id === targetId);
    
    if (sourceIndex === -1 || targetIndex === -1) return;

    const sourceEx = currentWorkout[sourceIndex];
    const targetEx = currentWorkout[targetIndex];

    const sharedId = sourceEx.supersetId || targetEx.supersetId || 'ss_' + Date.now();
    sourceEx.supersetId = sharedId;
    targetEx.supersetId = sharedId;

    const [movedItem] = currentWorkout.splice(targetIndex, 1);
    const newSourceIndex = currentWorkout.findIndex(ex => ex.id === supersetSourceId);
    currentWorkout.splice(newSourceIndex + 1, 0, movedItem);

    supersetSourceId = null;
    renderWorkout();
}

function removeFromSuperset(exerciseId) {
    const ex = currentWorkout.find(e => e.id === exerciseId);
    if (ex) {
        const oldId = ex.supersetId;
        ex.supersetId = null;
        
        const remaining = currentWorkout.filter(e => e.supersetId === oldId);
        if (remaining.length < 2) {
            remaining.forEach(e => e.supersetId = null);
        }
    }
    activeMenuExerciseId = null;
    renderWorkout();
}

function moveGroup(exerciseId, direction) {
    activeMenuExerciseId = null;
    
    const index = currentWorkout.findIndex(ex => ex.id === exerciseId);
    if (index === -1) return;

    let startIdx = index;
    let endIdx = index;
    const targetEx = currentWorkout[index];

    if (targetEx.supersetId) {
        while(startIdx > 0 && currentWorkout[startIdx - 1].supersetId === targetEx.supersetId) startIdx--;
        while(endIdx < currentWorkout.length - 1 && currentWorkout[endIdx + 1].supersetId === targetEx.supersetId) endIdx++;
    }

    const blockSize = endIdx - startIdx + 1;
    let swapStartIdx = -1;
    let swapEndIdx = -1;

    if (direction === 'up' && startIdx > 0) {
        swapEndIdx = startIdx - 1;
        swapStartIdx = swapEndIdx;
        if (currentWorkout[swapEndIdx].supersetId) {
            while(swapStartIdx > 0 && currentWorkout[swapStartIdx - 1].supersetId === currentWorkout[swapEndIdx].supersetId) swapStartIdx--;
        }
    } else if (direction === 'down' && endIdx < currentWorkout.length - 1) {
        swapStartIdx = endIdx + 1;
        swapEndIdx = swapStartIdx;
        if (currentWorkout[swapStartIdx].supersetId) {
            while(swapEndIdx < currentWorkout.length - 1 && currentWorkout[swapEndIdx + 1].supersetId === currentWorkout[swapStartIdx].supersetId) swapEndIdx++;
        }
    } else {
        return;
    }

    for(let i = startIdx; i <= endIdx; i++) {
        const cardEl = document.getElementById(`card-${currentWorkout[i].id}`);
        if(cardEl) cardEl.style.opacity = '0';
    }

    setTimeout(() => {
        const movingBlock = currentWorkout.splice(startIdx, blockSize);
        const actualInsert = direction === 'up' ? swapStartIdx : swapEndIdx - blockSize + 1;
        currentWorkout.splice(actualInsert, 0, ...movingBlock);
        
        const movedIds = movingBlock.map(ex => ex.id);
        renderWorkout();
        
        movedIds.forEach(id => {
            const el = document.getElementById(`card-${id}`);
            if(el) {
                el.classList.add('just-moved');
                setTimeout(() => el.classList.remove('just-moved'), 400);
            }
        });
    }, 150);
}

// --- EXERCISE / SET MANAGEMENT ---
function addExercise(name) {
    if (!name) return;
    currentWorkout.push({
        id: Date.now() + Math.random(),
        name: name,
        supersetId: null,
        sets: [{ weight: '', reps: '', completed: false, isBW: false, isFailure: false, side: '', menuOpen: false }]
    });
    renderWorkout();
}

function removeExercise(id) {
    currentWorkout = currentWorkout.filter(ex => ex.id !== id);
    activeMenuExerciseId = null;
    renderWorkout();
}

function addSet(exerciseId) {
    const ex = currentWorkout.find(e => e.id === exerciseId);
    if (ex) {
        ex.sets.push({ weight: '', reps: '', completed: false, isBW: false, isFailure: false, side: '', menuOpen: false });
    }
    renderWorkout();
}

function removeSet(exerciseId, setIndex) {
    const ex = currentWorkout.find(e => e.id === exerciseId);
    if (ex) {
        ex.sets.splice(setIndex, 1);
        if (ex.sets.length === 0) {
            ex.sets.push({ weight: '', reps: '', completed: false, isBW: false, isFailure: false, side: '', menuOpen: false });
        }
    }
    renderWorkout();
}

function toggleSet(exerciseId, setIndex) {
    const ex = currentWorkout.find(e => e.id === exerciseId);
    if (ex) {
        ex.sets[setIndex].completed = !ex.sets[setIndex].completed;
    }
    renderWorkout();
}

function updateSetData(exerciseId, setIndex, field, value) {
    const ex = currentWorkout.find(e => e.id === exerciseId);
    if (ex) {
        ex.sets[setIndex][field] = value;
    }
    saveApp();
}

function toggleExerciseMenu(id) {
    activeMenuExerciseId = activeMenuExerciseId === id ? null : id;
    renderWorkout();
}

function toggleSetMenu(exerciseId, setIndex) {
    const ex = currentWorkout.find(e => e.id === exerciseId);
    if (ex) {
        ex.sets[setIndex].menuOpen = !ex.sets[setIndex].menuOpen;
    }
    renderWorkout();
}

function toggleMod(exerciseId, setIndex, type) {
    const ex = currentWorkout.find(e => e.id === exerciseId);
    if (!ex) return;
    const set = ex.sets[setIndex];
    
    if (type === 'BW') {
        set.isBW = !set.isBW;
        set.weight = set.isBW ? 'BW' : '';
    } else if (type === 'Fail') {
        set.isFailure = !set.isFailure;
    } else if (type === 'Side') {
        if (!set.side) set.side = 'L';
        else if (set.side === 'L') set.side = 'R';
        else set.side = '';
    }
    renderWorkout();
}

function renderWorkout() {
    saveApp();
    const container = document.getElementById('workout-cards');
    container.innerHTML = '';

    currentWorkout.forEach((exercise, index) => {
        const card = document.createElement('div');
        card.id = `card-${exercise.id}`;
        
        const isLinkingMode = supersetSourceId !== null;
        const isSource = supersetSourceId === exercise.id;
        
        const belongsToSameActiveGroup = isLinkingMode && exercise.supersetId && 
            currentWorkout.find(e => e.id === supersetSourceId)?.supersetId === exercise.supersetId;

        let superClass = '';
        if (exercise.supersetId) {
            const prev = currentWorkout[index - 1];
            const next = currentWorkout[index + 1];
            const samePrev = prev && prev.supersetId === exercise.supersetId;
            const sameNext = next && next.supersetId === exercise.supersetId;
            
            if (!samePrev && sameNext) superClass = 'superset-start';
            else if (samePrev && sameNext) superClass = 'superset-middle';
            else if (samePrev && !sameNext) superClass = 'superset-end';
            else superClass = 'superset-single';
        }

        card.className = `card ${exercise.supersetId ? 'in-superset' : ''} ${superClass} ${isLinkingMode && !isSource && !belongsToSameActiveGroup ? 'linking-target' : ''}`;
        
        if (isLinkingMode && !isSource && !belongsToSameActiveGroup) {
            card.onclick = (e) => {
                e.stopPropagation();
                completeSupersetLink(exercise.id);
            };
        }

        const header = document.createElement('div');
        header.className = 'exercise-header';
        
        let supersetHeaderHtml = '';
        if (exercise.supersetId && (superClass === 'superset-start' || superClass === 'superset-single')) {
            supersetHeaderHtml = `<div class="superset-badge">${getSupersetLabel(exercise.supersetId, currentWorkout)}</div>`;
        }

        header.innerHTML = `
            <div style="flex-grow: 1; min-width: 0; padding-right: 8px;">
                ${supersetHeaderHtml}
                <div style="font-weight: 700; font-size: 1.05rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                    ${isLinkingMode && !isSource ? `Link ${exercise.name}` : exercise.name}
                </div>
            </div>
            
            <div style="position: relative; display: flex; align-items: center;">
                <button class="icon-btn" onclick="event.stopPropagation(); toggleExerciseMenu(${exercise.id})">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="1.5"></circle><circle cx="6" cy="12" r="1.5"></circle><circle cx="18" cy="12" r="1.5"></circle></svg>
                </button>
                
                ${activeMenuExerciseId === exercise.id ? `
                    <div class="action-menu-popup" onclick="event.stopPropagation();">
                        <button class="menu-item" onclick="moveGroup(${exercise.id}, 'up')">Move Up</button>
                        <button class="menu-item" onclick="moveGroup(${exercise.id}, 'down')">Move Down</button>
                        <div style="height: 1px; background: #2c2c2e; margin: 4px 0;"></div>
                        ${!exercise.supersetId ? `
                            <button class="menu-item" onclick="startSupersetLink(${exercise.id})">Superset</button>
                        ` : `
                            <button class="menu-item danger" onclick="removeFromSuperset(${exercise.id})">Remove Superset</button>
                        `}
                        <button class="menu-item danger" onclick="removeExercise(${exercise.id})">Remove Exercise</button>
                    </div>
                ` : ''}
            </div>
        `;
        card.appendChild(header);

        exercise.sets.forEach((set, setIndex) => {
            const setContainer = document.createElement('div');
            setContainer.className = `set-container ${set.completed ? 'completed' : ''} ${set.isFailure ? 'is-failure' : ''}`;
            
            let weightPlaceholder = 'lbs';
            let weightValue = set.weight;
            if(set.isBW) { weightPlaceholder = 'BW'; weightValue = 'BW'; }
            
            let setNumDisplay = setIndex + 1;
            let sideNumClass = '';
            if(set.side === 'L') { setNumDisplay = 'L'; sideNumClass = 'side-l'; }
            if(set.side === 'R') { setNumDisplay = 'R'; sideNumClass = 'side-r'; }

            let sideBtnText = 'L/R';
            let sideBtnClass = '';
            if(set.side === 'L') { sideBtnText = 'L'; sideBtnClass = 'side-l active'; }
            if(set.side === 'R') { sideBtnText = 'R'; sideBtnClass = 'side-r active'; }
            
            setContainer.innerHTML = `
                <div class="set-row">
                    <div class="set-number ${sideNumClass}">${setNumDisplay}</div>
                    <div class="input-group">
                        <input type="${set.isBW ? 'text' : 'number'}" placeholder="${weightPlaceholder}" value="${weightValue}" class="${set.isBW ? 'bw-active' : ''}" onchange="updateSetData(${exercise.id}, ${setIndex}, 'weight', this.value)" ${set.completed || set.isBW ? 'disabled' : ''}>
                    </div>
                    <div class="input-group">
                        <input type="number" placeholder="reps" value="${set.reps}" onchange="updateSetData(${exercise.id}, ${setIndex}, 'reps', this.value)" ${set.completed ? 'disabled' : ''}>
                    </div>
                    <button class="check-btn" onclick="toggleSet(${exercise.id}, ${setIndex})">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M20 6L9 17l-5-5"/></svg>
                    </button>
                    <button class="icon-btn" onclick="toggleSetMenu(${exercise.id}, ${setIndex})">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1.5"></circle><circle cx="12" cy="5" r="1.5"></circle><circle cx="12" cy="19" r="1.5"></circle></svg>
                    </button>
                </div>
                
                ${set.menuOpen ? `
                <div class="set-drawer">
                    <div></div>
                    <button class="mod-tag bw ${set.isBW ? 'active' : ''}" onclick="toggleMod(${exercise.id}, ${setIndex}, 'BW')">BW</button>
                    <button class="mod-tag fail ${set.isFailure ? 'active' : ''}" onclick="toggleMod(${exercise.id}, ${setIndex}, 'Fail')">F</button>
                    <button class="mod-tag ${sideBtnClass}" onclick="toggleMod(${exercise.id}, ${setIndex}, 'Side')">${sideBtnText}</button>
                    <button class="mod-tag delete" onclick="removeSet(${exercise.id}, ${setIndex})">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </button>
                </div>
                ` : ''}
            `;
            card.appendChild(setContainer);
        });

        const addSetBtn = document.createElement('button');
        addSetBtn.className = 'add-set-btn';
        addSetBtn.innerText = '+ Add Set';
        addSetBtn.onclick = () => addSet(exercise.id);
        card.appendChild(addSetBtn);

        container.appendChild(card);
    });
}

// --- EXERCISE PICKER MODAL ---
function showExerciseModal() {
    document.getElementById('search-exercise').value = '';
    currentCategory = 'All';
    currentEquipment = 'All';
    document.querySelectorAll('#muscle-filters .filter-pill').forEach(p => {
        p.classList.toggle('active', p.textContent.trim() === 'All');
    });
    document.querySelectorAll('#equipment-filters .filter-pill').forEach(p => {
        p.classList.toggle('active', p.textContent.trim() === 'All');
    });
    showScreen('exercise-modal');
    renderExerciseList();
}

function hideExerciseModal() {
    showScreen('workout-screen');
}

function setCategory(cat) {
    currentCategory = cat;
    document.querySelectorAll('#muscle-filters .filter-pill').forEach(p => {
        p.classList.toggle('active', p.textContent.trim() === cat);
    });
    renderExerciseList();
}

function setEquipment(eq) {
    currentEquipment = eq;
    document.querySelectorAll('#equipment-filters .filter-pill').forEach(p => {
        p.classList.toggle('active', p.textContent.trim() === eq);
    });
    renderExerciseList();
}

function filterExercises() {
    renderExerciseList();
}

function renderExerciseList() {
    const search = document.getElementById('search-exercise').value.toLowerCase().trim();
    const list = document.getElementById('exercise-list');
    list.innerHTML = '';

    const filtered = exerciseDatabase.filter(ex => {
        const matchesSearch = ex.name.toLowerCase().includes(search);
        const matchesCategory = currentCategory === 'All' || ex.category === currentCategory;
        const matchesEquipment = currentEquipment === 'All' || ex.equipment === currentEquipment;
        return matchesSearch && matchesCategory && matchesEquipment;
    });

    if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state">No exercises found.</div>';

    filtered.forEach(ex => {

        item.innerHTML = `

                <div class="list-item-title">${ex.name}</div>
                <div class="list-item-sub">${ex.category} &middot; ${ex.equipment}</div>

        list.appendChild(item);

}

function selectExercise(name) {
    addExercise(name);
    hideExerciseModal();
}

// --- HISTORY ---
function renderHistory() {
    const container = document.getElementById('history-list');
    container.innerHTML = '';

    if (workoutHistory.length === 0) {
        container.innerHTML = '<div class="empty-state">No workouts logged yet.</div>';
        return;
    }

    workoutHistory.forEach((session, index) => {
        const dateObj = new Date(session.date);
        const dateString = dateObj.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
        const totalSets = session.exercises.reduce((sum, ex) => sum + ex.sets.length, 0);

        const item = document.createElement('div');
        item.className = 'list-item';
        item.innerHTML = `
            <div>
                <div class="list-item-title">${session.name || 'Workout'}</div>
                <div class="list-item-sub">${dateString} &middot; ${session.exercises.length} exercises &middot; ${totalSets} sets</div>
            </div>
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        `;
        item.onclick = () => viewWorkoutDetail(index);
        container.appendChild(item);
    });
}

function viewWorkoutDetail(index) {
    currentDetailIndex = index;
    const session = workoutHistory[index];
    if (!session) return;

    document.getElementById('detail-title').textContent = session.name || 'Workout';

    const dateObj = new Date(session.date);
    const dateString = dateObj.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
    const totalSets = session.exercises.reduce((sum, ex) => sum + ex.sets.length, 0);
    let durationStr = '';
    if (session.durationSeconds) {
        const mins = Math.round(session.durationSeconds / 60);
        durationStr = ` &middot; ${mins} min`;
    }
    document.getElementById('detail-stats').innerHTML = `${dateString} &middot; ${session.exercises.length} exercises &middot; ${totalSets} sets${durationStr}`;

    const exContainer = document.getElementById('detail-exercises');
    exContainer.innerHTML = '';

    session.exercises.forEach((exercise, exIndex) => {
        const exDiv = document.createElement('div');

        let superClass = '';
        if (exercise.supersetId) {
            const prev = session.exercises[exIndex - 1];
            const next = session.exercises[exIndex + 1];
            const samePrev = prev && prev.supersetId === exercise.supersetId;
            const sameNext = next && next.supersetId === exercise.supersetId;

            if (!samePrev && sameNext) superClass = 'superset-start';
            else if (samePrev && sameNext) superClass = 'superset-middle';
            else if (samePrev && !sameNext) superClass = 'superset-end';
            else superClass = 'superset-single';
        }

        exDiv.className = `card ${exercise.supersetId ? 'in-superset' : ''} ${superClass}`;

        let supersetBadge = '';
        if (exercise.supersetId && (superClass === 'superset-start' || superClass === 'superset-single')) {
            supersetBadge = `<div class="superset-badge">${getSupersetLabel(exercise.supersetId, session.exercises)}</div>`;
        }

        const setsHtml = exercise.sets.map((set, sIdx) => {
            const weightStr = set.isBW ? 'BW' : `${set.weight || 0} lbs`;
            let tags = '';
            if (set.isBW) tags += `<span class="d-tag bw">BW</span>`;
            if (set.side === 'L') tags += `<span class="d-tag side-l">L</span>`;
            if (set.side === 'R') tags += `<span class="d-tag side-r">R</span>`;
            if (set.isFailure) tags += `<span class="d-tag fail">F</span>`;
            return `
                <div class="detail-set-row">
                    <span>Set ${sIdx + 1}</span>
                    <div style="display:flex; align-items:center;">
                        <span>${weightStr} &times; ${set.reps || 0}</span>
                        <div class="detail-tags">${tags}</div>
                    </div>
                </div>
            `;
        }).join('');

        exDiv.innerHTML = `
            ${supersetBadge}
            <div style="font-weight: 700; font-size: 1.05rem; margin-bottom: 4px;">${exercise.name}</div>
            ${setsHtml}
        `;
        exContainer.appendChild(exDiv);
    });

    document.getElementById('bottom-nav').style.display = 'none';
    document.getElementById('header-action').style.display = 'flex';
    showScreen('workout-detail-screen');
}

function deleteWorkoutFromHistory() {
    if (currentDetailIndex === null) return;
    showConfirmModal('Delete this workout log? This cannot be undone.', 'Delete', () => {
        workoutHistory.splice(currentDetailIndex, 1);
        currentDetailIndex = null;
        saveApp();
        goBack();

// --- BODY WEIGHT ---
function logWeight() {
    const input = document.getElementById('new-weight');
    const val = parseFloat(input.value);
    if (isNaN(val) || val <= 0) return;

    weightHistory.unshift({
        date: new Date().toISOString(),
        weight: val
    });

    input.value = '';
    saveApp();
    renderWeight();
}

function deleteWeight(index) {
    weightHistory.splice(index, 1);
    saveApp();
    renderWeight();
}

function renderWeight() {
    renderWeightTrend();

    const container = document.getElementById('weight-list');
    container.innerHTML = '';

    if (weightHistory.length === 0) {
        container.innerHTML = '<div class="empty-state">No weight logged yet.</div>';
        return;
    }

    weightHistory.forEach((entry, index) => {
        const dateObj = new Date(entry.date);
        const dateString = dateObj.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
        const item = document.createElement('div');
        item.className = 'list-item';
        item.innerHTML = `
            <div>
                <div class="list-item-title">${entry.weight} lbs</div>
                <div class="list-item-sub">${dateString}</div>
            </div>
            <button class="icon-btn" onclick="event.stopPropagation(); deleteWeight(${index})">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        `;
        container.appendChild(item);
    });
}

function renderWeightTrend() {
    const el = document.getElementById('weight-trend-chart');
    const section = document.getElementById('weight-trend-section');
    
    if (weightHistory.length < 2) {
        section.style.display = 'block';
        el.innerHTML = `<div class="empty-state" style="margin-top:0; padding: 20px 0;">Log at least 2 weigh-ins to see your trend here.</div>`;
        return;
    }
    
    section.style.display = 'block';
    const chronological = [...weightHistory].reverse();
    const points = chronological.map(w => ({ value: w.weight }));
    const first = chronological[0];
    const last = chronological[chronological.length - 1];
    const diff = last.weight - first.weight;
    
    // Custom color indicators: green for losing weight, red for gaining weight
    let trendColor = 'var(--text-muted)';
    let diffStr = 'No change';
    if (diff < 0) {
        trendColor = '#22c55e'; // Green for losing weight
        diffStr = `${Math.abs(diff).toFixed(1)} lbs lost`;
    } else if (diff > 0) {
        trendColor = '#ef4444'; // Red for gaining weight
        diffStr = `+${diff.toFixed(1)} lbs gained`;
    }

    el.innerHTML = `
        ${buildLineChartSVG(points, 'weightGradient', trendColor)}
        <div style="display:flex; justify-content:space-between; margin-top:10px; color:var(--text-muted); font-size:0.8rem; font-weight:600;">
            <span>${new Date(first.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}</span>
            <span style="color: ${trendColor}; font-weight:800; font-size:0.9rem;">${diffStr}</span>
            <span>${new Date(last.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}</span>
        </div>
    `;
}

// --- STATS & PROGRESS ---
function getMonday(date) {
    const d = new Date(date);
    const day = d.getDay();
    const diff = (day === 0 ? -6 : 1) - day;
    d.setDate(d.getDate() + diff);
    d.setHours(0, 0, 0, 0);
    return d;
}

function calculateWeekStreak() {
    if (workoutHistory.length === 0) return 0;
    const weeksWithWorkout = new Set();
    workoutHistory.forEach(w => {
        weeksWithWorkout.add(getMonday(new Date(w.date)).toDateString());
    });

    let streak = 0;
    let cursor = getMonday(new Date());
    if (!weeksWithWorkout.has(cursor.toDateString())) {
        cursor.setDate(cursor.getDate() - 7);
    }
    while (weeksWithWorkout.has(cursor.toDateString())) {
        streak++;
        cursor.setDate(cursor.getDate() - 7);
    }
    return streak;
}

function getAllSets() {
    const sets = [];
    workoutHistory.forEach(session => {
        session.exercises.forEach(ex => {
            ex.sets.forEach(set => {
                sets.push({
                    exerciseName: ex.name,
                    weight: set.isBW ? 0 : (parseFloat(set.weight) || 0),
                    reps: parseFloat(set.reps) || 0,
                    isBW: set.isBW,
                    date: session.date
                });
            });
        });
    });
    return sets;
}

function estimate1RM(weight, reps) {
    if (reps <= 0 || weight <= 0) return 0;
    if (reps === 1) return weight;
    return weight * (1 + reps / 30);
}

function formatVolume(num) {
    if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
    return Math.round(num).toString();
}

function buildLineChartSVG(points, gradientId, strokeColor = '#22c55e') {
    const width = 300;
    const height = 110;
    const padding = 8;
    if (points.length === 0) return '';

    const plotPoints = points.length === 1 ? [points[0], points[0]] : points;
    const values = plotPoints.map(p => p.value);
    let min = Math.min(...values);
    let max = Math.max(...values);
    if (min === max) { min -= 1; max += 1; }
    const range = max - min;
    const stepX = plotPoints.length > 1 ? (width - padding * 2) / (plotPoints.length - 1) : 0;

    const coords = plotPoints.map((p, i) => ({
        x: padding + i * stepX,
        y: height - padding - ((p.value - min) / range) * (height - padding * 2)
    }));

    const linePath = coords.map((c, i) => `${i === 0 ? 'M' : 'L'} ${c.x.toFixed(1)} ${c.y.toFixed(1)}`).join(' ');
    const areaPath = `${linePath} L ${coords[coords.length - 1].x.toFixed(1)} ${height - padding} L ${coords[0].x.toFixed(1)} ${height - padding} Z`;
    const dots = coords.map(c => `<circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="3.5" fill="${strokeColor}" stroke="#000000" stroke-width="1.5" />`).join('');

    return `
        <svg viewBox="0 0 ${width} ${height}" style="width:100%; height:110px; display:block; overflow:visible;">
            <defs>
                <linearGradient id="${gradientId}" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="${strokeColor}" stop-opacity="0.25"/>
                    <stop offset="100%" stop-color="${strokeColor}" stop-opacity="0"/>
                </linearGradient>
            </defs>
            <path d="${areaPath}" fill="url(#${gradientId})"></path>
            <path d="${linePath}" fill="none" stroke="${strokeColor}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>
            ${dots}
        </svg>
    `;
}

function renderStats() {
    const allSets = getAllSets();
    const totalVolume = allSets.reduce((sum, s) => sum + s.weight * s.reps, 0);

    document.getElementById('stats-overview').innerHTML = `
        <div class="stat-tile">
            <div class="stat-value">${workoutHistory.length}</div>
            <div class="stat-label">Workouts</div>
        </div>
        <div class="stat-tile">
            <div class="stat-value">${calculateWeekStreak()}</div>
            <div class="stat-label">Week Streak</div>
        </div>
        <div class="stat-tile">
            <div class="stat-value">${formatVolume(totalVolume)}</div>
            <div class="stat-label">Lbs Lifted</div>
        </div>
        <div class="stat-tile">
            <div class="stat-value">${allSets.length}</div>
            <div class="stat-label">Total Sets</div>
        </div>
    `;

    renderProgressExercisePicker(allSets);
    renderMuscleBalance();
    renderPersonalRecords(allSets);
}

function renderProgressExercisePicker(allSets) {
    const exerciseNames = [...new Set(allSets.filter(s => !s.isBW && s.weight > 0).map(s => s.exerciseName))].sort();
    const select = document.getElementById('progress-exercise-select');

    if (exerciseNames.length === 0) {
        select.innerHTML = '<option>No exercises logged yet</option>';
        select.disabled = true;
        document.getElementById('exercise-progress-chart').innerHTML = `<div class="empty-state" style="margin-top:0; padding: 20px 0;">Log a weighted exercise to see progress here.</div>`;
        document.getElementById('exercise-progress-pr').innerHTML = '';
        return;
    }

    select.disabled = false;
    if (!selectedProgressExercise || !exerciseNames.includes(selectedProgressExercise)) {
        selectedProgressExercise = exerciseNames[0];
    }
    select.innerHTML = exerciseNames.map(name =>
        `<option value="${name}" ${name === selectedProgressExercise ? 'selected' : ''}>${name}</option>`
    ).join('');

    renderExerciseProgress();
}

function renderExerciseProgress() {
    const select = document.getElementById('progress-exercise-select');
    if (select.disabled) return;
    selectedProgressExercise = select.value;

    const sessions = [];
    [...workoutHistory].reverse().forEach(session => {
        const ex = session.exercises.find(e => e.name === selectedProgressExercise);
        if (!ex) return;
        const validSets = ex.sets.filter(s => !s.isBW && (parseFloat(s.weight) || 0) > 0 && (parseFloat(s.reps) || 0) > 0);
        if (validSets.length === 0) return;
        const topSet = validSets.reduce((best, s) => {
            const w = parseFloat(s.weight) || 0;
            return w > best.weight ? { weight: w, reps: parseFloat(s.reps) || 0 } : best;
        }, { weight: 0, reps: 0 });
        sessions.push({ date: session.date, weight: topSet.weight, reps: topSet.reps });
    });

    const chartEl = document.getElementById('exercise-progress-chart');
    const prEl = document.getElementById('exercise-progress-pr');

    if (sessions.length === 0) {
        chartEl.innerHTML = `<div class="empty-state" style="margin-top:0; padding: 20px 0;">No data for this exercise yet.</div>`;
        prEl.innerHTML = '';
        return;
    }

    if (sessions.length > 1) {
        const points = sessions.map(s => ({ value: s.weight }));
        const first = sessions[0];
        const last = sessions[sessions.length - 1];
        const diff = last.weight - first.weight;
        const diffStr = (diff >= 0 ? '+' : '') + diff.toFixed(0);
        chartEl.innerHTML = `
            ${buildLineChartSVG(points, 'exerciseGradient', '#22c55e')}
            <div style="display:flex; justify-content:space-between; margin-top:10px; color:var(--text-muted); font-size:0.8rem; font-weight:600;">
                <span>${new Date(first.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}</span>
                <span style="color: var(--text-main); font-weight:800;">${diffStr} lbs</span>
                <span>${new Date(last.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}</span>
            </div>
        `;
    } else {
        chartEl.innerHTML = `<div class="empty-state" style="margin-top:0; padding: 12px 0;">Log this exercise again to see a trend line.</div>`;
    }

    const best = sessions.reduce((b, s) => estimate1RM(s.weight, s.reps) > estimate1RM(b.weight, b.reps) ? s : b);
    const est1RM = Math.round(estimate1RM(best.weight, best.reps));

    prEl.innerHTML = `
        <div class="list-item" style="cursor:default; padding-left:0; padding-right:0;">
            <div>
                <div class="list-item-title">Best Set</div>
                <div class="list-item-sub">${best.weight} lbs &times; ${best.reps}</div>
            </div>
            <div style="text-align:right;">
                <div style="font-weight:800; font-size:1.15rem;">${est1RM} lbs</div>
                <div class="list-item-sub">est. 1RM</div>
            </div>
        </div>
    `;
}

function renderPersonalRecords(allSets) {
    const byExercise = {};
    allSets.forEach(s => {
        if (s.isBW || s.weight <= 0 || s.reps <= 0) return;
        const est = estimate1RM(s.weight, s.reps);
        if (!byExercise[s.exerciseName] || est > byExercise[s.exerciseName].est) {
            byExercise[s.exerciseName] = { weight: s.weight, reps: s.reps, est: est, date: s.date };
        }
    });

    const records = Object.keys(byExercise)
        .map(name => ({ name, ...byExercise[name] }))
        .sort((a, b) => b.est - a.est);

    const container = document.getElementById('pr-list');
    if (records.length === 0) {
        container.innerHTML = `<div class="empty-state" style="margin-top:0; padding: 20px 0;">No personal records yet. Log a weighted set to get started.</div>`;
        return;
    }

    container.innerHTML = records.map(r => `
        <div class="list-item" style="cursor:default;">
            <div>
                <div class="list-item-title">${r.name}</div>
                <div class="list-item-sub">${r.weight} lbs &times; ${r.reps} &middot; ${new Date(r.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}</div>
            </div>
            <div style="text-align:right;">
                <div style="font-weight:800; font-size:1.05rem;">${Math.round(r.est)} lbs</div>
                <div class="list-item-sub">est. 1RM</div>
            </div>
        </div>
    `).join('');
}

function renderMuscleBalance() {
    const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
    const counts = {};
    let maxCount = 0;

    workoutHistory.forEach(session => {
        if (new Date(session.date).getTime() < cutoff) return;
        session.exercises.forEach(ex => {
            const category = exerciseCategoryMap[ex.name] || 'Other';
            counts[category] = (counts[category] || 0) + ex.sets.length;
            if (counts[category] > maxCount) maxCount = counts[category];
        });
    });

    const container = document.getElementById('muscle-balance-list');
    const categories = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);

    if (categories.length === 0) {
        container.innerHTML = `<div class="empty-state" style="margin-top:0; padding: 20px 0;">No workouts in the last 30 days.</div>`;
        return;
    }

    container.innerHTML = categories.map(cat => {
        const pct = maxCount > 0 ? Math.round((counts[cat] / maxCount) * 100) : 0;
        return `
            <div style="margin-bottom: 14px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:6px; font-size:0.9rem; font-weight:700;">
                    <span>${cat}</span>
                    <span style="color:var(--text-muted); font-weight:600;">${counts[cat]} sets</span>
                </div>
                <div style="background: var(--tag-bg); border-radius: 8px; height: 8px; overflow: hidden;">
                    <div style="background: #22c55e; height: 100%; width: ${pct}%; border-radius: 8px;"></div>
                </div>
            </div>
        `;
    }).join('');
}

        renderWorkout();

if (currentWorkout.length > 0) {

} else {

}
